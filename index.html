<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxManager — 세무사무소 거래처 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
:root{--blue:#4f8ef7;--purple:#a259ff;--green:#2e7d32;--red:#c62828;--orange:#e65100}

/* ── 헤더 */
#header{background:#1a1a2e;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
#logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#4f8ef7,#a259ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
#header-btns{display:flex;gap:8px;align-items:center}
.hbtn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.hbtn.blue{background:rgba(79,142,247,.25);color:#4f8ef7}
.badge-alert{background:#e53935;border-radius:12px;padding:2px 8px;font-size:12px;font-weight:700}

/* ── 탭 */
#tabs{background:#242440;display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap}
.tab{background:transparent;border:none;color:rgba(255,255,255,.7);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:6px}
.tab.active{background:rgba(79,142,247,.28);color:#4f8ef7}

/* ── 컨테이너 */
#main{max-width:1200px;margin:0 auto;padding:20px 16px}

/* ── 카드 */
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-weight:700;font-size:15px;margin-bottom:12px}

/* ── 통계 그리드 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:800}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}

/* ── 배지 */
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-green{background:#e6f4ea;color:#1e7e34}
.badge-red{background:#fdecea;color:#c62828}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-purple{background:#f3e5f5;color:#6a1b9a}
.badge-gray{background:#f5f5f5;color:#555}

/* ── 필터바 */
.filter-bar{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{display:flex;align-items:center;gap:6px;flex:1 1 200px;background:#f5f5f5;border-radius:8px;padding:7px 12px}
.search-box input{border:none;background:transparent;font-size:13px;outline:none;width:100%;color:#333;font-family:inherit}
.filter-bar select{padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;background:#fff;cursor:pointer;font-family:inherit;color:#333}

/* ── 테이블 */
.tbl-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);-webkit-overflow-scrolling:touch;display:block}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
thead tr{background:#f8f9ff;border-bottom:2px solid #e8eaf6}
th{padding:10px 12px;text-align:left;font-weight:700;color:#555;white-space:nowrap;font-size:12px}
tbody tr{border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
tbody tr:nth-child(even){background:#fafbff}
tbody tr:hover{background:#e8f0fe}
td{padding:10px 12px;vertical-align:middle}
.td-name{font-weight:700;font-size:13px}
.td-sub{font-size:11px;color:#999}

/* ── 체크박스 */
.chk{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:2px solid #e0e0e0;background:#fafafa}
.chk.on{background:#e8f5e9;border-color:#43a047;color:#43a047}

/* ── 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:17px;font-weight:800}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.close-btn{background:transparent;border:none;cursor:pointer;color:#888;font-size:20px;font-family:inherit;line-height:1}

/* ── 폼 */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.full{grid-template-columns:1fr}
label.flabel{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px}
input.finput,select.fsel,textarea.ftarea{width:100%;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box}
select.fsel{background:#fff;cursor:pointer}
textarea.ftarea{resize:vertical}
input.finput:focus,select.fsel:focus,textarea.ftarea:focus{border-color:#4f8ef7}

/* ── 버튼 */
.btn-primary{background:linear-gradient(135deg,#4f8ef7,#a259ff);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-secondary{background:#f5f5f5;color:#555;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.btn-green{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-sm{padding:5px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-row .btn-primary{flex:2}.btn-row .btn-secondary{flex:1}

/* ── 상세 섹션 */
.detail-section{margin-bottom:14px}
.detail-section-title{font-size:11px;font-weight:700;color:#4f8ef7;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.detail-section-body{background:#fafbff;border-radius:10px;padding:2px 14px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-row .lbl{color:#888}

/* ── 진행 바 */
.progress-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#4f8ef7,#2e7d32);border-radius:3px}

/* ── AI 도구 카드 */
.tool-card{background:#fff;border-radius:16px;padding:22px;cursor:pointer;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,.07);border:2px solid transparent;transition:box-shadow .15s,border-color .15s;width:100%}
.tool-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.tool-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}

/* ── AI 결과 */
.ai-result{background:#fafbff;border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.9;white-space:pre-wrap;border-left:3px solid #4f8ef7}
.sms-bubble{background:#e3f2fd;border-radius:0 14px 14px 14px;padding:12px 14px;font-size:14px;line-height:1.8;white-space:pre-wrap;display:inline-block;max-width:100%}

/* ── 로딩 */
#loading{text-align:center;padding:60px 20px;color:#888}
#loading .spin{font-size:40px;display:block;margin-bottom:12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 반응형 */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  #header-btns .hbtn span{display:none}
  th:nth-child(n+7){display:none}
  td:nth-child(n+7){display:none}
}

/* ── 수임항목 그룹 */
.contract-group{margin-bottom:10px}
.contract-group-title{font-size:11px;font-weight:700;color:#4f8ef7;margin-bottom:6px;text-transform:uppercase}
.contract-chips{display:flex;flex-wrap:wrap;gap:6px}
.contract-chip{padding:6px 13px;border-radius:20px;border:2px solid #e0e0e0;background:#fff;color:#888;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.contract-chip.on{border-color:#4f8ef7;background:#e8f0fe;color:#4f8ef7}
.contract-chip.disabled{opacity:.3;cursor:not-allowed}

/* ── 인쇄 */
@media print{#header,#tabs,.filter-bar,.btn-row,#header-btns{display:none!important}#main{padding:0}table{font-size:11px}}

/* ── 확장 행 */
.expand-row td{background:#f0f4ff;padding:0}
.client-row.expanded{background:#e8f0fe!important}
.client-row.expanded:hover{background:#dce8fd!important}
.expand-inner{display:flex;flex-wrap:wrap;gap:14px 24px;padding:14px 16px;align-items:flex-start;border-top:1px solid #c5cae9}
.inline-edit{font-size:12px;padding:4px 6px;border:1px solid #4f8ef7;border-radius:6px;background:#fff;font-family:inherit;max-width:100%;color:#1a1a2e}
.inline-edit:focus{outline:none;border-color:#2962ff;box-shadow:0 0 0 2px rgba(79,142,247,.2)}
.julgae-num-input{font-family:inherit;color:#333;background:#fafafa}
.julgae-num-input:focus{outline:none;border-color:#4f8ef7!important;background:#fff;box-shadow:0 0 0 2px rgba(79,142,247,.15)}
</style>
</head>

async function decompressB64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const reader = ds.readable.getReader();
  const out = []; let total = 0;
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    out.push(value); total += value.length;
  }
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const c of out) { merged.set(c, offset); offset += c.length; }
  return new TextDecoder().decode(merged);
}

function dealSortRank(dt) {

function getDealTypes(c) {
  if (Array.isArray(c.dealTypes) && c.dealTypes.length > 0) return c.dealTypes;

}
function getManagers(c) {
  if (Array.isArray(c.managers) && c.managers.length > 0) return c.managers;
  if (c.manager) return [c.manager];

}
function dealSortRankForClient(c) {

function groupColor(key) {
  const palette = ['#4f8ef7','#a259ff','#2e7d32','#e65100','#c62828','#1976d2','#795548','#00838f'];
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) & 0xffff;
  return palette[h % palette.length];
}

function buildClientGroupMap(allClients) {
  const repCount = {};
  allClients.forEach(c => {
    if (c.status === '해지' || c.status === '폐업') return;
    const r = (c.rep || '').trim();
    if (r) repCount[r] = (repCount[r] || 0) + 1;
  });
  return function getGroupKey(c) {
    if (c.soloGroup) return 'S:' + c.id;
    if (c.relatedGroup && c.relatedGroup.trim()) return 'G:' + c.relatedGroup.trim();
    const r = (c.rep || '').trim();
    if (r && repCount[r] > 1) return 'R:' + r;
    return 'S:' + c.id;
  };
}

function filteredClients() {
  const getGroupKey = buildClientGroupMap(G.clients);
  const list = G.clients.filter(c => {
    if (!G.showTerminated && (c.status==='해지'||c.status==='폐업')) return false;
    if (G.searchText && !c.name.includes(G.searchText)) return false;
    if (G.clientRepSearch && !(c.rep||'').includes(G.clientRepSearch)) return false;
    if (G.filterManagers.length > 0) {
      const hasNone = G.filterManagers.includes('(없음)');
      const mgrs = getManagers(c);
      if (!(hasNone && mgrs.length === 0) && !mgrs.some(m => G.filterManagers.includes(m))) return false;
    }
    if (G.filterTaxTypes.length > 0 && !G.filterTaxTypes.includes(c.taxType)) return false;
    if (G.filterVatTypes.length > 0 && !G.filterVatTypes.includes(c.vatType)) return false;
    if (G.filterFeeStatuses.length > 0 && !G.filterFeeStatuses.includes(c.feeStatus)) return false;
    if (G.filterDealTypes.length > 0 && !getDealTypes(c).some(d => G.filterDealTypes.includes(d))) return false;
    if (G.filterCMS.length > 0 && !G.filterCMS.includes(c.cms ? '가입' : '미가입')) return false;
    return true;
  });

  // 수임일자 정렬키: 없으면 뒤로
  const csk = c => c.contractDate || 'ZZZZ-ZZ-ZZ';

  const groupBuckets = {};
  list.forEach(c => {
    const k = getGroupKey(c);
    if (!groupBuckets[k]) groupBuckets[k] = [];
    groupBuckets[k].push(c);
  });
  const groupSortKeys = {};
  Object.entries(groupBuckets).forEach(([k, members]) => {
    // 대표업체: groupMain=true 인 멤버, 없으면 수임일자 가장 빠른 멤버
    const lead = members.find(m=>m.groupMain) ||
      [...members].sort((a,b)=>csk(a).localeCompare(csk(b))||a.name.localeCompare(b.name,'ko'))[0];
    groupSortKeys[k] = { dateKey: csk(lead), lead: lead.name, mainId: lead.id };
  });

  // 검색 중일 때는 일치도 높은 순으로 정렬
  if (G.searchText) {
    const q = G.searchText;
    const score = c => {
      const name = c.name || '', rep = c.rep || '', biz = c.bizType || '';
      if (name === q) return 100;
      if (name.startsWith(q)) return 90 - name.length;
      if (name.includes(q)) return 80 - name.indexOf(q);
      if (rep === q) return 70;
      if (rep.startsWith(q)) return 60 - rep.length;
      if (rep.includes(q)) return 50 - rep.indexOf(q);
      if (biz.includes(q)) return 40;
      return 30;
    };
    return list.sort((a, b) => score(b) - score(a));
  }

  return list.sort((a, b) => {
    const ka = getGroupKey(a), kb = getGroupKey(b);
    if (ka !== kb) {
      const ga = groupSortKeys[ka], gb = groupSortKeys[kb];
      return ga.dateKey.localeCompare(gb.dateKey) || ga.lead.localeCompare(gb.lead, 'ko');
    }
    // 같은 그룹 내: 대표업체 먼저, 나머지는 수임일자 → 이름
    const mainId = groupSortKeys[ka].mainId;
    if (a.id === mainId) return -1;
    if (b.id === mainId) return 1;
    return csk(a).localeCompare(csk(b)) || a.name.localeCompare(b.name, 'ko');
  });
}

function _renderDashboardInner() {
  const s = getStats();
  const alertClients = G.clients.filter(c=>
    c.status!=='해지'&&c.status!=='폐업'&&(!c.dataReceived||c.feeStatus==='미수금'||c.status==='주의')
  );
  const closurePending = G.clients.filter(c=>c.status==='폐업'&&!c.closureTaxApproved);
  const missingClients = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&getMissingFields(c).length>0);
  const pct = s.totalFee>0?Math.round(s.collected/s.totalFee*100):0;

  // 수수료 현황 (월정 + 신고 통합)
  const thisYM = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  const feeActive = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업');

  // 월정 수수료 (이달 기준)
  const monthlyClients = feeActive.filter(c=>getDealTypes(c).some(d=>['기장','고문','성실'].includes(d))&&(!c.contractDate||c.contractDate.slice(0,7)<=thisYM));
  const monthlyTotal     = monthlyClients.reduce((a,c)=>a+(c.fee||0),0);
  const monthlyCollected = monthlyClients.filter(c=>G.monthlyFees[c.id]?.[thisYM]).reduce((a,c)=>a+(c.fee||0),0);

  // 신고 수수료 (전체 누계)
  let filingTotal=0, filingCollected=0;
  const filingUnpaidClients = [];
  for (const pKey of Object.keys(G.julgae)) {
    const pData = G.julgae[pKey];
    for (const [cidStr,v] of Object.entries(pData)) {
      if (!v||!v.fee) continue;
      filingTotal += v.fee;
      if (v.s) filingCollected += v.fee;
      else {
        const cl = G.clients.find(c=>c.id===Number(cidStr));
        if (cl) filingUnpaidClients.push({client:cl, fee:v.fee, period:G.periods.find(p=>p.id===pKey)});
      }
    }
  }

  const grandTotal     = monthlyTotal + filingTotal;
  const grandCollected = monthlyCollected + filingCollected;
  const grandUnpaid    = grandTotal - grandCollected;
  const grandPct       = grandTotal>0?Math.round(grandCollected/grandTotal*100):0;

  // 월정 미수금 목록 (이달)
  const monthlyUnpaid = monthlyClients.filter(c=>!(G.monthlyFees[c.id]?.[thisYM]));

  const feeByManager = MANAGERS.slice(1).map(m=>{
    const mc = monthlyClients.filter(c=>getManagers(c).includes(m));
    const t = mc.reduce((a,c)=>a+(c.fee||0),0);

    <div class="btn-row" style="margin-top:14px">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="doGroupConnect()">🔗 연결</button>
    </div>
  </div>
  </div>`);
  setTimeout(()=>document.getElementById('gc-search')?.focus(), 80);
}

function gcSearch(q) {
  const results = document.getElementById('gc-search-results');
  if (!q.trim()) { results.innerHTML = ''; return; }
  const ql = q.toLowerCase();
  const found = G.clients.filter(cl =>
    cl.id !== window._gcTargetId &&
    (cl.name.toLowerCase().includes(ql) || (cl.rep||'').toLowerCase().includes(ql))
  ).slice(0, 10);
  if (found.length === 0) {
    results.innerHTML = `<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">검색 결과 없음</div>`;

  }
  results.innerHTML = found.map(cl=>`
    <div onclick="gcSelectClient(${cl.id})"
      style="padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid #f0f0f0;margin-bottom:4px;background:#fff"

    </div>`).join('');
}

function gcSelectClient(id) {
  const cl = G.clients.find(x=>x.id===id);
  if (!cl) return;
  const groupName = cl.relatedGroup || (cl.rep ? cl.rep+'그룹' : cl.name+'그룹');
  document.getElementById('gc-name').value = groupName;
  document.getElementById('gc-search').value = cl.name;
  document.getElementById('gc-search-results').innerHTML =
    `<div style="padding:7px 12px;background:#e8f0fe;border-radius:8px;font-size:12px;color:#4f8ef7;display:flex;align-items:center;gap:6px">
      <span>✓</span>
      <span><b>${esc(cl.name)}</b> (${esc(cl.rep||'')}) 선택됨 — ${cl.relatedGroup?`기존 그룹 <b>${esc(cl.relatedGroup)}</b>`:`새 그룹 <b>${esc(groupName)}</b> 생성`}</span>
    </div>`;
}

function doGroupConnect() {
  const name = (document.getElementById('gc-name')?.value||'').trim();
  if (!name) return alert('그룹명을 입력하거나 기존 그룹을 선택해주세요');
  const reason = (document.getElementById('gc-reason')?.value||'').trim();
  const c = G.clients.find(x=>x.id===window._gcTargetId);
  if (!c) return;
  c.relatedGroup = name;
  c.groupReason = reason;
  c.soloGroup = false;
  saveToLS();
  closeModal();
  renderClients();
}

// ── 그룹 편집 모달 (통합) ──────────────────────────────────────────
function openGroupEditModal(id) {
  const c = G.clients.find(x=>x.id===id); if (!c) return;
  const getGroupKey = buildClientGroupMap(G.clients);
  const gk = getGroupKey(c);
  const groupCounts = {};
  G.clients.forEach(cl=>{ const k=getGroupKey(cl); groupCounts[k]=(groupCounts[k]||0)+1; });
  const inGrp = groupCounts[gk] > 1;
  let memberIds;
  if (c.relatedGroup) {
    memberIds = G.clients.filter(cl=>cl.relatedGroup===c.relatedGroup).map(cl=>cl.id);
  } else if (inGrp) {
    memberIds = G.clients.filter(cl=>getGroupKey(cl)===gk&&!cl.soloGroup).map(cl=>cl.id);
  } else {
    memberIds = [id];
  }
  window._geClientId = id;
  window._geOrigGroupName = c.relatedGroup || '';
  window._geMembers = [...memberIds];
  window._geGroupName = c.relatedGroup || (inGrp ? (c.rep||'') : '');
  // 대표업체: groupMain=true 인 멤버 우선, 없으면 수임일자 가장 빠른 멤버
  const csk2 = x => x.contractDate || 'ZZZZ';
  const byDate = [...memberIds].map(mid=>G.clients.find(x=>x.id===mid)).filter(Boolean)
    .sort((a,b)=>csk2(a).localeCompare(csk2(b))||a.name.localeCompare(b.name,'ko'));
  window._geMainId = (byDate.find(m=>m.groupMain)||byDate[0]||c).id;
  renderGroupEditModal();
}

function renderGroupEditModal() {
  const id = window._geClientId;
  const c = G.clients.find(x=>x.id===id); if (!c) return;
  const members = window._geMembers.map(mid=>G.clients.find(x=>x.id===mid)).filter(Boolean);
  showModal(`<div style="max-width:480px;width:min(480px,95vw)">
  <div class="modal-header"><h3>✏ 그룹 편집</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:14px">
      <div style="flex:1"><label class="flabel">그룹명</label>
        <input class="finput" id="ge-name" value="${esc(window._geGroupName||'')}" placeholder="그룹명 입력" style="margin-bottom:0" oninput="window._geGroupName=this.value"></div>
      ${members.length>1?`<button onclick="geDissolveGroup()" style="padding:7px 12px;border-radius:8px;font-size:12px;border:1px solid #ef9a9a;background:#fdecea;color:#c62828;cursor:pointer;font-family:inherit;white-space:nowrap;margin-bottom:1px">🔓 그룹 해산</button>`:''}
    </div>
    <label class="flabel">그룹 멤버 <span style="font-weight:400;color:#aaa">(${members.length}개 업체)</span></label>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px;max-height:200px;overflow-y:auto">
      ${members.length===0?`<div style="color:#aaa;font-size:13px;padding:8px">멤버 없음</div>`:
        members.map(m=>{
          const isMain = m.id===window._geMainId;
          const isCur = m.id===id;
          return `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid ${isCur?'#c0d4ff':isMain?'#ffe082':'#e8e8e8'};border-radius:8px;background:${isCur?'#f0f4ff':isMain?'#fffde7':'#fff'}">
          <div><div style="font-weight:600;font-size:13px">${isMain?'👑 ':''}${esc(m.name)}${isCur?'<span style="font-size:11px;color:#4f8ef7;margin-left:6px">(현재)</span>':''}${isMain?'<span style="font-size:10px;color:#f57c00;margin-left:6px;font-weight:700">대표</span>':''}</div>
          <div style="font-size:11px;color:#888">대표자: ${esc(m.rep||'-')} ${m.contractDate?`· 수임: ${esc(m.contractDate)}`:''}</div></div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            ${!isMain?`<button onclick="geSetMain(${m.id})" style="padding:3px 8px;border-radius:6px;font-size:11px;border:1px solid #ffe082;background:#fffde7;color:#f57c00;cursor:pointer;font-family:inherit">👑 대표</button>`:''}
            <button onclick="geRemoveMember(${m.id})" style="padding:3px 8px;border-radius:6px;font-size:12px;border:1px solid #ef9a9a;background:#fdecea;color:#c62828;cursor:pointer;font-family:inherit">✕</button>
          </div>
        </div>`}).join('')}
    </div>
    <label class="flabel">업체 추가</label>
    <div class="search-box" style="margin-bottom:6px;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:8px 12px">
      <span>🔍</span>
      <input id="ge-search" placeholder="업체명 또는 대표자 검색" oninput="geSearch(this.value)" autocomplete="off" style="border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;width:100%">
    </div>
    <div id="ge-search-results" style="max-height:150px;overflow-y:auto;margin-bottom:14px;border-radius:8px"></div>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="doGroupEdit()">💾 저장</button>
    </div>
  </div></div>`);
  setTimeout(()=>document.getElementById('ge-name')?.focus(), 80);
}

function geSearch(q) {
  const results = document.getElementById('ge-search-results');
  if (!q.trim()) { results.innerHTML=''; return; }
  const ql = q.toLowerCase();
  const found = G.clients.filter(cl=>
    !window._geMembers.includes(cl.id) &&
    (cl.name.toLowerCase().includes(ql)||(cl.rep||'').toLowerCase().includes(ql))
  ).slice(0,10);
  if (!found.length) { results.innerHTML=`<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">검색 결과 없음</div>`; return; }
  results.innerHTML = found.map(cl=>`
    <div onclick="geAddMember(${cl.id})" style="padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid #f0f0f0;margin-bottom:4px;background:#fff"
      onmouseover="this.style.background='#f0f4ff';this.style.borderColor='#c0d4ff'"
      onmouseout="this.style.background='#fff';this.style.borderColor='#f0f0f0'">
      <div style="font-weight:600;font-size:13px">${esc(cl.name)}</div>
      <div style="font-size:11px;color:#888;margin-top:2px">${esc(cl.rep||'')}${cl.relatedGroup?` · <span style="color:#4f8ef7">👥 ${esc(cl.relatedGroup)}</span>`:' · <span style="color:#bbb">그룹 없음</span>'}</div>
    </div>`).join('');
}

function geSetMain(clientId) {
  window._geGroupName = document.getElementById('ge-name')?.value ?? window._geGroupName;
  window._geMainId = clientId;
  renderGroupEditModal();
}

function geAddMember(clientId) {
  window._geGroupName = document.getElementById('ge-name')?.value ?? window._geGroupName;
  if (window._geMembers.includes(clientId)) { renderGroupEditModal(); return; }
  const cl = G.clients.find(x=>x.id===clientId);
  if (!cl) return;
  // 추가하려는 업체가 다른 그룹에 속해있으면 선택 팝업
  if (cl.relatedGroup && cl.relatedGroup !== (window._geGroupName||'')) {
    window._geConflictId = clientId;
    window._geConflictGroup = cl.relatedGroup;
    geShowConflictDialog();
    return;
  }
  window._geMembers.push(clientId);
  if (!window._geGroupName) {
    const c0 = G.clients.find(x=>x.id===window._geClientId);
    window._geGroupName = c0?.rep || c0?.name || cl?.rep || '';
  }
  renderGroupEditModal();
}

function geShowConflictDialog() {
  const clientId = window._geConflictId;
  const otherGroupName = window._geConflictGroup;
  const cl = G.clients.find(x=>x.id===clientId);
  const otherMembers = G.clients.filter(c=>c.relatedGroup===otherGroupName);
  const curGroupName = window._geGroupName || G.clients.find(x=>x.id===window._geClientId)?.name || '현재 그룹';
  showModal(`<div style="max-width:460px;width:min(460px,95vw)">
  <div class="modal-header"><h3>⚠ 그룹 충돌</h3><button class="close-btn" onclick="renderGroupEditModal()">✕</button></div>
  <div class="modal-body">
    <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px">
      <b>${esc(cl?.name||'')}</b>은(는) 이미 <b style="color:#4f8ef7">👥 ${esc(otherGroupName)}</b> 그룹의 멤버입니다.<br>
      <span style="font-size:11px;color:#888">멤버: ${otherMembers.map(m=>esc(m.name)).join(', ')}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button onclick="geConflictJoinOther()" style="padding:12px 14px;border-radius:10px;border:1.5px solid #4f8ef7;background:#f0f4ff;color:#1565c0;cursor:pointer;font-family:inherit;font-size:13px;text-align:left">
        <div style="font-weight:700">👉 <b>${esc(otherGroupName)}</b> 그룹에 합류</div>
        <div style="font-size:11px;color:#888;margin-top:2px">현재 편집 중인 멤버들이 '${esc(otherGroupName)}' 그룹으로 이동합니다</div>
      </button>
      <button onclick="geConflictTakeOne()" style="padding:12px 14px;border-radius:10px;border:1.5px solid #ff7043;background:#fff3e0;color:#e65100;cursor:pointer;font-family:inherit;font-size:13px;text-align:left">
        <div style="font-weight:700">✋ <b>${esc(cl?.name||'')}</b>만 현재 그룹으로 추가</div>
        <div style="font-size:11px;color:#888;margin-top:2px">나머지 멤버는 기존 그룹(${esc(otherGroupName)})에 유지</div>
      </button>
      <button onclick="geConflictTakeAll()" style="padding:12px 14px;border-radius:10px;border:1.5px solid #2e7d32;background:#e8f5e9;color:#1b5e20;cursor:pointer;font-family:inherit;font-size:13px;text-align:left">
        <div style="font-weight:700">➕ <b>${esc(otherGroupName)}</b> 그룹 전체를 현재 그룹으로</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${otherMembers.map(m=>esc(m.name)).join(', ')} 모두 합류</div>
      </button>
      <button onclick="renderGroupEditModal()" style="padding:10px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;color:#555;cursor:pointer;font-family:inherit;font-size:13px">취소</button>
    </div>
  </div></div>`);
}

function geConflictJoinOther() {
  const otherGroupName = window._geConflictGroup;
  const otherMemberIds = G.clients.filter(c=>c.relatedGroup===otherGroupName).map(c=>c.id);
  window._geGroupName = otherGroupName;
  window._geMembers = [...new Set([...window._geMembers, ...otherMemberIds])];
  const otherMain = G.clients.find(c=>c.relatedGroup===otherGroupName&&c.groupMain);
  if (otherMain) window._geMainId = otherMain.id;
  renderGroupEditModal();
}

function geConflictTakeOne() {
  const clientId = window._geConflictId;
  const cl = G.clients.find(x=>x.id===clientId);
  window._geMembers.push(clientId);
  if (!window._geGroupName) {
    const c0 = G.clients.find(x=>x.id===window._geClientId);
    window._geGroupName = c0?.rep || c0?.name || cl?.rep || '';
  }
  renderGroupEditModal();
}

function geConflictTakeAll() {
  const otherGroupName = window._geConflictGroup;
  const otherMemberIds = G.clients.filter(c=>c.relatedGroup===otherGroupName).map(c=>c.id);
  window._geMembers = [...new Set([...window._geMembers, ...otherMemberIds])];
  if (!window._geGroupName) {
    const c0 = G.clients.find(x=>x.id===window._geClientId);
    window._geGroupName = c0?.rep || c0?.name || '';
  }
  renderGroupEditModal();
}

function geRemoveMember(clientId) {
  window._geGroupName = document.getElementById('ge-name')?.value ?? window._geGroupName;
  window._geMembers = window._geMembers.filter(id=>id!==clientId);
  if (window._geMainId === clientId) window._geMainId = window._geMembers[0] || window._geClientId;
  renderGroupEditModal();
}

function geDissolveGroup() {
  if (!confirm('그룹을 해산하면 모든 멤버가 분리됩니다. 계속할까요?')) return;
  const allIds = [...window._geMembers];
  window._geMembers = [window._geClientId];
  window._geGroupName = '';
  allIds.filter(id=>id!==window._geClientId).forEach(id=>{
    const cl = G.clients.find(x=>x.id===id);
    if (cl) { cl.relatedGroup=''; cl.soloGroup=true; }
  });
  saveToLS();
  renderGroupEditModal();
}

function doGroupEdit() {
  const name = (document.getElementById('ge-name')?.value||window._geGroupName||'').trim();
  const c = G.clients.find(x=>x.id===window._geClientId); if (!c) return;
  const origName = window._geOrigGroupName;
  if (window._geMembers.length<=1) {
    c.relatedGroup=''; c.soloGroup=true;
  } else {
    if (!name) return alert('그룹명을 입력해주세요');
    window._geMembers.forEach(id=>{
      const cl=G.clients.find(x=>x.id===id);
      if (cl) { cl.relatedGroup=name; cl.soloGroup=false; cl.groupMain=(id===window._geMainId); }
    });
    if (origName) {
      G.clients.forEach(cl=>{
        if (cl.relatedGroup===origName&&!window._geMembers.includes(cl.id)) { cl.relatedGroup=''; cl.soloGroup=true; }
      });
    }
  }
  saveToLS(); closeModal(); renderClients();
}

function updateClientField(id, field, value) {
  const c = G.clients.find(x=>x.id===id); if(!c) return;
  if (field==='fee') value = Number(value)||0;
  if (field==='dealType') { c.dealType=value; c.dealTypes=[value]; }
  else if (field==='manager') { c.manager=value; c.managers=value?[value]:[]; }
  else c[field] = value;
  saveToLS();
}

function toggleExpand(id) {
  const row = document.getElementById('expand-'+id);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  document.querySelectorAll('.expand-row').forEach(r => { r.style.display = 'none'; });
  document.querySelectorAll('[id^="expand-arrow-"]').forEach(r => { r.textContent = '▼'; r.closest('tr')?.classList.remove('expanded'); });
  if (!isOpen) {
    row.style.display = '';
    const arrow = document.getElementById('expand-arrow-'+id);
    if (arrow) { arrow.textContent = '▲'; arrow.closest('tr')?.classList.add('expanded'); }
  }
}

function cycleFeeStatus(id) {
  const c = G.clients.find(x=>x.id===id); if(!c) return;
  const opts = ['수금완료','청구완료','미수금'];
  c.feeStatus = opts[(opts.indexOf(c.feeStatus)+1) % opts.length];
  saveToLS();
  const cell = document.querySelector(`#expand-arrow-${id}`).closest('tr').querySelectorAll('td')[7];
  if(cell) cell.innerHTML = badge(c.feeStatus, c.feeStatus==='수금완료'?'green':c.feeStatus==='청구완료'?'blue':'red');
}

function cycleStatus(id) {
  const c = G.clients.find(x=>x.id===id); if(!c) return;
  const opts = ['정상','주의','해지','폐업'];
  c.status = opts[(opts.indexOf(c.status)+1) % opts.length];
  saveToLS();
  const rows = document.querySelector(`#expand-arrow-${id}`).closest('tr').querySelectorAll('td');
  if(rows[6]) rows[6].innerHTML = badge(c.status, c.status==='정상'?'green':c.status==='주의'?'orange':'gray');
}

function deleteClient(id) {
  const c = G.clients.find(x=>x.id===id);
  if (!c) return;
  if (!confirm(`"${c.name}" 거래처를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  G.clients = G.clients.filter(x=>x.id!==id);
  for (const pKey of Object.keys(G.julgae)) { delete G.julgae[pKey][id]; }
  saveToLS();
  renderClients();
}

    </div>`;
  }).join('');

  const progressSection = !isTerminated?`
  <div class="detail-section">
    <div class="detail-section-title">이달 업무 진행</div>
    <div class="detail-section-body">
      ${[['dataReceived','자료 수령'],['bookkeeping','기장 완료'],['approved','결재 완료']].map(([f,l])=>`
      <div class="detail-row">
        <span class="lbl">${l}</span>
        <button onclick="toggleField(${c.id},'${f}');closeModal();openDetail(${c.id})" style="background:${c[f]?'#e8f5e9':'#fafafa'};border:2px solid ${c[f]?'#43a047':'#e0e0e0'};border-radius:20px;padding:4px 16px;font-size:12px;font-weight:600;color:${c[f]?'#2e7d32':'#aaa'};cursor:pointer;font-family:inherit">
          ${c[f]?'완료':'미완료'}
        </button>
      </div>`).join('')}
    </div>
  </div>`:'';

  const closureSection = c.status==='폐업'&&c.closureYear?`
  <div class="detail-section">
    <div class="detail-section-title">폐업 신고 관리 (${c.closureYear}년)</div>
    <div class="detail-section-body">
      ${[['closureTaxFiled','신고서 접수'],['closureTaxApproved','신고 완료']].map(([f,l])=>`

window.onFormSelect = function(field, val) {
  window._formData[field] = val;
  if (field === 'taxType') {
    const lbl = document.getElementById('f-jumin-label');
    if (lbl) lbl.textContent = val === '법인' ? '법인등록번호' : '주민등록번호';
  }
  if (field==='taxType'||field==='vatType') {
    // remove incompatible contracts
    const avail = CONTRACT_GROUPS.flatMap(g=>g.items).filter(i=>{
      const vat = field==='vatType'?val:window._formData.vatType;
      const tax = field==='taxType'?val:window._formData.taxType;
      return i.vat.includes(vat)&&i.tax.includes(tax);
    }).map(i=>i.key);
    window._formData.contracts = (window._formData.contracts||[]).filter(k=>avail.includes(k));
    document.getElementById('contract-area').innerHTML = (()=>{
      const avail2 = availableContracts(window._formData.vatType,window._formData.taxType);
      return avail2.map(g=>`<div class="contract-group"><div class="contract-group-title">${g.label}</div><div class="contract-chips">${g.items.map(item=>`<button type="button" class="contract-chip ${(window._formData.contracts||[]).includes(item.key)?'on':''}" onclick="toggleContract('${item.key}')">${item.label}</button>`).join('')}</div></div>`).join('');
    })();
  }
  if (field==='status') {
    document.getElementById('termination-area').innerHTML = (()=>{
      const s = val;
      if (s!=='해지'&&s!=='폐업') return '';
      return `<div style="background:#fafafa;border-radius:10px;padding:14px;border:1.5px solid #e0e0e0;display:flex;flex-direction:column;gap:12px">
        <div style="font-size:12px;font-weight:700;color:#e65100">해지 / 폐업 정보</div>
        <div class="form-grid">
          <div><label class="flabel">해지일자</label><input type="date" class="finput" oninput="window._formData.terminationDate=this.value"></div>
          <div><label class="flabel">해지 사유</label><select class="fsel" onchange="window._formData.terminationReason=this.value">
            <option value="">선택</option>
            <option value="폐업">폐업</option><option value="타회계사무소이전">타 회계사무소 이전</option><option value="기타">기타</option>
          </select></div>
        </div>
        ${s==='폐업'?'<div><label class="flabel">폐업연도</label><input type="number" class="finput" placeholder="예: 2024" oninput="window._formData.closureYear=this.value"></div>':''}
      </div>`;
    })();
  }
};

window.toggleFormDealType = function(v) {
  const arr = window._formData.dealTypes || [];
  if (arr.includes(v)) {
    if (arr.length === 1) return;
    window._formData.dealTypes = arr.filter(x=>x!==v);
  } else {
    window._formData.dealTypes = [...arr, v];
  }
  window._formData.dealType = window._formData.dealTypes[0];
  document.querySelectorAll('#form-dealTypes .contract-chip').forEach(el=>{
    el.classList.toggle('on', window._formData.dealTypes.includes(el.textContent.trim()));
  });
};

window.toggleFormManager = function(v) {
  const arr = window._formData.managers || [];
  window._formData.managers = arr.includes(v) ? arr.filter(x=>x!==v) : [...arr, v];
  window._formData.manager = window._formData.managers[0] || '';
  document.querySelectorAll('#form-managers .contract-chip').forEach(el=>{
    el.classList.toggle('on', window._formData.managers.includes(el.textContent.trim()));
  });
};

window.toggleContract = function(key) {
  const c = window._formData.contracts||[];
  window._formData.contracts = c.includes(key)?c.filter(x=>x!==key):[...c,key];
  document.querySelectorAll('.contract-chip').forEach(el=>{
    el.classList.toggle('on', window._formData.contracts.includes(el.textContent.trim()===contractLabel(key)?key:
      CONTRACT_GROUPS.flatMap(g=>g.items).find(i=>i.label===el.textContent.trim())?.key||''));
  });
  // redraw chips
  const area = document.getElementById('contract-area');
  if (area) {
    const avail = availableContracts(window._formData.vatType, window._formData.taxType);
    area.innerHTML = avail.map(g=>`<div class="contract-group"><div class="contract-group-title">${g.label}</div><div class="contract-chips">${g.items.map(item=>`<button type="button" class="contract-chip ${(window._formData.contracts||[]).includes(item.key)?'on':''}" onclick="toggleContract('${item.key}')">${item.label}</button>`).join('')}</div></div>`).join('');
  }
};

window.saveForm = function(id) {
  const d = window._formData;
  if (!d.name?.trim()) return alert('거래처명은 필수입니다');
  if (!d.rep?.trim()) return alert('대표자명은 필수입니다');

  // 상호+대표자 중복 검사
  const nameDup = G.clients.find(c =>
    c.id !== id &&
    c.name.trim() === d.name.trim() &&
    c.rep.trim() === d.rep.trim()
  );
  if (nameDup) {
    if (!confirm(`동일한 상호(${d.name})와 대표자명(${d.rep})의 거래처가 이미 있습니다.\n중복 업체입니까?\n\n[확인] 계속 추가  [취소] 돌아가기`)) return;
  }

  // 사업자번호 중복 검사
  const bn = (d.bizNo||'').replace(/[-\s]/g,'');
  if (bn) {
    const bizDup = G.clients.find(c => c.id !== id && c.bizNo && c.bizNo.replace(/[-\s]/g,'') === bn);
    if (bizDup) {
      if (!confirm(`사업자번호(${d.bizNo})가 이미 등록된 거래처(${bizDup.name})와 중복됩니다.\n부가세는 사업장별로 신고하므로 결재리스트에서 중복될 수 있습니다.\n\n[확인] 계속 추가  [취소] 돌아가기`)) return;
    }
  }

  // 주민번호/법인등록번호 중복 검사
  const jn = (d.jumin||'').replace(/[-\s]/g,'');
  if (jn) {
    const juminDup = G.clients.find(c => c.id !== id && c.jumin && c.jumin.replace(/[-\s]/g,'') === jn);
    if (juminDup) {
      const lbl = d.taxType === '법인' ? '법인등록번호' : '주민번호';
      const warn = d.taxType === '법인'
        ? '법인세는 법인별로 신고하므로 중복 신고가 발생할 수 있습니다.'
        : '소득세는 개인별로 신고하므로 중복 신고가 발생할 수 있습니다.';
      if (!confirm(`${lbl}가 이미 등록된 거래처(${juminDup.name})와 중복됩니다.\n${warn}\n\n[확인] 계속 추가  [취소] 돌아가기`)) return;
    }
  }

  // Ensure arrays are set for multi-value fields
  if (!d.dealTypes || !d.dealTypes.length) d.dealTypes = [d.dealType || '기장'];
  if (!d.managers) d.managers = [];
  d.dealType = d.dealTypes[0];
  d.manager = d.managers[0] || '';
  // If user explicitly set a group, clear solo flag
  if (d.relatedGroup && d.relatedGroup.trim()) d.soloGroup = false;

  if (id === null) {
    const newId = Date.now();
    G.clients.push({...d, id: newId});
    if (window._julgaeAddToPeriod) {
      const addPeriod = G.periods.find(p => p.id === window._julgaeAddToPeriod);
      if (addPeriod && addPeriod.enrolled && addPeriod.enrolled.length > 0) {
        addPeriod.enrolled.push(newId);
      }
      window._julgaeAddToPeriod = null;
    }
  } else {
    const idx = G.clients.findIndex(c=>c.id===id);
    if (idx>=0) G.clients[idx] = {...G.clients[idx],...d};
  }
  saveToLS();
  closeModal();
  if (G.currentTab==='clients') renderClients();
  else if (G.currentTab==='dashboard') renderDashboard();
  else if (G.currentTab==='closure') renderClosure();
  else if (G.currentTab==='julgae') renderJulgae();
};

function registerToPeriod(label, type) {
  const yr = new Date().getFullYear();
  const fullLabel = String(yr).slice(2) + '년 ' + label;
  const tpl = PERIOD_TEMPLATES.find(t => t.label === label);
  const existing = G.periods.find(p => p.label === fullLabel);
  if (existing) {
    if (!confirm(`"${fullLabel}" 리스트가 이미 있습니다.\n해당 리스트로 이동할까요?\n(새로 추가하려면 취소 후 신고 및 결재에서 직접 추가하세요)`)) return;
    G.julgaePeriodIdx = G.periods.indexOf(existing);
    switchTab('julgae');
    saveToLS();
    return;
  }
  if (!confirm(`"${fullLabel}"을 신고 및 결재 리스트에 추가할까요?`)) return;
  const id = (tpl ? tpl.tpl : 'custom') + '_' + yr + '_' + Date.now();
  const reportType = tpl ? tpl.reportType : undefined;
  const targetType = tpl ? tpl.targetType : '전체';
  G.periods.push({ id, label: fullLabel, type, targetType, reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  switchTab('julgae');
}

function prevYearPeriods(period) {
  if (!period || !period.reportType) return [];
  const m = (period.label||'').match(/^(\d{2})년/);
  if (!m) return [];
  const yr = 2000 + Number(m[1]);
  return G.periods.filter(p => {
    if (p.reportType !== period.reportType) return false;
    const m2 = (p.label||'').match(/^(\d{2})년/);
    return m2 && (2000 + Number(m2[1])) === yr - 1;
  });
}

window._julgaeYearsOpen = window._julgaeYearsOpen || {};
function toggleJulgaeYear(yr) {
  window._julgaeYearsOpen[yr] = !window._julgaeYearsOpen[yr];
  renderJulgae();
}

function renderJulgae() {
  const periods = G.periods;
  const idx = Math.min(G.julgaePeriodIdx, Math.max(0, periods.length - 1));
  const period = periods[idx];
  const q = G.julgaeSearch.toLowerCase();
  const mf = G.julgaeManagers || [];
  const pKey = period ? period.id : null;

  let baseClients = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  const hasEnroll = period && period.enrolled && period.enrolled.length > 0;
  if (hasEnroll) {
    baseClients = baseClients.filter(c => period.enrolled.includes(c.id));
  } else {
    baseClients = applyReportFilter(baseClients, period);
  }

  let clients = baseClients;
  if (mf.length > 0) {
    const hasNone = mf.includes('(없음)');
    clients = clients.filter(c => (hasNone && getManagers(c).length===0) || getManagers(c).some(m=>mf.includes(m)));
  }
  if (q) clients = clients.filter(c => c.name.toLowerCase().includes(q));
  const rq = G.julgaeRepSearch.toLowerCase();
  if (rq) clients = clients.filter(c => (c.rep||'').toLowerCase().includes(rq));

  const pKey2 = pKey || '';
  const ff = G.julgaeFeeFilter;
  if (ff === '수금') clients = clients.filter(c => julgaeVal(pKey2, c.id).s);
  else if (ff === '미수금') clients = clients.filter(c => { const v=julgaeVal(pKey2,c.id); return v.fee>0 && !v.s; });
  if (G.julgaeDataFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).d);
  else if (G.julgaeDataFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).d);
  if (G.julgaeBookFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).b);
  else if (G.julgaeBookFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).b);
  if (G.julgaeDoneFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).a);
  else if (G.julgaeDoneFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).a);

  const dataCount   = clients.filter(c => julgaeVal(pKey2, c.id).d).length;
  const bookCount   = clients.filter(c => julgaeVal(pKey2, c.id).b).length;
  const doneCount   = clients.filter(c => julgaeVal(pKey2, c.id).a).length;
  const total = clients.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;

  const managerSet = ['전체', ...new Set(baseClients.flatMap(c=>getManagers(c)))];
  if (baseClients.some(c=>getManagers(c).length===0)) managerSet.push('(없음)');

  const reportLabel = {vat:'부가세(일반·간이)',vat_hak_1:'부가세 확정1기(일반)',vat_hak_2:'부가세 확정2기(일반+간이)',vat_yej:'부가세 예정(법인 일반)',corp:'법인세(법인)',income:'종소세(개인,성실제외)',seongsi:'성실신고(성실)',sajup:'사업장현황(면세)',undefined:'전체'};

  // 전년도 동일 신고 데이터 (3개년: 전년·전전년)
  const _yrMatch = (period?.label||'').match(/^(\d{2})년/);
  const _baseYr = _yrMatch ? 2000 + Number(_yrMatch[1]) : 0;
  const prevPeriods1 = period ? prevYearPeriods(period) : [];
  const prevPeriods2 = (_baseYr > 0 && period) ? G.periods.filter(p => {
    if (p.reportType !== period.reportType) return false;
    const m2 = (p.label||'').match(/^(\d{2})년/);
    return m2 && (2000 + Number(m2[1])) === _baseYr - 2;
  }) : [];
  const prevPeriods = [...prevPeriods1, ...prevPeriods2];
  const prevMap1 = {}, prevMap2 = {};
  prevPeriods1.forEach(pp => {
    const ppData = G.julgae[pp.id] || {};
    Object.entries(ppData).forEach(([cidStr, v]) => {
      const cid = Number(cidStr);
      if (!prevMap1[cid]) prevMap1[cid] = {revenue:0, salesAmount:0, fee:0};
      prevMap1[cid].revenue     += (v&&v.revenue)||0;
      prevMap1[cid].salesAmount += (v&&v.salesAmount)||0;
      prevMap1[cid].fee         += (v&&v.fee)||0;
    });
  });
  prevPeriods2.forEach(pp => {
    const ppData = G.julgae[pp.id] || {};
    Object.entries(ppData).forEach(([cidStr, v]) => {
      const cid = Number(cidStr);
      if (!prevMap2[cid]) prevMap2[cid] = {revenue:0, salesAmount:0, fee:0};
      prevMap2[cid].revenue     += (v&&v.revenue)||0;
      prevMap2[cid].salesAmount += (v&&v.salesAmount)||0;
      prevMap2[cid].fee         += (v&&v.fee)||0;
    });
  });

  const rt = period ? (period.reportType||'') : '';
  const isIncomeType = ['corp','income','seongsi'].includes(rt);
  const isVatType = ['vat','vat_hak_1','vat_hak_2','vat_yej'].includes(rt);
  const isSajupType = rt === 'sajup';
  const isSeongsiType = rt === 'seongsi';
  const totalCols = isSeongsiType ? 16 : isIncomeType ? 15 : isVatType ? 11 : isSajupType ? 10 : 11;
  const feeFieldKey = REPORT_FEE_FIELD[rt] || 'fee';
  const _jFeeSum    = c => { const v=julgaeVal(pKey2,c.id); return (v.fee||0)+(isSeongsiType?(v.feeSeongsi||0):0); };
  const feeTotal    = clients.reduce((a,c) => a + _jFeeSum(c), 0);
  const feeCollected= clients.filter(c => julgaeVal(pKey2,c.id).s).reduce((a,c) => a + _jFeeSum(c), 0);
  const niInput = (cid, field, val, extraStyle='') =>
    `<input type="number" class="julgae-num-input" value="${val||''}" placeholder="0"
      onchange="updateJulgaeNum('${pKey2}',${cid},'${field}',this.value)"
      style="width:100%;text-align:right;border:1px solid #e0e0e0;border-radius:5px;padding:3px 5px;font-size:12px;font-family:inherit;${extraStyle}">`;

  document.getElementById('page-julgae').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:20px;font-weight:800">신고 및 결재</h2>
    <button class="btn-primary btn-sm" onclick="openAddPeriod()" style="padding:8px 14px">+ 신고리스트 추가</button>
  </div>

  ${periods.length === 0 ? `<div class="card" style="text-align:center;padding:40px;color:#aaa">
    신고리스트가 없습니다. <b>+ 신고리스트 추가</b> 버튼을 눌러 시작하세요.</div>` : `

  <div style="margin-bottom:16px">
    ${(()=>{
      const byYear = {}; const yearOrder = [];
      periods.forEach((p,i)=>{
        const m = p.label.match(/^(\d{2})년/);
        const yr = m ? (2000+Number(m[1])) : 'other';
        if (!byYear[yr]) { byYear[yr]=[]; yearOrder.push(yr); }
        byYear[yr].push({p,i});
      });
      const currentYr = new Date().getFullYear();
      yearOrder.forEach(yr=>{
        if (window._julgaeYearsOpen[yr]===undefined) {
          const hasSelected = byYear[yr].some(({i})=>i===idx);
          window._julgaeYearsOpen[yr] = hasSelected || yr===currentYr;
        }
      });
      return yearOrder.map(yr=>{
        const isOpen = window._julgaeYearsOpen[yr];
        const label = yr==='other'?'기타':(yr+'년');
        return `<div style="margin-bottom:6px">
          <button onclick="toggleJulgaeYear(${yr==='other'?'\'other\'':yr})" style="padding:5px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid #4f8ef7;background:#e8f0fe;color:#4f8ef7;margin-bottom:6px">
            ${label} ${isOpen?'▲':'▼'}
          </button>
          ${isOpen?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-left:4px">
            ${byYear[yr].map(({p,i})=>{
              const pEnroll = p.enrolled && p.enrolled.length > 0;
              return `<div style="display:flex;align-items:center;gap:3px">
                <button onclick="G.julgaePeriodIdx=${i};G.julgaeSearch='';G.julgaeRepSearch='';G.julgaeManagers=[];G.julgaeDataFilter='전체';G.julgaeBookFilter='전체';G.julgaeDoneFilter='전체';G.julgaeFeeFilter='전체';renderJulgae()"
                  style="padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:2px solid ${i===idx?'#4f8ef7':'#e0e0e0'};background:${i===idx?'#e8f0fe':'#fff'};color:${i===idx?'#4f8ef7':'#555'}">
                  ${esc(p.label)}${pEnroll?` <span style="font-size:10px;background:#4f8ef7;color:#fff;border-radius:10px;padding:1px 6px;margin-left:4px">${p.enrolled.length}</span>`:''}
                </button>
                <button onclick="deletePeriod('${p.id}')" style="padding:4px 7px;border-radius:6px;font-size:11px;border:1px solid #e0e0e0;background:#fff;color:#e53935;cursor:pointer;font-family:inherit" title="삭제">✕</button>
              </div>`;
            }).join('')}
          </div>`:''}
        </div>`;
      }).join('');
    })()}
  </div>

  ${period ? `
  <div class="stat-grid" style="margin-bottom:14px">
    <div class="stat-card" style="border-left:4px solid #4f8ef7">
      <div class="stat-label">대상 업체</div>
      <div class="stat-value" style="color:#4f8ef7">${total}</div>
      <div class="stat-sub">${(reportLabel[period.reportType]||'전체')} · ${hasEnroll?'수동 선택':'자동 분류'}</div>
    </div>
    <div class="stat-card" style="border-left:4px solid #1976d2">
      <div class="stat-label">자료수령</div>
      <div class="stat-value" style="color:#1976d2">${dataCount}<span style="font-size:13px;color:#aaa;font-weight:400"> / ${total}</span></div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${total?Math.round(dataCount/total*100):0}%"></div></div>
    </div>
    <div class="stat-card" style="border-left:4px solid #f57c00">
      <div class="stat-label">기장완료</div>
      <div class="stat-value" style="color:#f57c00">${bookCount}<span style="font-size:13px;color:#aaa;font-weight:400"> / ${total}</span></div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${total?Math.round(bookCount/total*100):0}%"></div></div>
    </div>
    <div class="stat-card" style="border-left:4px solid #2e7d32">
      <div class="stat-label">결재완료 ${pct}%</div>
      <div class="stat-value" style="color:#2e7d32">${doneCount}<span style="font-size:13px;color:#aaa;font-weight:400"> / ${total}</span></div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="stat-card" style="border-left:4px solid #7b1fa2">
      <div class="stat-label">수수료 청구</div>
      <div class="stat-value" style="font-size:16px;color:#7b1fa2">${feeTotal.toLocaleString()}원</div>
      <div class="stat-sub">수금 ${feeCollected.toLocaleString()}원 · 미수금 ${(feeTotal-feeCollected).toLocaleString()}원</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="btn-sm" style="background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9" onclick="openEnrollModal('${pKey}')">
      ☑ 업체 선택${hasEnroll?` (${period.enrolled.length})`:' (자동)'}
    </button>
    <button class="btn-sm" style="background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7" onclick="bulkJulgae('${pKey}',true)">전체 완료</button>
    <button class="btn-sm" style="background:#fdecea;color:#c62828;border:1.5px solid #ef9a9a" onclick="bulkJulgae('${pKey}',false)">전체 해제</button>
    <button class="btn-sm" style="background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80" onclick="window._julgaeAddToPeriod='${pKey}';openForm(null)">+ 업체 추가</button>
  </div>

  ${prevPeriods.length>0?`<div style="font-size:12px;color:#888;background:#fffde7;padding:6px 12px;border-radius:8px;margin-bottom:10px">💡 과거 동기(${prevPeriods.map(p=>esc(p.label)).join(', ')}) 수입금액·수수료청구액이 참고로 표시됩니다. (전년·전전년)</div>`:''}

  <div class="tbl-wrap">
  <table>
    <thead><tr>
      <th style="width:28px">번</th>
      <th style="padding:4px 6px">${(()=>{const a=G.julgaeSearch;return`<button onclick="openJulgaeNameSearch(this)" style="width:100%;padding:4px 7px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit;border:1.5px solid ${a?'#4f8ef7':'#ddd'};background:${a?'#e8f0fe':'#fff'};color:${a?'#1565c0':'#555'};display:flex;justify-content:space-between;align-items:center;gap:4px;"><span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a?esc(a):'거래처명'}</span><span style="font-size:9px;opacity:.5;flex-shrink:0">🔍</span></button>`;})()}</th>
      <th style="width:80px;padding:3px 4px">${(()=>{const a=G.julgaeRepSearch;return`<button onclick="openJulgaeRepSearch(this)" style="width:100%;padding:4px 6px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit;border:1.5px solid ${a?'#4f8ef7':'#ddd'};background:${a?'#e8f0fe':'#fff'};color:${a?'#1565c0':'#555'};display:flex;justify-content:space-between;align-items:center;gap:3px;"><span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a?esc(a):'대표자'}</span><span style="font-size:9px;opacity:.5;flex-shrink:0">🔍</span></button>`;})()}</th>
      <th style="padding:4px 6px">${filterPopupBtn('julgaeManagers','담당자')}</th>
      <th style="width:56px;text-align:center;padding:3px">${julgaeCycleBtn('julgaeDataFilter','자료')}</th>
      <th style="width:56px;text-align:center;padding:3px">${julgaeCycleBtn('julgaeBookFilter','기장')}</th>
      <th style="width:56px;text-align:center;padding:3px">${julgaeCycleBtn('julgaeDoneFilter','결재')}</th>
      ${isIncomeType?`
        <th style="width:100px;text-align:right">수입금액</th>
        <th style="width:100px;text-align:right">소득금액</th>
        <th style="width:55px;text-align:center">이익률</th>
        <th style="width:100px;text-align:right">과세표준</th>
        <th style="width:100px;text-align:right">결정세액</th>
        <th style="width:100px;text-align:right">납부세액</th>
        <th style="width:80px;text-align:right">주민세</th>
      `:isVatType?`
        <th style="width:110px;text-align:right">매출액</th>
        <th style="width:110px;text-align:right">매입액</th>
        <th style="width:110px;text-align:right">부가세</th>
      `:isSajupType?`
        <th style="width:110px;text-align:right">수입금액</th>
        <th style="width:110px;text-align:right">필요경비</th>
      `:`
        <th style="width:110px;text-align:right">수입금액</th>
        <th style="width:110px;text-align:right">소득금액</th>
        <th style="width:110px;text-align:right">과세표준</th>
      `}
      ${isSeongsiType?`<th style="width:110px;text-align:right">조정료</th><th style="width:110px;text-align:right">성실신고료</th>`:`<th style="width:110px;text-align:right">수수료청구</th>`}
      <th style="width:70px;text-align:center;padding:3px">${julgaeCycleBtn('julgaeFeeFilter','수금',['전체','수금','미수금'])}</th>
    </tr></thead>
    <tbody>
    ${clients.map((c, i) => {
      const v = julgaeVal(pKey2, c.id);
      const prev1 = prevMap1[c.id];
      const prev2 = prevMap2[c.id];
      const _prevRevVal1 = isVatType ? (prev1?.salesAmount||0) : (prev1?.revenue||0);
      const _prevRevVal2 = isVatType ? (prev2?.salesAmount||0) : (prev2?.revenue||0);
      const prevRevTxt = [
        _prevRevVal1 ? `<div style="font-size:10px;color:#aaa">전년:${_prevRevVal1.toLocaleString()}</div>` : '',
        _prevRevVal2 ? `<div style="font-size:10px;color:#aaa">전전년:${_prevRevVal2.toLocaleString()}</div>` : ''
      ].join('');
      const prevFeeTxt = [
        prev1?.fee ? `<div style="font-size:10px;color:#aaa">전년:${prev1.fee.toLocaleString()}</div>` : '',
        prev2?.fee ? `<div style="font-size:10px;color:#aaa">전전년:${prev2.fee.toLocaleString()}</div>` : ''
      ].join('');
      const autoFee  = v.fee       || (c[feeFieldKey]   || 0);
      const autoFee2 = v.feeSeongsi || (c.feeSeongsi     || 0);
      const rowBg = v.s?'#e8f5e9':v.a?'#f1f8e9':'#fff';
      const margin = (v.revenue&&v.income) ? (v.income/v.revenue*100).toFixed(1) : null;
      const _revVal4bosu = isVatType ? (v.salesAmount||0) : (v.revenue||0);
      const _bosuRec = getBosuFeeRec(_revVal4bosu, period.reportType);
      const bosuBadge = (_bosuRec && _bosuRec.fee > 0)
        ? `<div onclick="applyBosuFee('${pKey2}',${c.id},'${_bosuRec.field}',${_bosuRec.fee})" style="font-size:9px;color:#7b1fa2;background:#f3e5f5;border-radius:4px;padding:2px 5px;cursor:pointer;margin-top:2px;text-align:right;white-space:nowrap" title="클릭하여 수수료 자동입력">💡 추천 ${_bosuRec.fee.toLocaleString()}원</div>`
        : '';
      return `<tr id="jr-${pKey2}-${c.id}" style="background:${rowBg}">
        <td style="color:#aaa;font-size:11px">${i+1}</td>
        <td><div class="td-name">${esc(c.name)}</div></td>
        <td style="font-size:12px;color:#444">${esc(c.rep)||'-'}</td>
        <td style="color:#555;font-size:12px">${getManagers(c).join(', ')||'-'}</td>
        <td style="text-align:center" onclick="toggleJulgaeField('${pKey2}',${c.id},'d')">
          <div class="chk ${v.d?'on':''}" style="margin:0 auto;width:24px;height:24px">${v.d?'✓':''}</div>
        </td>
        <td style="text-align:center" onclick="toggleJulgaeField('${pKey2}',${c.id},'b')">
          <div class="chk ${v.b?'on':''}" style="margin:0 auto;width:24px;height:24px">${v.b?'✓':''}</div>
        </td>
        <td style="text-align:center" onclick="toggleJulgaeField('${pKey2}',${c.id},'a')">
          <div class="chk ${v.a?'on':''}" style="margin:0 auto;width:24px;height:24px">${v.a?'✓':''}</div>
        </td>
        ${isIncomeType?`
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'revenue',v.revenue)}${prevRevTxt}${bosuBadge}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'income',v.income)}</td>
          <td style="text-align:center;padding:4px;font-size:12px;font-weight:700;${margin!==null?(Number(margin)<0?'color:#e53935':'color:#2e7d32'):'color:#ccc'}">${margin!==null?margin+'%':'-'}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'taxBase',v.taxBase)}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'taxAmount',v.taxAmount)}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'payTax',v.payTax)}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'residentTax',v.residentTax)}</td>
        `:isVatType?`
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'salesAmount',v.salesAmount)}${prevRevTxt}${bosuBadge}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'purchaseAmount',v.purchaseAmount)}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'vatAmount',v.vatAmount)}</td>
        `:isSajupType?`
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'revenue',v.revenue)}${prevRevTxt}${bosuBadge}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'expenses',v.expenses)}</td>
        `:`
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'revenue',v.revenue)}${prevRevTxt}${bosuBadge}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'income',v.income)}</td>
          <td style="text-align:right;padding:4px 8px">${niInput(c.id,'taxBase',v.taxBase)}</td>
        `}
        ${isSeongsiType?`
          <td style="text-align:right;padding:4px 8px">
            ${niInput(c.id,'fee',autoFee,autoFee?'font-weight:700;color:#7b1fa2':'')}
            ${prevFeeTxt}
          </td>
          <td style="text-align:right;padding:4px 8px">
            ${niInput(c.id,'feeSeongsi',autoFee2,autoFee2?'font-weight:700;color:#7b1fa2':'')}
          </td>
        `:`
          <td style="text-align:right;padding:4px 8px">
            ${niInput(c.id,'fee',autoFee,autoFee?'font-weight:700;color:#7b1fa2':'')}
            ${prevFeeTxt}

        `}

    </tbody>

}

function toggleJulgaeField(pKey, clientId, field) {
  if (!pKey) return;
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const cur = julgaeVal(pKey, clientId);
  cur[field] = !cur[field];
  G.julgae[pKey][clientId] = cur;
  saveToLS();
  renderJulgae();
}

function updateJulgaeNum(pKey, clientId, field, rawVal) {
  if (!pKey) return;
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const cur = julgaeVal(pKey, clientId);
  cur[field] = Number(rawVal) || 0;
  G.julgae[pKey][clientId] = cur;
  if (field === 'fee' || field === 'feeSeongsi') {
    const period = G.periods.find(p => p.id === pKey);
    const client = G.clients.find(c => c.id === clientId);
    if (client && period) {
      if (field === 'feeSeongsi') {
        client.feeSeongsi = Number(rawVal) || 0;
      } else {
        const feeField = REPORT_FEE_FIELD[period.reportType];
        if (feeField) client[feeField] = Number(rawVal) || 0;
      }
    }
  }
  saveToLS();
  if (G.currentTab === 'fees') renderFees();
  else if (G.currentTab === 'dashboard') renderDashboard();
}

function bulkJulgae(pKey, val) {
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const mf = G.julgaeManagers || [];
  let clients = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  if (mf.length > 0) {
    const hasNone = mf.includes('(없음)');
    clients = clients.filter(c => (hasNone && getManagers(c).length===0) || getManagers(c).some(m=>mf.includes(m)));
  }
  clients.forEach(c => {
    const cur = julgaeVal(pKey, c.id);
    G.julgae[pKey][c.id] = {...cur, d:val, b:val, a:val};
  });
  saveToLS();
  renderJulgae();
}

function toggleEnrollFilter(type, val, btn) {
  const arr = window._enrollFilters[type];
  if (arr.includes(val)) {
    window._enrollFilters[type] = arr.filter(x=>x!==val);
    btn.style.borderColor='#e0e0e0'; btn.style.background='#fff'; btn.style.color='#555';
  } else {
    window._enrollFilters[type] = [...arr, val];
    btn.style.borderColor='#4f8ef7'; btn.style.background='#e8f0fe'; btn.style.color='#1565c0';
  }
  applyEnrollFilters();
}

function applyEnrollFilters() {
  const q = (document.getElementById('enroll_search')?.value||'').toLowerCase();
  const {dealTypes,taxTypes,vatTypes} = window._enrollFilters||{dealTypes:[],taxTypes:[],vatTypes:[]};
  document.querySelectorAll('#enroll_list label[data-cid]').forEach(el => {
    const elDeals = (el.dataset.deal||'').split(',').filter(Boolean);
    const matchQ = !q || el.textContent.toLowerCase().includes(q);
    const matchDeal = dealTypes.length===0 || elDeals.some(d=>dealTypes.includes(d));
    const matchTax  = taxTypes.length===0  || taxTypes.includes(el.dataset.tax||'');
    const matchVat  = vatTypes.length===0  || vatTypes.includes(el.dataset.vat||'');
    el.style.display = (matchQ&&matchDeal&&matchTax&&matchVat)?'':'none';
  });
  document.querySelectorAll('#enroll_list [data-group]').forEach(grp => {
    const hasVisible = [...grp.querySelectorAll('label[data-cid]')].some(el=>el.style.display!=='none');
    grp.style.display = hasVisible?'':'none';
  });
}


function enrollAll(val) {
  document.querySelectorAll('#enroll_list .enroll-chk').forEach(chk => {
    const label = chk.closest('label');
    if (!label || label.style.display === 'none') return;
    chk.checked = val;
  });

}

function enrollGroup(btn, manager, val) {
  const group = btn.closest('div[style*="margin-bottom:12px"]');
  if (!group) return;
  group.querySelectorAll('.enroll-chk').forEach(chk => chk.checked = val);
  updateEnrollCount();
}

function updateEnrollCount() {
  const checked = document.querySelectorAll('#enroll_list .enroll-chk:checked').length;
  const total = document.querySelectorAll('#enroll_list .enroll-chk').length;
  const el = document.getElementById('enroll_count');
  if (el) el.textContent = checked === total ? '(전체 포함)' : checked + '개 선택됨';
}

function saveEnrollment(pKey) {
  const idx = G.periods.findIndex(p => p.id === pKey);
  if (idx < 0) return;
  const period = G.periods[idx];
  const all = document.querySelectorAll('#enroll_list .enroll-chk');
  const total = all.length;
  let checked = [...all].filter(c => c.checked).map(c => Number(c.dataset.id));

  const enrolledClients = checked.map(cid => G.clients.find(c => c.id === cid)).filter(Boolean);

  // 부가세 신고: 사업자번호 중복 감지
  const isVat = period.reportType === 'vat' || period.type === '부가세';
  const isIncome = ['income','seongsi','sajup'].includes(period.reportType) || period.type === '소득세';

  if (isVat) {
    const bizGroups = {};
    enrolledClients.forEach(c => {
      const key = (c.bizNo||'').replace(/[-\s]/g,'');
      if (!key) return;
      if (!bizGroups[key]) bizGroups[key] = [];
      bizGroups[key].push(c);
    });
    const dups = Object.values(bizGroups).filter(g => g.length > 1);
    if (dups.length > 0) {
      const dupMsg = dups.map(g => `  · ${g.map(c=>c.name).join(', ')} (사업자번호: ${g[0].bizNo})`).join('\n');
      if (confirm(`부가세는 사업장별로 신고합니다. 동일 사업자번호 중복이 있습니다:\n${dupMsg}\n\n[확인] 각 사업자번호 중 첫 번째만 남기고 제거  [취소] 그대로 유지`)) {
        const seen = new Set();
        const toKeep = new Set();
        enrolledClients.forEach(c => {
          const key = (c.bizNo||'').replace(/[-\s]/g,'');
          if (!key || !seen.has(key)) { toKeep.add(c.id); if (key) seen.add(key); }
        });
        checked = checked.filter(id => toKeep.has(id));
      }
    }
  }

  const isCorpTax = period.reportType === 'corp';
  if (isIncome || isCorpTax) {
    const juminGroups = {};
    enrolledClients.forEach(c => {
      const key = (c.jumin||'').replace(/[-\s]/g,'');
      if (!key) return;
      if (!juminGroups[key]) juminGroups[key] = [];
      juminGroups[key].push(c);
    });
    const dups = Object.values(juminGroups).filter(g => g.length > 1);
    if (dups.length > 0) {
      const dupMsg = dups.map(g => `  · ${g.map(c=>c.name).join(', ')}`).join('\n');
      const lbl = isCorpTax ? '법인등록번호' : '주민번호';
      const taxLabel = isCorpTax ? '법인세는 법인별로' : '소득세는 개인별로';
      alert(`${taxLabel} 신고합니다. 동일 ${lbl} 중복이 있습니다:\n${dupMsg}\n\n중복 여부를 직접 확인하고 제거해 주세요.`);
    }
  }

  // 전체 선택 시 enrolled를 비워서 "자동 분류" 상태로 복귀
  G.periods[idx].enrolled = checked.length === total ? [] : checked;
  saveToLS();
  closeModal();
  renderJulgae();
}

// ══════════════════════════════════════════════════════
// 수수료 탭
// ══════════════════════════════════════════════════════
function currentYM() {
  const n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0');
}

function ymLabel(ym) {
  const [y, m] = ym.split('-');
  return y + '년 ' + Number(m) + '월';
}

function clientMonths(c) {
  if (!c.contractDate) return [];
  const start = new Date(c.contractDate);
  if (isNaN(start)) return [];
  const now = new Date();
  const months = [];
  let d = new Date(start.getFullYear(), start.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth(), 1);
  while (d <= end) {
    months.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
    d.setMonth(d.getMonth()+1);
  }
  return months;
}

function toggleMonthlyFee(clientId, ym) {
  if (!G.monthlyFees[clientId]) G.monthlyFees[clientId] = {};
  G.monthlyFees[clientId][ym] = !G.monthlyFees[clientId][ym];
  saveToLS();
  renderFees();
}

function renderFees() {
  if (!G.feesYM) G.feesYM = currentYM();
  const ym = G.feesYM;

  // 월정 수수료 대상: 기장/고문/성실 활성 거래처
  const monthlyClients = G.clients.filter(c =>
    c.status !== '해지' && c.status !== '폐업' &&
    getDealTypes(c).some(d => ['기장','고문','성실'].includes(d))
  );

  // 이 달 수임 이후인 거래처만 + 수수료 0원 제외
  const feeClients = monthlyClients.filter(c => {
    if (!c.fee) return false; // 수수료 0원 제외
    if (!c.contractDate) return true;
    const s = c.contractDate.slice(0,7);
    return s <= ym;
  });

  const mFeeTotal     = feeClients.reduce((a,c)=>a+(c.fee||0),0);
  const mFeeCollected = feeClients.filter(c=>G.monthlyFees[c.id]?.[ym]).reduce((a,c)=>a+(c.fee||0),0);
  const mFeeUnpaid    = mFeeTotal - mFeeCollected;
  const mFeePct       = mFeeTotal ? Math.round(mFeeCollected/mFeeTotal*100) : 0;

  // 신고 수수료: julgae 전체에서 fee > 0인 항목
  const filingFees = [];
  for (const pKey of Object.keys(G.julgae)) {
    const period = G.periods.find(p=>p.id===pKey);
    if (!period) continue;
    const pData = G.julgae[pKey];
    for (const [cidStr, v] of Object.entries(pData)) {
      if (!v || !v.fee) continue;
      const cid = Number(cidStr);
      const client = G.clients.find(c=>c.id===cid);
      if (!client) continue;
      filingFees.push({period, client, fee:v.fee, collected:!!v.s, pKey, cid});
    }
  }
  filingFees.sort((a,b)=>a.period.label.localeCompare(b.period.label));

  const fTotal     = filingFees.reduce((a,x)=>a+x.fee,0);
  const fCollected = filingFees.filter(x=>x.collected).reduce((a,x)=>a+x.fee,0);
  const fUnpaid    = fTotal - fCollected;

  const grandTotal     = mFeeTotal + fTotal;
  const grandCollected = mFeeCollected + fCollected;
  const grandUnpaid    = grandTotal - grandCollected;

  // 월 네비게이션
  function adjYM(ym, delta) {
    const [y,m] = ym.split('-').map(Number);
    const d = new Date(y, m-1+delta, 1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }
  const prevYM = adjYM(ym,-1);
  const nextYM = adjYM(ym,1);
  const isCurrentMonth = ym === currentYM();

  const monthlyRows = feeClients.map(c => {
    const collected = G.monthlyFees[c.id]?.[ym] || false;
    return `<tr style="background:${collected?'#e8f5e9':'#fff'}">
      <td><div style="font-weight:600;font-size:13px">${esc(c.name)}</div><div style="font-size:11px;color:#888">${esc(c.rep)}</div></td>
      <td>${getDealTypes(c).map(d=>dealBadge(d)).join('')}</td>
      <td style="color:#555;font-size:12px">${getManagers(c).join(', ')||'-'}</td>
      <td style="font-size:11px;color:#888">${c.contractDate?c.contractDate.slice(0,7):'-'}</td>
      <td style="text-align:right;font-weight:700;color:#7b1fa2">${(c.fee||0).toLocaleString()}원</td>
      <td style="text-align:center" onclick="toggleMonthlyFee(${c.id},'${ym}')">
        <div class="chk ${collected?'on':''}" style="margin:0 auto;width:26px;height:26px;${collected?'background:#c8e6c9;border-color:#2e7d32;color:#2e7d32':''}">${collected?'💰':''}</div>
      </td>
    </tr>`;
  }).join('');

  const filingRows = filingFees.map(x => `
    <tr style="background:${x.collected?'#e8f5e9':'#fff'}">
      <td><div style="font-weight:600;font-size:12px">${esc(x.period.label)}</div></td>
      <td><div style="font-weight:600;font-size:13px">${esc(x.client.name)}</div><div style="font-size:11px;color:#888">${esc(x.client.rep)}</div></td>
      <td style="color:#555;font-size:12px">${esc(x.client.manager||'-')}</td>
      <td style="text-align:right;font-weight:700;color:#7b1fa2">${x.fee.toLocaleString()}원</td>
      <td style="text-align:center" onclick="toggleJulgaeField('${x.pKey}',${x.cid},'s');renderFees()">
        <div class="chk ${x.collected?'on':''}" style="margin:0 auto;width:26px;height:26px;${x.collected?'background:#c8e6c9;border-color:#2e7d32;color:#2e7d32':''}">${x.collected?'💰':''}</div>
      </td>
    </tr>`).join('');

  document.getElementById('page-fees').innerHTML = `
  <div style="margin-bottom:20px"><h2 style="font-size:20px;font-weight:800">💰 수수료 관리</h2></div>

  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card" style="border-top:4px solid #4f8ef7"><div class="stat-label">총 청구</div><div class="stat-value" style="font-size:18px;color:#4f8ef7">${grandTotal.toLocaleString()}원</div></div>
    <div class="stat-card" style="border-top:4px solid #2e7d32"><div class="stat-label">수금 완료</div><div class="stat-value" style="font-size:18px;color:#2e7d32">${grandCollected.toLocaleString()}원</div></div>
    <div class="stat-card" style="border-top:4px solid #e53935"><div class="stat-label">미수금</div><div class="stat-value" style="font-size:18px;color:#e53935">${grandUnpaid.toLocaleString()}원</div></div>
  </div>

  <!-- 월정 수수료 -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">

function applyPeriodTemplate(tplKey) {
  const t = PERIOD_TEMPLATES.find(x=>x.tpl===tplKey);
  if (!t) return;
  const yr = new Date().getFullYear();
  const label = String(yr).slice(2) + '년 ' + t.label;
  if (G.periods.some(p=>p.label===label)) {
    if (!confirm(`"${label}" 리스트가 이미 있습니다.\n그래도 새로 추가하시겠습니까?`)) return;
  }
  const id = tplKey + '_' + yr + '_' + Date.now();
  G.periods.push({ id, label, type: t.type, targetType: t.targetType, reportType: t.reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  closeModal();
  renderJulgae();
}

function savePeriod() {
  const label = document.getElementById('p-label').value.trim();
  if (!label) return alert('리스트 이름을 입력해주세요');
  if (G.periods.some(p=>p.label===label)) {
    if (!confirm(`"${label}" 리스트가 이미 있습니다.\n그래도 새로 추가하시겠습니까?`)) return;
  }
  const type = document.getElementById('p-type').value;
  const reportType = document.getElementById('p-reporttype').value || undefined;
  const targetMap = {vat:'전체',vat_hak_1:'전체',vat_hak_2:'전체',vat_yej:'법인',corp:'법인',income:'개인',seongsi:'개인',sajup:'개인'};
  const targetType = reportType ? (targetMap[reportType]||'전체') : '전체';
  const id = 'p_' + Date.now();
  G.periods.push({ id, label, type, targetType, reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  closeModal();
  renderJulgae();
}

function deletePeriod(id) {
  if (!confirm('이 신고기간과 결재 데이터를 삭제하시겠습니까?')) return;
  G.periods = G.periods.filter(p => p.id !== id);
  delete G.julgae[id];
  G.julgaePeriodIdx = Math.max(0, Math.min(G.julgaePeriodIdx, G.periods.length - 1));
  saveToLS();
  renderJulgae();
}
