<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxManager — 세무사무소 거래처 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
:root{--blue:#4f8ef7;--purple:#a259ff;--green:#2e7d32;--red:#c62828;--orange:#e65100}

/* ── 헤더 */
#header{background:#1a1a2e;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
#logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#4f8ef7,#a259ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
#header-btns{display:flex;gap:8px;align-items:center}
.hbtn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.hbtn.blue{background:rgba(79,142,247,.25);color:#4f8ef7}
.badge-alert{background:#e53935;border-radius:12px;padding:2px 8px;font-size:12px;font-weight:700}

/* ── 탭 */
#tabs{background:#242440;display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap}
.tab{background:transparent;border:none;color:rgba(255,255,255,.7);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:6px}
.tab.active{background:rgba(79,142,247,.28);color:#4f8ef7}

/* ── 컨테이너 */
#main{max-width:1200px;margin:0 auto;padding:20px 16px}

/* ── 카드 */
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-weight:700;font-size:15px;margin-bottom:12px}

/* ── 통계 그리드 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:800}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}

/* ── 배지 */
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-green{background:#e6f4ea;color:#1e7e34}
.badge-red{background:#fdecea;color:#c62828}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-purple{background:#f3e5f5;color:#6a1b9a}
.badge-gray{background:#f5f5f5;color:#555}

/* ── 필터바 */
.filter-bar{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{display:flex;align-items:center;gap:6px;flex:1 1 200px;background:#f5f5f5;border-radius:8px;padding:7px 12px}
.search-box input{border:none;background:transparent;font-size:13px;outline:none;width:100%;color:#333;font-family:inherit}
.filter-bar select{padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;background:#fff;cursor:pointer;font-family:inherit;color:#333}

/* ── 테이블 */
.tbl-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
thead tr{background:#f8f9ff;border-bottom:2px solid #e8eaf6}
th{padding:10px 12px;text-align:left;font-weight:700;color:#555;white-space:nowrap;font-size:12px}
tbody tr{border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
tbody tr:nth-child(even){background:#fafbff}
tbody tr:hover{background:#e8f0fe}
td{padding:10px 12px;vertical-align:middle}
.td-name{font-weight:700;font-size:13px}
.td-sub{font-size:11px;color:#999}

/* ── 체크박스 */
.chk{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:2px solid #e0e0e0;background:#fafafa}
.chk.on{background:#e8f5e9;border-color:#43a047;color:#43a047}

/* ── 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:17px;font-weight:800}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.close-btn{background:transparent;border:none;cursor:pointer;color:#888;font-size:20px;font-family:inherit;line-height:1}

/* ── 폼 */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.full{grid-template-columns:1fr}
label.flabel{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px}
input.finput,select.fsel,textarea.ftarea{width:100%;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box}
select.fsel{background:#fff;cursor:pointer}
textarea.ftarea{resize:vertical}
input.finput:focus,select.fsel:focus,textarea.ftarea:focus{border-color:#4f8ef7}

/* ── 버튼 */
.btn-primary{background:linear-gradient(135deg,#4f8ef7,#a259ff);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-secondary{background:#f5f5f5;color:#555;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.btn-green{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-sm{padding:5px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-row .btn-primary{flex:2}.btn-row .btn-secondary{flex:1}

/* ── 상세 섹션 */
.detail-section{margin-bottom:14px}
.detail-section-title{font-size:11px;font-weight:700;color:#4f8ef7;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.detail-section-body{background:#fafbff;border-radius:10px;padding:2px 14px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-row .lbl{color:#888}

/* ── 진행 바 */
.progress-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#4f8ef7,#2e7d32);border-radius:3px}

/* ── AI 도구 카드 */
.tool-card{background:#fff;border-radius:16px;padding:22px;cursor:pointer;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,.07);border:2px solid transparent;transition:box-shadow .15s,border-color .15s;width:100%}
.tool-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.tool-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}

/* ── AI 결과 */
.ai-result{background:#fafbff;border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.9;white-space:pre-wrap;border-left:3px solid #4f8ef7}
.sms-bubble{background:#e3f2fd;border-radius:0 14px 14px 14px;padding:12px 14px;font-size:14px;line-height:1.8;white-space:pre-wrap;display:inline-block;max-width:100%}

/* ── 로딩 */
#loading{text-align:center;padding:60px 20px;color:#888}
#loading .spin{font-size:40px;display:block;margin-bottom:12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 반응형 */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  #header-btns .hbtn span{display:none}
  th:nth-child(n+7){display:none}
  td:nth-child(n+7){display:none}
}

/* ── 수임항목 그룹 */
.contract-group{margin-bottom:10px}
.contract-group-title{font-size:11px;font-weight:700;color:#4f8ef7;margin-bottom:6px;text-transform:uppercase}
.contract-chips{display:flex;flex-wrap:wrap;gap:6px}
.contract-chip{padding:6px 13px;border-radius:20px;border:2px solid #e0e0e0;background:#fff;color:#888;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.contract-chip.on{border-color:#4f8ef7;background:#e8f0fe;color:#4f8ef7}
.contract-chip.disabled{opacity:.3;cursor:not-allowed}

/* ── 인쇄 */
@media print{#header,#tabs,.filter-bar,.btn-row,#header-btns{display:none!important}#main{padding:0}table{font-size:11px}}

/* ── 확장 행 */
.expand-row td{background:#f0f4ff;padding:0}
.client-row.expanded{background:#e8f0fe!important}
.client-row.expanded:hover{background:#dce8fd!important}
.expand-inner{display:flex;flex-wrap:wrap;gap:14px 24px;padding:14px 16px;align-items:flex-start;border-top:1px solid #c5cae9}
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <div id="logo">
    <div id="logo-icon">T</div>
    TaxManager
  </div>
  <div id="header-btns">
    <span id="badge-no-data" class="badge-alert" style="display:none"></span>
    <button class="hbtn" onclick="openSettings()">⚙ 설정</button>
    <button class="hbtn blue" onclick="openExcel()">↓ 엑셀</button>
    <button class="hbtn" id="save-btn" onclick="manualSave()" style="background:rgba(46,125,50,.3);color:#81c784">💾 저장</button>
    <span id="save-toast" style="display:none;font-size:12px;color:#81c784;font-weight:700">✔ 저장됨</span>
  </div>
</div>

<!-- 탭 -->
<div id="tabs">
  <button class="tab active" onclick="switchTab('dashboard')" id="tab-dashboard">🏠 대시보드</button>
  <button class="tab" onclick="switchTab('clients')" id="tab-clients">👥 거래처 목록</button>
  <button class="tab" onclick="switchTab('schedule')" id="tab-schedule">📅 신고 일정</button>
  <button class="tab" onclick="switchTab('fees')" id="tab-fees">💰 수수료</button>
  <button class="tab" onclick="switchTab('closure')" id="tab-closure">📁 해지·폐업</button>
  <button class="tab" onclick="switchTab('julgae')" id="tab-julgae">✅ 신고 및 결재</button>
  <button class="tab" onclick="switchTab('aitools')" id="tab-aitools">✦ AI 도구</button>
</div>

<!-- 메인 -->
<div id="main">
  <div id="loading"><span class="spin">⏳</span><div style="font-weight:700;font-size:16px">거래처 데이터 로딩 중...</div><div style="font-size:13px;margin-top:6px">552개 거래처 데이터를 불러오고 있습니다</div></div>
  <div id="page-dashboard" style="display:none"></div>
  <div id="page-clients" style="display:none"></div>
  <div id="page-schedule" style="display:none"></div>
  <div id="page-fees" style="display:none"></div>
  <div id="page-closure" style="display:none"></div>
  <div id="page-julgae" style="display:none"></div>
  <div id="page-aitools" style="display:none"></div>
</div>

<!-- 모달 컨테이너 -->
<div id="modal-container"></div>

async function decompressB64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const reader = ds.readable.getReader();
  const out = []; let total = 0;
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    out.push(value); total += value.length;
  }
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const c of out) { merged.set(c, offset); offset += c.length; }
  return new TextDecoder().decode(merged);
}

  sajup:   c => c.vatType === '면세',

function applyReportFilter(clients, period) {
  if (!period) return clients;
  if (period.reportType && REPORT_TYPE_FILTERS[period.reportType]) {
    return clients.filter(REPORT_TYPE_FILTERS[period.reportType]);
  }
  if (period.targetType === '법인') return clients.filter(c => c.taxType === '법인');
  if (period.targetType === '개인') return clients.filter(c => c.taxType === '개인');
  return clients;
}

    collected: active.filter(c => c.feeStatus==='수금완료').reduce((s,c)=>s+c.fee,0),
    terminated: G.clients.filter(c=>c.status==='해지').length,
    closure: G.clients.filter(c=>c.status==='폐업').length,
    closurePending: G.clients.filter(c=>c.status==='폐업'&&!c.closureTaxApproved).length,
  };
}

// ══════════════════════════════════════════════════════
// 필터링
// ══════════════════════════════════════════════════════
function filteredClients() {
  return G.clients.filter(c => {
    if (!G.showTerminated && (c.status==='해지'||c.status==='폐업')) return false;
    if (G.searchText) {
      const q = G.searchText;
      if (!c.name.includes(q) && !c.rep.includes(q) && !c.phone.includes(q) && !c.bizType.includes(q)) return false;
    }
    if (G.filterManager === '(없음)') { if (c.manager) return false; }
    else if (G.filterManager !== '전체' && c.manager !== G.filterManager) return false;
    if (G.filterTaxType !== '전체' && c.taxType !== G.filterTaxType) return false;
    if (G.filterVatType !== '전체' && c.vatType !== G.filterVatType) return false;
    if (G.filterFeeStatus !== '전체' && c.feeStatus !== G.filterFeeStatus) return false;
    if (G.filterDealType !== '전체' && c.dealType !== G.filterDealType) return false;
    return true;
  });
}

// ══════════════════════════════════════════════════════
// HTML 헬퍼
// ══════════════════════════════════════════════════════
function badge(label, color='gray') {
  return `<span class="badge badge-${color}">${esc(label)}</span>`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function chk(val, onclick='') {
  return `<div class="chk ${val?'on':''}" onclick="${onclick}">${val?'✓':''}</div>`;
}
function dealBadge(d) {
  const map={기장:'blue',신고대리:'purple',종소세대리:'orange',고문:'gray',신고:'purple'};
  return badge(d||'기장', map[d]||'blue');
}

// ══════════════════════════════════════════════════════
// 탭 전환
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  document.querySelectorAll('[id^="page-"]').forEach(p=>p.style.display='none');
  const page = document.getElementById('page-'+tab);
  page.style.display = 'block';
  G.currentTab = tab;
  const renders = {dashboard:renderDashboard,clients:renderClients,schedule:renderSchedule,fees:renderFees,closure:renderClosure,julgae:renderJulgae,aitools:renderAITools};
  renders[tab]?.();
}

function toggleExpand(id) {
  const row = document.getElementById('expand-'+id);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  document.querySelectorAll('.expand-row').forEach(r => { r.style.display = 'none'; });
  document.querySelectorAll('[id^="expand-arrow-"]').forEach(r => { r.textContent = '▼'; r.closest('tr')?.classList.remove('expanded'); });
  if (!isOpen) {
    row.style.display = '';
    const arrow = document.getElementById('expand-arrow-'+id);
    if (arrow) { arrow.textContent = '▲'; arrow.closest('tr')?.classList.add('expanded'); }
  }
}

function deleteClient(id) {
  const c = G.clients.find(x=>x.id===id);
  if (!c) return;
  if (!confirm(`"${c.name}" 거래처를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  G.clients = G.clients.filter(x=>x.id!==id);
  for (const pKey of Object.keys(G.julgae)) { delete G.julgae[pKey][id]; }
  saveToLS();
  renderClients();
}

function openForm(id) {
  const isEdit = id !== null;
  const c = isEdit ? G.clients.find(x=>x.id===id) : {
    name:'',rep:'',bizNo:'',phone:'',email:'',
    taxType:'개인',vatType:'일반',bizType:'',taxOffice:'',
    manager:'이슬빈',fee:0,feeStatus:'청구완료',dealType:'기장',
    contracts:[],status:'정상',dataReceived:false,bookkeeping:false,approved:false,
    memo:'',contractDate:'',terminationDate:'',terminationReason:'',
    closureYear:'',closureTaxFiled:false,closureTaxApproved:false
  };

  window._formData = {...c};

  function contractsHTML() {
    const avail = availableContracts(window._formData.vatType, window._formData.taxType);
    return avail.map(g=>`
    <div class="contract-group">
      <div class="contract-group-title">${g.label}</div>
      <div class="contract-chips">
        ${g.items.map(item=>`<button type="button" class="contract-chip ${(window._formData.contracts||[]).includes(item.key)?'on':''}" onclick="toggleContract('${item.key}')">${item.label}</button>`).join('')}
      </div>
    </div>`).join('');
  }

  function terminationHTML() {

window.onFormSelect = function(field, val) {
  window._formData[field] = val;
  if (field==='taxType'||field==='vatType') {
    // remove incompatible contracts
    const avail = CONTRACT_GROUPS.flatMap(g=>g.items).filter(i=>{
      const vat = field==='vatType'?val:window._formData.vatType;
      const tax = field==='taxType'?val:window._formData.taxType;
      return i.vat.includes(vat)&&i.tax.includes(tax);
    }).map(i=>i.key);
    window._formData.contracts = (window._formData.contracts||[]).filter(k=>avail.includes(k));
    document.getElementById('contract-area').innerHTML = (()=>{
      const avail2 = availableContracts(window._formData.vatType,window._formData.taxType);
      return avail2.map(g=>`<div class="contract-group"><div class="contract-group-title">${g.label}</div><div class="contract-chips">${g.items.map(item=>`<button type="button" class="contract-chip ${(window._formData.contracts||[]).includes(item.key)?'on':''}" onclick="toggleContract('${item.key}')">${item.label}</button>`).join('')}</div></div>`).join('');
    })();
  }
  if (field==='status') {
    document.getElementById('termination-area').innerHTML = (()=>{
      const s = val;
      if (s!=='해지'&&s!=='폐업') return '';
      return `<div style="background:#fafafa;border-radius:10px;padding:14px;border:1.5px solid #e0e0e0;display:flex;flex-direction:column;gap:12px">
        <div style="font-size:12px;font-weight:700;color:#e65100">해지 / 폐업 정보</div>
        <div class="form-grid">
          <div><label class="flabel">해지일자</label><input type="date" class="finput" oninput="window._formData.terminationDate=this.value"></div>
          <div><label class="flabel">해지 사유</label><select class="fsel" onchange="window._formData.terminationReason=this.value">
            <option value="">선택</option>
            <option value="폐업">폐업</option><option value="타회계사무소이전">타 회계사무소 이전</option><option value="기타">기타</option>
          </select></div>
        </div>
        ${s==='폐업'?'<div><label class="flabel">폐업연도</label><input type="number" class="finput" placeholder="예: 2024" oninput="window._formData.closureYear=this.value"></div>':''}
      </div>`;
    })();
  }
};

window.toggleContract = function(key) {
  const c = window._formData.contracts||[];
  window._formData.contracts = c.includes(key)?c.filter(x=>x!==key):[...c,key];
  document.querySelectorAll('.contract-chip').forEach(el=>{
    el.classList.toggle('on', window._formData.contracts.includes(el.textContent.trim()===contractLabel(key)?key:
      CONTRACT_GROUPS.flatMap(g=>g.items).find(i=>i.label===el.textContent.trim())?.key||''));
  });
  // redraw chips
  const area = document.getElementById('contract-area');
  if (area) {
    const avail = availableContracts(window._formData.vatType, window._formData.taxType);
    area.innerHTML = avail.map(g=>`<div class="contract-group"><div class="contract-group-title">${g.label}</div><div class="contract-chips">${g.items.map(item=>`<button type="button" class="contract-chip ${(window._formData.contracts||[]).includes(item.key)?'on':''}" onclick="toggleContract('${item.key}')">${item.label}</button>`).join('')}</div></div>`).join('');
  }
};

window.saveForm = function(id) {
  const d = window._formData;
  if (!d.name?.trim()) return alert('거래처명은 필수입니다');
  if (!d.rep?.trim()) return alert('대표자명은 필수입니다');
  if (id === null) {
    G.clients.push({...d, id: Date.now()});
  } else {
    const idx = G.clients.findIndex(c=>c.id===id);
    if (idx>=0) G.clients[idx] = {...G.clients[idx],...d};
  }
  saveToLS();
  closeModal();
  if (G.currentTab==='clients') renderClients();
  else if (G.currentTab==='dashboard') renderDashboard();
  else if (G.currentTab==='closure') renderClosure();
};

function renderSchedule() {
  const active = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업');
  const today = new Date();
  const nowM = today.getMonth()+1;
  const nowD = today.getDate();
  const yr = today.getFullYear();

  const vatAll  = active.filter(c=>c.vatType==='일반'||c.vatType==='간이').length;
  const vatG    = active.filter(c=>c.vatType==='일반').length;
  const vatS    = active.filter(c=>c.vatType==='간이').length;
  const exempt  = active.filter(c=>c.vatType==='면세').length;
  const income  = active.filter(c=>c.taxType==='개인').length;
  const seongsi = active.filter(c=>(c.contracts||[]).includes('세무조정')||c.dealType==='고문').length;
  const corp    = active.filter(c=>c.taxType==='법인').length;
  const yearend = active.filter(c=>(c.contracts||[]).includes('연말정산')).length;
  const withhold= active.filter(c=>(c.contracts||[]).includes('원천세')).length;

  // deadline: [month, day]
  function dday(m, d) {
    const dl = new Date(yr, m-1, d);
    const diff = Math.ceil((dl - today) / 86400000);
    if (diff < 0) return null;
    if (diff === 0) return {label:'오늘 마감', color:'#c62828'};
    if (diff <= 7)  return {label:`D-${diff}`, color:'#e65100'};
    if (diff <= 14) return {label:`D-${diff}`, color:'#f57c00'};
    return {label:`D-${diff}`, color:'#888'};
  }

  const sched = {
    1:[
      {l:'부가세 확정신고 (2기)',    t:'부가세', n:vatAll, c:'blue',   d:'1월 25일',  dd:dday(1,25),  hint:'7월~12월분'},
      yearend>0&&{l:'연말정산',      t:'공통',   n:yearend,c:'purple', d:'2월말',     dd:null,        hint:'근로소득'},
      withhold>0&&{l:'원천세 (12월분)',t:'공통', n:withhold,c:'gray',  d:'1월 10일',  dd:dday(1,10),  hint:''},
    ],
    2:[
      exempt>0&&{l:'사업장현황 신고', t:'면세', n:exempt, c:'gray', d:'2월 10일', dd:dday(2,10), hint:'면세사업자'},
    ],
    3:[
      corp>0&&{l:'법인세 신고',        t:'법인세', n:corp,   c:'blue',  d:'3월 31일', dd:dday(3,31), hint:'12월 결산법인'},
      withhold>0&&{l:'원천세 반기납부',t:'공통',  n:withhold,c:'gray',  d:'3월 10일', dd:dday(3,10), hint:'반기납부 선택'},
    ],
    4:[
      vatG>0&&{l:'부가세 예정신고 (1기)', t:'부가세', n:vatG, c:'blue', d:'4월 25일', dd:dday(4,25), hint:'1월~3월분'},
      withhold>0&&{l:'원천세 (3월분)',    t:'공통',   n:withhold, c:'gray', d:'4월 10일', dd:dday(4,10), hint:''},
    ],
    5:[
      income>0&&{l:'종합소득세 신고',     t:'소득세', n:income,  c:'green',  d:'5월 31일', dd:dday(5,31), hint:'개인사업자'},
      withhold>0&&{l:'원천세 (4월분)',    t:'공통',   n:withhold, c:'gray',  d:'5월 10일', dd:dday(5,10), hint:''},
    ],
    6:[
      seongsi>0&&{l:'성실신고사업자 신고', t:'소득세', n:seongsi, c:'green', d:'6월 30일', dd:dday(6,30), hint:'성실신고확인'},
      withhold>0&&{l:'원천세 (5월분)',     t:'공통',   n:withhold, c:'gray', d:'6월 10일', dd:dday(6,10), hint:''},
    ],
    7:[
      vatAll>0&&{l:'부가세 확정신고 (1기)', t:'부가세', n:vatAll, c:'blue',   d:'7월 25일', dd:dday(7,25), hint:'1월~6월분'},
      vatS>0&&{l:'간이과세자 납부',         t:'부가세', n:vatS,   c:'orange', d:'7월 25일', dd:dday(7,25), hint:'간이'},
      withhold>0&&{l:'원천세 반기납부',     t:'공통',   n:withhold,c:'gray',  d:'7월 10일', dd:dday(7,10), hint:'반기납부'},
    ],
    8:[withhold>0&&{l:'원천세 (7월분)', t:'공통', n:withhold, c:'gray', d:'8월 10일', dd:dday(8,10), hint:''}],
    9:[withhold>0&&{l:'원천세 (8월분)', t:'공통', n:withhold, c:'gray', d:'9월 10일', dd:dday(9,10), hint:''}],
    10:[
      vatG>0&&{l:'부가세 예정신고 (2기)', t:'부가세', n:vatG, c:'blue', d:'10월 25일', dd:dday(10,25), hint:'7월~9월분'},
      withhold>0&&{l:'원천세 (9월분)',    t:'공통', n:withhold, c:'gray', d:'10월 10일', dd:dday(10,10), hint:''},
    ],
    11:[
      vatS>0&&{l:'간이과세자 부가세 확정', t:'부가세', n:vatS, c:'orange', d:'11월 25일', dd:dday(11,25), hint:'간이'},
      withhold>0&&{l:'원천세 (10월분)', t:'공통', n:withhold, c:'gray', d:'11월 10일', dd:dday(11,10), hint:''},
    ],
    12:[
      corp>0&&{l:'법인세 중간예납',       t:'법인세', n:corp,    c:'blue', d:'12월 31일', dd:dday(12,31), hint:''},
      withhold>0&&{l:'원천세 (11월분)',   t:'공통',   n:withhold,c:'gray', d:'12월 10일', dd:dday(12,10), hint:''},
    ],
  };

  // 핵심 신고 항목 (상단 카드)
  const KEY_ITEMS = [
    {m:1,  d:25, l:'부가세 확정 2기', n:vatAll, c:'blue'},
    {m:3,  d:31, l:'법인세',          n:corp,   c:'blue'},
    {m:4,  d:25, l:'부가세 예정 1기', n:vatG,   c:'blue'},
    {m:5,  d:31, l:'종합소득세',      n:income, c:'green'},
    {m:6,  d:30, l:'성실신고',        n:seongsi,c:'green'},
    {m:7,  d:25, l:'부가세 확정 1기', n:vatAll, c:'blue'},
    {m:10, d:25, l:'부가세 예정 2기', n:vatG,   c:'blue'},
  ].map(item => {
    const dd = dday(item.m, item.d);
    return {...item, dd};
  }).filter(item => item.dd !== null).slice(0, 4);

  const keyCards = KEY_ITEMS.map(item => `
    <div class="stat-card" style="border-left:4px solid ${item.dd.color}">
      <div class="stat-label" style="color:${item.dd.color};font-weight:700">${item.dd.label}</div>
      <div style="font-weight:800;font-size:14px;margin:2px 0">${item.l}</div>
      <div style="font-size:12px;color:#888">${item.m}월 ${item.d}일 · ${item.n}개</div>
    </div>`).join('');

  const months = Array.from({length:12},(_,i)=>i+1);
  const cards = months.map(m=>{
    const items = (sched[m]||[]).filter(Boolean);
    const isCurrent = m===nowM;
    return `<div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:2px solid ${isCurrent?'#4f8ef7':'transparent'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-weight:800;font-size:16px;color:${isCurrent?'#4f8ef7':'#1a1a2e'}">${m}월</span>
        ${isCurrent?badge('이번 달','blue'):''}
      </div>
      ${items.length>0?items.map((d,i)=>{
        const isKey = ['부가세 확정신고','부가세 예정신고','법인세 신고','종합소득세 신고','성실신고사업자 신고'].some(k=>d.l.includes(k.split(' ')[0]));
        return `<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:${i<items.length-1?'1px solid #f5f5f5':'none'};${isKey?'border-left:3px solid #4f8ef7;padding-left:8px;margin-left:-8px':''}">
          ${badge(d.t,d.c)}
          <div style="flex:1">
            <div style="font-size:13px;font-weight:${isKey?700:500}">${d.l}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
              <span style="font-size:11px;color:#aaa">${d.hint?d.hint+' · ':''} ${d.n}개</span>
              <span style="font-size:11px;font-weight:700;background:#f5f5f5;padding:1px 7px;border-radius:8px;color:#555">${d.d}</span>
            </div>

          </div>

  }).join('');

  document.getElementById('page-schedule').innerHTML = `

  <div style="font-size:12px;color:#888;margin-bottom:12px">★ 표시 항목은 주요 신고 · 마감일 기준 D-day 표시</div>

}

function renderFees() {
  const active = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업');
  const total = active.reduce((s,c)=>s+c.fee,0);
  const collected = active.filter(c=>c.feeStatus==='수금완료').reduce((s,c)=>s+c.fee,0);
  const unpaid = G.clients.filter(c=>c.feeStatus==='미수금');
  const pct = total>0?Math.round(collected/total*100):0;

  const byManager = ['이슬빈','이현주','정여주','최수이'].map(m=>{
    const mc = active.filter(c=>c.manager===m);
    const t = mc.reduce((s,c)=>s+c.fee,0);
    const col = mc.filter(c=>c.feeStatus==='수금완료').reduce((s,c)=>s+c.fee,0);
    const p = t>0?Math.round(col/t*100):0;
    return `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0f0f0">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-weight:600">${m}</span>
        <span style="font-size:13px;color:#555">${mc.length}개 · ${t.toLocaleString()}원</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
      <div style="font-size:11px;color:#aaa;margin-top:3px">수금 ${p}% (${col.toLocaleString()}원)</div>
    </div>`;
  }).join('');

  document.getElementById('page-fees').innerHTML = `
  <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">수수료 관리</h2>
  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card" style="border-top:4px solid #4f8ef7"><div class="stat-label">총 청구액</div><div class="stat-value" style="font-size:18px;color:#4f8ef7">${total.toLocaleString()}원</div></div>

// 신고 및 결재

function renderJulgae() {
  const periods = G.periods;
  const idx = Math.min(G.julgaePeriodIdx, Math.max(0, periods.length - 1));
  const period = periods[idx];
  const q = G.julgaeSearch.toLowerCase();
  const mf = G.julgaeManager;
  const pKey = period ? period.id : null;

  // 신고유형 기반 자동 필터 → enrolled 수동 선택 우선
  let baseClients = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  const hasEnroll = period && period.enrolled && period.enrolled.length > 0;
  if (hasEnroll) {
    baseClients = baseClients.filter(c => period.enrolled.includes(c.id));
  } else {
    baseClients = applyReportFilter(baseClients, period);
  }

  // 담당자 필터
  let clients = baseClients;
  if (mf === '(없음)') clients = clients.filter(c => !c.manager);
  else if (mf !== '전체') clients = clients.filter(c => c.manager === mf);
  if (q) clients = clients.filter(c => c.name.toLowerCase().includes(q) || c.rep.toLowerCase().includes(q));

  const pKey2 = pKey || '';
  const dataCount   = clients.filter(c => julgaeVal(pKey2, c.id).d).length;
  const bookCount   = clients.filter(c => julgaeVal(pKey2, c.id).b).length;
  const doneCount   = clients.filter(c => julgaeVal(pKey2, c.id).a).length;
  const total = clients.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;

  const managerSet = ['전체', ...new Set(baseClients.map(c=>c.manager).filter(Boolean))];
  if (baseClients.some(c=>!c.manager)) managerSet.push('(없음)');

  const reportLabel = {vat:'부가세(일반·간이)',corp:'법인세(법인)',income:'종소세(개인)',seongsi:'성실신고(개인)',sajup:'사업장현황(면세)',undefined:'전체'};

  document.getElementById('page-julgae').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:20px;font-weight:800">신고 및 결재</h2>
    <button class="btn-primary btn-sm" onclick="openAddPeriod()" style="padding:8px 14px">+ 신고리스트 추가</button>
  </div>

  ${periods.length === 0 ? `<div class="card" style="text-align:center;padding:40px;color:#aaa">
    신고리스트가 없습니다. <b>+ 신고리스트 추가</b> 버튼을 눌러 시작하세요.</div>` : `

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    ${periods.map((p, i) => {
      const pEnroll = p.enrolled && p.enrolled.length > 0;
      const rtLabel = reportLabel[p.reportType] || '';
      return `<div style="display:flex;align-items:center;gap:3px">
        <button onclick="G.julgaePeriodIdx=${i};G.julgaeSearch='';renderJulgae()"
          style="padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:2px solid ${i===idx?'#4f8ef7':'#e0e0e0'};background:${i===idx?'#e8f0fe':'#fff'};color:${i===idx?'#4f8ef7':'#555'}">
          ${esc(p.label)}${pEnroll?` <span style="font-size:10px;background:#4f8ef7;color:#fff;border-radius:10px;padding:1px 6px;margin-left:4px">${p.enrolled.length}</span>`:''}
        </button>
        <button onclick="deletePeriod('${p.id}')" style="padding:4px 7px;border-radius:6px;font-size:11px;border:1px solid #e0e0e0;background:#fff;color:#e53935;cursor:pointer;font-family:inherit" title="삭제">✕</button>
      </div>`;
    }).join('')}
  </div>

  ${period ? `
  <div class="stat-grid" style="margin-bottom:14px">
    <div class="stat-card" style="border-left:4px solid #4f8ef7">
      <div class="stat-label">대상 업체</div>
      <div class="stat-value" style="color:#4f8ef7">${total}</div>
      <div class="stat-sub">${(reportLabel[period.reportType]||'전체')} · ${hasEnroll?'수동 선택':'자동 분류'}</div>
    </div>
    <div class="stat-card" style="border-left:4px solid #1976d2">
      <div class="stat-label">자료수령</div>
      <div class="stat-value" style="color:#1976d2">${dataCount}<span style="font-size:13px;color:#aaa;font-weight:400"> / ${total}</span></div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${total?Math.round(dataCount/total*100):0}%"></div></div>
    </div>
    <div class="stat-card" style="border-left:4px solid #f57c00">
      <div class="stat-label">기장완료</div>
      <div class="stat-value" style="color:#f57c00">${bookCount}<span style="font-size:13px;color:#aaa;font-weight:400"> / ${total}</span></div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${total?Math.round(bookCount/total*100):0}%"></div></div>
    </div>
    <div class="stat-card" style="border-left:4px solid #2e7d32">
      <div class="stat-label">결재완료 ${pct}%</div>
      <div class="stat-value" style="color:#2e7d32">${doneCount}<span style="font-size:13px;color:#aaa;font-weight:400"> / ${total}</span></div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <span>🔍</span>
      <input placeholder="거래처명·대표자 검색" value="${esc(G.julgaeSearch)}" oninput="G.julgaeSearch=this.value;renderJulgae()">
    </div>
    <select onchange="G.julgaeManager=this.value;renderJulgae()">
      ${managerSet.map(m => `<option${G.julgaeManager===m?' selected':''}>${m}</option>`).join('')}
    </select>
    <button class="btn-sm" style="background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9" onclick="openEnrollModal('${pKey}')">
      ☑ 업체 선택${hasEnroll?` (${period.enrolled.length})`:' (자동)'}
    </button>
    <button class="btn-sm" style="background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7" onclick="bulkJulgae('${pKey}',true)">전체 완료</button>
    <button class="btn-sm" style="background:#fdecea;color:#c62828;border:1.5px solid #ef9a9a" onclick="bulkJulgae('${pKey}',false)">전체 해제</button>
  </div>

  <div class="tbl-wrap">
  <table>
    <thead><tr>
      <th style="width:36px">번호</th>
      <th>거래처명</th>
      <th>담당자</th>
      <th>과세</th>
      <th style="width:70px;text-align:center">자료수령</th>
      <th style="width:70px;text-align:center">기장완료</th>
      <th style="width:70px;text-align:center">결재완료</th>
    </tr></thead>
    <tbody>
    ${clients.map((c, i) => {
      const v = julgaeVal(pKey2, c.id);
      return `<tr id="jr-${pKey2}-${c.id}" style="background:${v.a?'#f1f8e9':'#fff'}">
        <td style="color:#aaa;font-size:12px">${i+1}</td>
        <td><div class="td-name">${esc(c.name)}</div><div class="td-sub">${esc(c.rep)} ${c.bizType?'· '+esc(c.bizType):''}</div></td>
        <td style="color:#555">${esc(c.manager||'-')}</td>
        <td>${badge(c.taxType, c.taxType==='법인'?'blue':'gray')}</td>
        <td style="text-align:center" onclick="toggleJulgaeField('${pKey2}',${c.id},'d')">
          <div class="chk ${v.d?'on':''}" style="margin:0 auto">${v.d?'✓':''}</div>
        </td>
        <td style="text-align:center" onclick="toggleJulgaeField('${pKey2}',${c.id},'b')">
          <div class="chk ${v.b?'on':''}" style="margin:0 auto">${v.b?'✓':''}</div>
        </td>
        <td style="text-align:center" onclick="toggleJulgaeField('${pKey2}',${c.id},'a')">
          <div class="chk ${v.a?'on':''}" style="margin:0 auto">${v.a?'✓':''}</div>
        </td>
      </tr>`;
    }).join('')}
    ${clients.length===0?'<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa">해당 조건의 거래처가 없습니다</td></tr>':''}
    </tbody>
  </table></div>` : ''}
  `}`;
}

function toggleJulgaeField(pKey, clientId, field) {
  if (!pKey) return;
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const cur = julgaeVal(pKey, clientId);
  cur[field] = !cur[field];
  G.julgae[pKey][clientId] = cur;
  saveToLS();
  renderJulgae();
}

function bulkJulgae(pKey, val) {
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const mf = G.julgaeManager;
  let clients = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  if (mf === '(없음)') clients = clients.filter(c => !c.manager);
  else if (mf !== '전체') clients = clients.filter(c => c.manager === mf);
  clients.forEach(c => {
    G.julgae[pKey][c.id] = {d:val, b:val, a:val};
  });
  saveToLS();
  renderJulgae();
}

function openEnrollModal(pKey) {
  const idx = G.periods.findIndex(p => p.id === pKey);
  if (idx < 0) return;
  const period = G.periods[idx];

  // 선택 가능한 기본 풀: targetType 기반
  let pool = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  if (period.targetType === '법인') pool = pool.filter(c => c.taxType === '법인');
  else if (period.targetType === '개인') pool = pool.filter(c => c.taxType === '개인');

  const enrolled = new Set(period.enrolled || []);
  const managers = [...new Set(pool.map(c => c.manager).filter(Boolean))].sort();

  // 담당자별 그룹
  const groups = {};
  pool.forEach(c => {
    const m = c.manager || '미지정';
    if (!groups[m]) groups[m] = [];
    groups[m].push(c);
  });

  const rows = managers.map(m => {
    const list = (groups[m] || []).map(c => `
      <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background .1s"
        onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background=''">
        <input type="checkbox" class="enroll-chk" data-id="${c.id}" ${enrolled.has(c.id)?'checked':''} style="width:15px;height:15px;cursor:pointer">
        <span style="font-size:13px;font-weight:600">${esc(c.name)}</span>
        <span style="font-size:11px;color:#aaa">${esc(c.rep)}</span>
        <span style="margin-left:auto;font-size:11px;color:#888">${esc(c.taxType)}</span>
      </label>`).join('');
    return `<div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#4f8ef7;padding:4px 8px;background:#e8f0fe;border-radius:6px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
        <span>${esc(m)} (${(groups[m]||[]).length})</span>
        <span style="display:flex;gap:6px">
          <button type="button" onclick="enrollGroup(this,'${m}',true)" style="font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #90caf9;background:#fff;color:#1565c0;cursor:pointer">전체선택</button>
          <button type="button" onclick="enrollGroup(this,'${m}',false)" style="font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #ccc;background:#fff;color:#666;cursor:pointer">해제</button>
        </span>
      </div>
      ${list}
    </div>`;
  }).join('');

  showModal(`
  <div style="background:#fff;border-radius:18px;padding:28px 24px;width:520px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:18px;font-weight:800">업체 선택</div>
        <div style="font-size:12px;color:#aaa;margin-top:2px">${esc(period.label)} — 대상 ${pool.length}개 업체</div>
      </div>
      <button onclick="closeModal()" style="font-size:22px;border:none;background:none;cursor:pointer;color:#aaa">✕</button>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <div class="search-box" style="flex:1">
        <span>🔍</span>
        <input id="enroll_search" placeholder="거래처명 검색" oninput="filterEnrollList(this.value)" style="font-size:13px">
      </div>
      <button type="button" onclick="enrollAll(true)" style="padding:6px 12px;border-radius:8px;border:1.5px solid #90caf9;background:#e3f2fd;color:#1565c0;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">전체 선택</button>
      <button type="button" onclick="enrollAll(false)" style="padding:6px 12px;border-radius:8px;border:1.5px solid #ccc;background:#f5f5f5;color:#666;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">전체 해제</button>
    </div>

    <div id="enroll_list" style="overflow-y:auto;flex:1;padding-right:4px">
      ${rows}
    </div>

    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #f0f0f0;padding-top:16px">
      <span id="enroll_count" style="font-size:13px;color:#666;align-self:center">
        ${enrolled.size > 0 ? enrolled.size + '개 선택됨' : '(전체 포함)'}
      </span>
      <button onclick="closeModal()" style="padding:9px 20px;border-radius:10px;border:1.5px solid #e0e0e0;background:#f5f5f5;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">취소</button>
      <button onclick="saveEnrollment('${pKey}')" class="btn-primary" style="padding:9px 20px">저장</button>
    </div>
  </div>`);

  // 체크 변경 시 카운트 업데이트
  document.getElementById('enroll_list').addEventListener('change', updateEnrollCount);
}

function filterEnrollList(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#enroll_list label').forEach(el => {

function enrollAll(val) {
  document.querySelectorAll('#enroll_list .enroll-chk').forEach(chk => {
    const label = chk.closest('label');
    if (!label || label.style.display === 'none') return;
    chk.checked = val;
  });
  updateEnrollCount();
}

function enrollGroup(btn, manager, val) {
  const group = btn.closest('div[style*="margin-bottom:12px"]');
  if (!group) return;
  group.querySelectorAll('.enroll-chk').forEach(chk => chk.checked = val);
  updateEnrollCount();
}

function updateEnrollCount() {
  const checked = document.querySelectorAll('#enroll_list .enroll-chk:checked').length;
  const total = document.querySelectorAll('#enroll_list .enroll-chk').length;
  const el = document.getElementById('enroll_count');
  if (el) el.textContent = checked === total ? '(전체 포함)' : checked + '개 선택됨';
}

function saveEnrollment(pKey) {
  const idx = G.periods.findIndex(p => p.id === pKey);
  if (idx < 0) return;
  const all = document.querySelectorAll('#enroll_list .enroll-chk');
  const total = all.length;
  const checked = [...all].filter(c => c.checked).map(c => Number(c.dataset.id));
  // 전체 선택 시 enrolled를 비워서 "자동 분류" 상태로 복귀
  G.periods[idx].enrolled = checked.length === total ? [] : checked;
  saveToLS();
  closeModal();
  renderJulgae();
}

function applyPeriodTemplate(tplKey) {
  const t = PERIOD_TEMPLATES.find(x=>x.tpl===tplKey);
  if (!t) return;
  const yr = new Date().getFullYear();
  const label = String(yr).slice(2) + '년 ' + t.label;
  const id = tplKey + '_' + yr + '_' + Date.now();
  G.periods.push({ id, label, type: t.type, targetType: t.targetType, reportType: t.reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  closeModal();
  renderJulgae();
}

function savePeriod() {
  const label = document.getElementById('p-label').value.trim();
  if (!label) return alert('리스트 이름을 입력해주세요');
  const type = document.getElementById('p-type').value;
  const reportType = document.getElementById('p-reporttype').value || undefined;
  const targetMap = {vat:'전체',corp:'법인',income:'개인',seongsi:'개인',sajup:'개인'};
  const targetType = reportType ? (targetMap[reportType]||'전체') : '전체';
  const id = 'p_' + Date.now();
  G.periods.push({ id, label, type, targetType, reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  closeModal();
  renderJulgae();
}

function deletePeriod(id) {
  if (!confirm('이 신고기간과 결재 데이터를 삭제하시겠습니까?')) return;
  G.periods = G.periods.filter(p => p.id !== id);
  delete G.julgae[id];
  G.julgaePeriodIdx = Math.max(0, Math.min(G.julgaePeriodIdx, G.periods.length - 1));
  saveToLS();
  renderJulgae();
}

async function runAINotice() {
  const chips = document.querySelectorAll('.nc-chip.on');
  if (!chips.length) return alert('거래처를 선택해 주세요');
  const type = document.getElementById('notice-type').value;
  const tone = document.getElementById('notice-tone').value;
  const deadline = document.getElementById('notice-deadline').value;
  const results = document.getElementById('notice-results');
  results.innerHTML = '<div style="text-align:center;padding:20px;color:#888">AI 생성 중...</div>';

  for (const chip of chips) {
    const c = G.clients.find(x=>x.id===Number(chip.dataset.id));
    if (!c) continue;
    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 ${type} 신고 안내문을 작성해주세요.
거래처명: ${c.name}, 대표자: ${c.rep}님, 과세유형: ${c.taxType}/${c.vatType}, 수임항목: ${(c.contracts||[]).map(contractLabel).join(', ')}${deadline?', 마감일: '+deadline:''}
조건: ${tone}한 어투, 4~6문장, 자료 제출 요청 포함, 사무소 서명 없이 본문만, 마크다운 없이`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})});
      const data = await res.json();
      const text = data.content?.map(b=>b.text||'').join('')||'생성 실패';
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700">${esc(c.name)} <span style="font-weight:400;color:#888;font-size:13px">(${esc(c.rep)}님)</span></div>
          <button class="btn-sm" style="background:#f5f5f5" onclick="navigator.clipboard.writeText(this.previousSibling.nextSibling?.textContent||'');this.textContent='✓ 복사됨'">복사</button>
        </div>
        <div class="ai-result" id="r-${c.id}">${esc(text)}</div>
      </div>`;
    } catch(e) {
      results.innerHTML += `<div style="color:red;margin-top:8px">${esc(c.name)}: 생성 실패 (API 오류)</div>`;
    }
  }
}

async function runAIReminder() {
  const chips = document.querySelectorAll('.sc-chip.on');
  if (!chips.length) return alert('거래처를 선택해 주세요');
  const type = document.getElementById('sms-type').value;
  const tone = document.getElementById('sms-tone').value;
  const deadline = document.getElementById('sms-deadline').value;
  const results = document.getElementById('sms-results');
  results.innerHTML = '<div style="text-align:center;padding:20px;color:#888">AI 생성 중...</div>';

  for (const chip of chips) {
    const c = G.clients.find(x=>x.id===Number(chip.dataset.id));
    if (!c) continue;
    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 자료 제출 요청 문자를 작성해주세요.
거래처: ${c.name} (${c.rep}님), 신고 유형: ${type}${deadline?', 마감일: '+deadline:''}
조건: ${tone}한 어투, SMS 80자 이내, 마감일 강조, 연락처 자리는 [연락처]로, 본문만, 마크다운 없이`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})});
      const data = await res.json();
      const text = (data.content?.map(b=>b.text||'').join('')||'생성 실패').trim();
      const len = text.length;
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700">${esc(c.name)} <span style="font-size:12px;color:#888">${esc(c.phone)}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;font-weight:700;color:${len>80?'#e53935':'#43a047'}">${len}자</span>
            <button class="btn-sm" style="background:#f5f5f5" onclick="navigator.clipboard.writeText(document.getElementById('sms-${c.id}').textContent);this.textContent='✓ 복사됨'">복사</button>
          </div>
        </div>
        <div class="sms-bubble" id="sms-${c.id}">${esc(text)}</div>
      </div>`;
    } catch(e) {
      results.innerHTML += `<div style="color:red;margin-top:8px">${esc(c.name)}: 생성 실패</div>`;
    }
  }
}

function exportBackup() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    clients: G.clients,
    periods: G.periods,
    julgae: G.julgae,
    settings: G.settings
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taxmanager_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('backup-status');
  st.textContent = '읽는 중...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.clients || !Array.isArray(data.clients)) throw new Error('올바른 백업 파일이 아닙니다.');
      if (!confirm(`백업 파일에 거래처 ${data.clients.length}개, 신고기간 ${(data.periods||[]).length}개가 있습니다.\n현재 데이터를 모두 교체할까요?`)) {
        st.textContent = '취소되었습니다.';
        input.value = '';
        return;
      }
      G.clients  = data.clients;
      G.periods  = data.periods  || G.periods;
      G.julgae   = data.julgae   || G.julgae;
      G.settings = data.settings || G.settings;
      saveToLS();
      st.innerHTML = `<span style="color:#2e7d32">✔ 복원 완료 — 거래처 ${G.clients.length}개</span>`;
      closeModal();
      renderDashboard();
    } catch(err) {
      st.innerHTML = `<span style="color:#e53935">오류: ${err.message}</span>`;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function importExcel(input) {
  const file = input.files[0]; if (!file) return;
  const mode = document.querySelector('input[name="importMode"]:checked')?.value||'append';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const imported = rows.map((r,i)=>({
        id: Date.now()+i, name:String(r['거래처명']||'').trim(), rep:String(r['대표자']||'').trim(),
        bizNo:'', phone:String(r['연락처']||'').trim(), email:String(r['이메일']||'').trim(),
        taxType:['법인','개인'].includes(r['과세유형'])?r['과세유형']:'개인',
        vatType:['일반','간이','면세'].includes(r['부가세유형'])?r['부가세유형']:'일반',
        bizType:String(r['업종']||''), taxOffice:String(r['관할세무서']||''),
        manager:String(r['담당자']||''), dealType:String(r['거래유형']||'기장'),
        fee:Number(r['월수수료'])||0, feeStatus:String(r['수금상태']||'청구완료'),
        contracts:r['수임계약항목']?String(r['수임계약항목']).split(',').map(s=>s.trim()).filter(Boolean):[],
        status:String(r['거래처상태']||'정상'), contractDate:String(r['수임일자']||''),
        terminationDate:String(r['해지일자']||''), terminationReason:String(r['해지사유']||''),
        closureYear:String(r['폐업연도']||''),
        closureTaxFiled:String(r['신고접수']).toUpperCase()==='Y',
        closureTaxApproved:String(r['신고완료']).toUpperCase()==='Y',
        dataReceived:String(r['자료수령']).toUpperCase()==='Y',
        bookkeeping:String(r['기장완료']).toUpperCase()==='Y',
        approved:String(r['결재완료']).toUpperCase()==='Y',
        memo:String(r['메모']||'')
      })).filter(c=>c.name);
      if (mode==='replace') G.clients=imported;
      else {
        const existing = new Set(G.clients.map(c=>c.name+c.rep));
        G.clients=[...G.clients,...imported.filter(c=>!existing.has(c.name+c.rep))];
      }
      saveToLS();
      document.getElementById('import-status').innerHTML=`<span style="color:#2e7d32;font-weight:600">✓ ${imported.length}개 거래처 ${mode==='replace'?'교체':'추가'} 완료</span>`;
      updateBadge();
    } catch(err) {
      document.getElementById('import-status').innerHTML=`<span style="color:red">파일 읽기 실패: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

}

function updateBadge() {
  const noData = G.clients.filter(c=>!c.dataReceived&&c.status!=='해지'&&c.status!=='폐업').length;
  const el = document.getElementById('badge-no-data');
  el.style.display = noData>0?'inline':'none';
  el.textContent = '미수령 '+noData;
}

function showModal(html) {
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML='';
}

// ══════════════════════════════════════════════════════
// 앱 시작
// ══════════════════════════════════════════════════════
async function init() {
  try {
    const saved = localStorage.getItem('tm_clients');
    if (saved) {
      G.clients = JSON.parse(saved);
    } else {
      const json = await decompressB64(CLIENTS_B64);
      const mini = JSON.parse(json);
      G.clients = expandClients(mini);
    }
    const savedPeriods = localStorage.getItem('tm_periods');
    G.periods = savedPeriods ? JSON.parse(savedPeriods) : JSON.parse(JSON.stringify(DEFAULT_PERIODS));
    const savedJulgae = localStorage.getItem('tm_julgae');
    G.julgae = savedJulgae ? JSON.parse(savedJulgae) : {};
    // 구형 boolean 데이터 → {d,b,a} 형식으로 마이그레이션
    for (const pKey of Object.keys(G.julgae)) {
      for (const cId of Object.keys(G.julgae[pKey])) {
        if (typeof G.julgae[pKey][cId] === 'boolean') {
          G.julgae[pKey][cId] = {d:false, b:false, a:G.julgae[pKey][cId]};
        }
      }
    }
    const savedSettings = localStorage.getItem('tm_settings');
    if (savedSettings) G.settings = JSON.parse(savedSettings);
    updateBadge();
  } catch(e) {
    console.error('데이터 로드 실패:', e);
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page-dashboard').style.display = 'block';
  renderDashboard();
}

init();
</script>
