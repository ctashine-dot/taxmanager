const _IMPORT_COL_RULES = {
  bizNo:         ['사업자번호','사업자등록번호','사업자 번호','등록번호'],
  name:          ['상호','거래처명','업체명','상호명'],
  rep:           ['대표자','대표자명','대표','성명'],
  taxType:       ['인격','법인구분','개인법인'],
  vatType:       ['과세유형','부가세유형','과세구분','과세형태'],
  phone:         ['전화번호','전화','연락처','휴대폰'],
  bizType:       ['업태','업종'],
  taxOffice:     ['관할세무서','세무서'],
  period:        ['과세기간','기간','신고기간'],
  salesCount:    ['매출건수','매출 건수','(매출)건수'],
  salesAmount:   ['매출금액','매출 금액','공급가액(매출)','매출공급가액'],
  purchaseCount: ['매입건수','매입 건수','(매입)건수'],
  purchaseAmount:['매입금액','매입 금액','공급가액(매입)','매입공급가액'],
};

function autoDetectColumns(headers) {
  const map = {};
  headers.forEach((h, i) => {
    const hc = String(h).replace(/\s+/g,'').toLowerCase();
    for (const [field, candidates] of Object.entries(_IMPORT_COL_RULES)) {
      if (map[field] !== undefined) continue;
      if (candidates.some(c => hc.includes(c.replace(/\s+/g,'').toLowerCase()))) map[field] = i;
    }
  });
  return map;
}

function parseImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (data.length < 2) {
        document.getElementById('import-preview').innerHTML = '<div style="color:#e53935;margin-top:12px;font-size:13px">데이터가 없습니다.</div>';
        return;
      }
      window._importHeaders = data[0].map(String);
      window._importRows = data.slice(1).filter(r => r.some(v => String(v).trim()));
      showImportPreview();
    } catch(err) {
      document.getElementById('import-preview').innerHTML = `<div style="color:#e53935;margin-top:12px;font-size:13px">파일 오류: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function showImportPreview() {
  const preview = document.getElementById('import-preview');
  if (!preview || !window._importHeaders) return;
  const headers = window._importHeaders;
  const rows = window._importRows;
  const colMap = autoDetectColumns(headers);
  const type = window._importType;
  const fieldLabels = {
    bizNo:'사업자번호',name:'상호명',rep:'대표자',taxType:'인격',vatType:'부가세',
    phone:'전화번호',bizType:'업태',taxOffice:'세무서',period:'기간',
    salesCount:'매출건수',salesAmount:'매출금액',purchaseCount:'매입건수',purchaseAmount:'매입금액'
  };
  const relevantFields = type==='clients'
    ? ['bizNo','name','rep','taxType','vatType','phone','bizType','taxOffice']
    : ['bizNo','name','period','salesCount','salesAmount','purchaseCount','purchaseAmount'];
  const mappedFields = relevantFields.filter(f => colMap[f] !== undefined);
  const unmapped = relevantFields.filter(f => colMap[f] === undefined);
  const previewRows = rows.slice(0,8);
  preview.innerHTML = `
  <div style="margin-top:14px">
    <div style="font-size:12px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      <b>미리보기</b><span style="color:#888">총 ${rows.length}행</span>
      ${mappedFields.length>0?`<span style="color:#2e7d32;background:#e8f5e9;padding:2px 8px;border-radius:10px">✓ ${mappedFields.map(f=>fieldLabels[f]).join(', ')}</span>`:''}
      ${unmapped.length>0?`<span style="color:#e65100;background:#fff3e0;padding:2px 8px;border-radius:10px">⚠ 미인식: ${unmapped.map(f=>fieldLabels[f]).join(', ')}</span>`:''}
    </div>
    ${mappedFields.length===0?`<div style="color:#e53935;font-size:13px;padding:12px;background:#fdecea;border-radius:8px;margin-bottom:12px">컬럼을 자동 인식하지 못했습니다. 파일의 헤더 행을 확인해주세요.</div>`:`
    <div style="overflow:auto;max-height:160px;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:10px">
      <table style="width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap">
        <thead><tr style="background:#f5f5f5">
          ${mappedFields.map(f=>`<th style="padding:6px 10px;text-align:left;border-bottom:1px solid #e0e0e0">${fieldLabels[f]}</th>`).join('')}
        </tr></thead>
        <tbody>${previewRows.map(r=>`<tr style="border-bottom:1px solid #f5f5f5">${mappedFields.map(f=>`<td style="padding:5px 10px;color:#555;max-width:130px;overflow:hidden;text-overflow:ellipsis">${esc(String(r[colMap[f]]||''))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    ${rows.length>8?`<div style="font-size:11px;color:#aaa;margin-bottom:8px">...외 ${rows.length-8}행</div>`:''}`}
    <div class="btn-row" style="margin-top:4px">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="doImport()" ${mappedFields.length===0?'disabled style="opacity:.5"':''}>
        📥 ${rows.length}개 가져오기
      </button>
    </div>
  </div>`;
}

function doImport() {
  const rows = window._importRows;
  const headers = window._importHeaders;
  if (!rows || !headers) return;
  const colMap = autoDetectColumns(headers);
  const type = window._importType;
  const getVal = (row, field) => colMap[field]!==undefined ? String(row[colMap[field]]||'').trim() : '';

  if (type === 'clients') {
    let added=0, updated=0, skipped=0;
    rows.forEach(row => {
      const bizNo = getVal(row,'bizNo').replace(/[^0-9]/g,'');
      const name = getVal(row,'name');
      if (!name) { skipped++; return; }
      let existing = (bizNo.length>=10) ? G.clients.find(c=>(c.bizNo||'').replace(/[^0-9]/g,'')===bizNo) : null;
      if (!existing) existing = G.clients.find(c=>c.name===name);
      const rawVat = getVal(row,'vatType');
      const vatType = rawVat.includes('일반')?'일반':rawVat.includes('간이')?'간이':rawVat.includes('면세')?'면세':null;
      const rawTax = getVal(row,'taxType');
      const taxType = rawTax.includes('법인')?'법인':rawTax.includes('개인')?'개인':null;
      if (existing) {
        if (bizNo.length>=10 && !existing.bizNo) existing.bizNo = bizNo;
        if (vatType) existing.vatType = vatType;
        if (taxType) existing.taxType = taxType;
        if (getVal(row,'rep') && !existing.rep) existing.rep = getVal(row,'rep');
        if (getVal(row,'phone') && !existing.phone) existing.phone = getVal(row,'phone');
        if (getVal(row,'bizType') && !existing.bizType) existing.bizType = getVal(row,'bizType');
        if (getVal(row,'taxOffice') && !existing.taxOffice) existing.taxOffice = getVal(row,'taxOffice');
        updated++;
      } else {
        const maxId = G.clients.reduce((a,c)=>Math.max(a,c.id||0),0);
        G.clients.push({
          id:maxId+1+added, name, rep:getVal(row,'rep'),
          bizNo:bizNo||'', jumin:'', relatedGroup:'',
          phone:getVal(row,'phone'), email:'',
          taxType:taxType||'개인', vatType:vatType||'일반',
          bizType:getVal(row,'bizType'), taxOffice:getVal(row,'taxOffice'),
          manager:'', managers:[], dealType:'기장', dealTypes:['기장'],
          fee:0, feeStatus:'청구완료', status:'정상',
          dataReceived:false, bookkeeping:false, approved:false,
          memo:'', contractDate:'', contracts:[],
          terminationDate:'', terminationReason:'', closureYear:'',
          closureTaxFiled:false, closureTaxApproved:false
        });
        added++;
      }
    });
    saveToLS(); closeModal(); renderClients();
    alert(`거래처 가져오기 완료!\n• 신규 추가: ${added}개\n• 업데이트: ${updated}개\n• 건너뜀: ${skipped}개`);
  } else {
    if (!G.invoiceData) G.invoiceData = {};
    let matched=0, unmatched=0;
    rows.forEach(row => {
      const bizNo = getVal(row,'bizNo').replace(/[^0-9]/g,'');
      const name = getVal(row,'name');
      if (!bizNo && !name) return;
      let client = (bizNo.length>=10) ? G.clients.find(c=>(c.bizNo||'').replace(/[^0-9]/g,'')===bizNo) : null;
      if (!client && name) client = G.clients.find(c=>c.name===name);
      if (!client) { unmatched++; return; }
      const period = getVal(row,'period') || new Date().toLocaleDateString('ko-KR');
      if (!G.invoiceData[client.id]) G.invoiceData[client.id] = {periods:{}, lastImported:''};
      G.invoiceData[client.id].periods[period] = {
        salesCount:   Number(getVal(row,'salesCount').replace(/[^0-9]/g,'')||0),
        salesAmount:  Number(getVal(row,'salesAmount').replace(/[^0-9]/g,'')||0),
        purchaseCount:Number(getVal(row,'purchaseCount').replace(/[^0-9]/g,'')||0),
        purchaseAmount:Number(getVal(row,'purchaseAmount').replace(/[^0-9]/g,'')||0),
      };
      G.invoiceData[client.id].lastImported = new Date().toLocaleDateString('ko-KR');
      matched++;
    });
    saveToLS(); closeModal();
    alert(`세금계산서 현황 가져오기 완료!\n• 매칭 성공: ${matched}개\n• 미매칭: ${unmatched}개${unmatched>0?'\n  (사업자번호/상호명으로 거래처를 찾을 수 없는 행)':''}`);
  }
}

  const chips = document.querySelectorAll('.nc-chip.on');

  results.innerHTML = '<div style="text-align:center;padding:20px;color:#888">AI 생성 중...</div>';

    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 ${type} 신고 안내문을 작성해주세요.

      const text = data.content?.map(b=>b.text||'').join('')||'생성 실패';
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700">${esc(c.name)} <span style="font-weight:400;color:#888;font-size:13px">(${esc(c.rep)}님)</span></div>

function exportBackup() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    clients: G.clients,
    periods: G.periods,
    julgae: G.julgae,
    settings: G.settings
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taxmanager_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('backup-status');
  st.textContent = '읽는 중...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.clients || !Array.isArray(data.clients)) throw new Error('올바른 백업 파일이 아닙니다.');
      if (!confirm(`백업 파일에 거래처 ${data.clients.length}개, 신고기간 ${(data.periods||[]).length}개가 있습니다.\n현재 데이터를 모두 교체할까요?`)) {
        st.textContent = '취소되었습니다.';
        input.value = '';
        return;
      }
      G.clients  = data.clients;
      G.periods  = data.periods  || G.periods;
      G.julgae   = data.julgae   || G.julgae;
      G.settings = data.settings || G.settings;
      saveToLS();
      st.innerHTML = `<span style="color:#2e7d32">✔ 복원 완료 — 거래처 ${G.clients.length}개</span>`;
      closeModal();
      renderDashboard();
    } catch(err) {
      st.innerHTML = `<span style="color:#e53935">오류: ${err.message}</span>`;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportExcel() {
  const rows = G.clients.map(c=>({
    거래처명:c.name, 대표자:c.rep, 연락처:c.phone, 이메일:c.email||'',
    과세유형:c.taxType, 부가세유형:c.vatType, 업종:c.bizType||'', 관할세무서:c.taxOffice||'',
    담당자:getManagers(c).join(', '), 거래유형:getDealTypes(c).join(', '), 월수수료:c.fee,
    수금상태:c.feeStatus, 수임계약항목:(c.contracts||[]).map(contractLabel).join(', '),
    거래처상태:c.status, 수임일자:c.contractDate||'', 해지일자:c.terminationDate||'',
    해지사유:c.terminationReason||'', 폐업연도:c.closureYear||'',
    신고접수:c.closureTaxFiled?'Y':'N', 신고완료:c.closureTaxApproved?'Y':'N',
    자료수령:c.dataReceived?'Y':'N', 기장완료:c.bookkeeping?'Y':'N', 결재완료:c.approved?'Y':'N',
    메모:c.memo||''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [20,12,14,22,8,10,12,12,10,10,12,10,30,8,12,12,14,10,8,8,8,8,8,30].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '거래처목록');
  XLSX.writeFile(wb, `거래처목록_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function importExcel(input) {
  const file = input.files[0]; if (!file) return;
  const mode = document.querySelector('input[name="importMode"]:checked')?.value||'append';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const imported = rows.map((r,i)=>({
        id: Date.now()+i, name:String(r['거래처명']||'').trim(), rep:String(r['대표자']||'').trim(),
        bizNo:'', phone:String(r['연락처']||'').trim(), email:String(r['이메일']||'').trim(),
        taxType:['법인','개인'].includes(r['과세유형'])?r['과세유형']:'개인',
        vatType:['일반','간이','면세'].includes(r['부가세유형'])?r['부가세유형']:'일반',
        bizType:String(r['업종']||''), taxOffice:String(r['관할세무서']||''),
        manager:String(r['담당자']||''), dealType:String(r['거래유형']||'기장'),
        fee:Number(r['월수수료'])||0, feeStatus:String(r['수금상태']||'청구완료'),
        contracts:r['수임계약항목']?String(r['수임계약항목']).split(',').map(s=>s.trim()).filter(Boolean):[],
        status:String(r['거래처상태']||'정상'), contractDate:String(r['수임일자']||''),
        terminationDate:String(r['해지일자']||''), terminationReason:String(r['해지사유']||''),
        closureYear:String(r['폐업연도']||''),
        closureTaxFiled:String(r['신고접수']).toUpperCase()==='Y',
        closureTaxApproved:String(r['신고완료']).toUpperCase()==='Y',
        dataReceived:String(r['자료수령']).toUpperCase()==='Y',
        bookkeeping:String(r['기장완료']).toUpperCase()==='Y',
        approved:String(r['결재완료']).toUpperCase()==='Y',
        memo:String(r['메모']||'')
      })).filter(c=>c.name);
      if (mode==='replace') G.clients=imported;
      else {
        const existing = new Set(G.clients.map(c=>c.name+c.rep));
        G.clients=[...G.clients,...imported.filter(c=>!existing.has(c.name+c.rep))];
      }
      saveToLS();
      document.getElementById('import-status').innerHTML=`<span style="color:#2e7d32;font-weight:600">✓ ${imported.length}개 거래처 ${mode==='replace'?'교체':'추가'} 완료</span>`;
      updateBadge();
    } catch(err) {
      document.getElementById('import-status').innerHTML=`<span style="color:red">파일 읽기 실패: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function addMgr() {
  const inp = document.getElementById('new-mgr');
  const name = inp ? inp.value.trim() : '';
  if (!name) return;
  _tempMgrs.push(name);
  inp.value = '';
  const el = document.getElementById('mgr-list');
  if (el) el.innerHTML = _tempMgrs.map((m,i) => `<span style="background:#f0f4ff;border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px">${esc(m)}<button onclick="removeMgr(${i})" style="border:none;background:none;color:#e53935;cursor:pointer;font-size:14px;line-height:1">×</button></span>`).join('');
}

function removeMgr(i) {
  _tempMgrs.splice(i, 1);
  const el = document.getElementById('mgr-list');
  if (el) el.innerHTML = _tempMgrs.map((m,idx) => `<span style="background:#f0f4ff;border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px">${esc(m)}<button onclick="removeMgr(${idx})" style="border:none;background:none;color:#e53935;cursor:pointer;font-size:14px;line-height:1">×</button></span>`).join('');
}

function updateSettingsPreview() {
  const get = id => document.getElementById(id)?.value||'';
  const el = document.getElementById('settings-preview');
  if (!el) return;
  el.innerHTML = `<b>${esc(get('set-name'))}</b><br>대표: ${esc(get('set-rep'))} | 사업자: ${esc(get('set-regNo'))}<br>전화: ${esc(get('set-phone'))} | 팩스: ${esc(get('set-fax'))} | ${esc(get('set-email'))}<br>${esc(get('set-address'))}<br>입금: ${esc(get('set-bank'))} ${esc(get('set-account'))} (${esc(get('set-accountHolder'))})`;
}

function saveSettings() {
  ['name','rep','regNo','phone','fax','email','address','bank','account','accountHolder'].forEach(k=>{
    G.settings[k] = document.getElementById('set-'+k)?.value||G.settings[k];
  });
  G.settings.managers = [..._tempMgrs];
  MANAGERS = ['전체', ...G.settings.managers];
  saveToLS();
  closeModal();
}

      <button onclick="saveBosuTable()" class="btn-primary" style="padding:8px 16px">저장</button>
    </div>
  </div></div>`);
}
function saveBosuTable() {
  const tbl = getBosuTable().map((row,ri) => {
    const r = {...row};
    document.querySelectorAll(`#bosu-tbl input[data-ri="${ri}"]`).forEach(inp => {
      r[inp.dataset.col] = Number(inp.value) || 0;
    });
    return r;
  });
  G.settings.bosuTable = tbl;
  saveToLS();
  closeModal();
  alert('보수표가 저장됐습니다.');
}
function resetBosuTable() {
  if (!confirm('기본값으로 초기화할까요?')) return;
  G.settings.bosuTable = null;
  saveToLS();
  openBosuTable();
}
function applyBosuFee(pKey, clientId, field, fee) {
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const cur = julgaeVal(pKey, clientId);
  cur[field] = fee;
  G.julgae[pKey][clientId] = cur;
  const period = G.periods.find(p=>p.id===pKey);
  const client = G.clients.find(c=>c.id===clientId);
  if (client && period) {
    if (field==='feeSeongsi') client.feeSeongsi = fee;
    else { const ff=REPORT_FEE_FIELD[period.reportType]; if(ff) client[ff]=fee; }
  }
  saveToLS();
  renderJulgae();
}

// ══════════════════════════════════════════════════════
// 공통 유틸
// ══════════════════════════════════════════════════════
function toggleField(id, field) {
  const c = G.clients.find(x=>x.id===id);
  if (c) c[field]=!c[field];
  saveToLS();
  updateBadge();
}

function manualSave() {
  saveToLS();
  const toast = document.getElementById('save-toast');
  toast.style.display = 'inline';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

function updateBadge() {
  const noData = G.clients.filter(c=>!c.dataReceived&&c.status!=='해지'&&c.status!=='폐업').length;
  const el = document.getElementById('badge-no-data');
  el.style.display = noData>0?'inline':'none';
  el.textContent = '미수령 '+noData;
}

function showModal(html) {
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML='';
}

// ══════════════════════════════════════════════════════
// Firebase 인증 / 데이터 로드
// ══════════════════════════════════════════════════════
function signInWithGoogle() {
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e => { err.textContent = '로그인 실패: ' + e.message; err.style.display = 'block'; });
}

function signOutUser() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  fbAuth.signOut();
}

function migrateJulgae() {
  for (const pKey of Object.keys(G.julgae)) {
    for (const cId of Object.keys(G.julgae[pKey])) {
      if (typeof G.julgae[pKey][cId] === 'boolean') {
        G.julgae[pKey][cId] = {d:false, b:false, a:G.julgae[pKey][cId], s:false, revenue:0, income:0, taxBase:0, fee:0};
      } else if (G.julgae[pKey][cId] && G.julgae[pKey][cId].s === undefined) {
        G.julgae[pKey][cId].s = false;
        G.julgae[pKey][cId].revenue    = G.julgae[pKey][cId].revenue    || 0;
        G.julgae[pKey][cId].income     = G.julgae[pKey][cId].income     || 0;
        G.julgae[pKey][cId].taxBase    = G.julgae[pKey][cId].taxBase    || 0;
        G.julgae[pKey][cId].fee        = G.julgae[pKey][cId].fee        || 0;
        G.julgae[pKey][cId].feeSeongsi = G.julgae[pKey][cId].feeSeongsi || 0;
      }
    }
  }
  // 수수료 4종 필드 마이그레이션: feeSingo가 미정의인 거래처에 한해 deal type 기준으로 이동
  const bookingTypes = ['기장', '고문', '성실'];
  let feesMigrated = false;
  G.clients.forEach(c => {
    if (c.feeSingo === undefined) {
      feesMigrated = true;
      c.feeSingo   = 0;
      c.feeJojung  = 0;
      c.feeSeongsi = 0;
      const dt = getDealTypes(c);
      const hasBooking = dt.some(d => bookingTypes.includes(d));
      const hasSingo   = dt.includes('신고대리');
      if (hasSingo && !hasBooking && c.fee > 0) {
        // 신고대리 전용 거래처: 기존 fee → feeSingo로 이동
        c.feeSingo = c.fee;
        c.fee = 0;
      }
    }
  });
  if (feesMigrated) saveToLS();
}

async function loadFromFirebase() {
  try {
    const snap = await fbDb.ref('taxmanager/' + G.user.uid).once('value');
    const data = snap.val();
    if (data) {
      G.clients     = data.clients     ? JSON.parse(data.clients)     : [];
      G.periods     = data.periods     ? JSON.parse(data.periods)     : JSON.parse(JSON.stringify(DEFAULT_PERIODS));
      G.julgae      = data.julgae      ? JSON.parse(data.julgae)      : {};
      G.settings    = data.settings    ? JSON.parse(data.settings)    : G.settings;
      G.monthlyFees = data.monthlyFees ? JSON.parse(data.monthlyFees) : {};
      G.invoiceData = data.invoiceData ? JSON.parse(data.invoiceData) : {};
    } else {
      // 신규 계정: 로컬스토리지 데이터 마이그레이션 시도
      const saved = localStorage.getItem('tm_clients');
      if (saved) {
        G.clients = JSON.parse(saved);
        const sp = localStorage.getItem('tm_periods');
        G.periods = sp ? JSON.parse(sp) : JSON.parse(JSON.stringify(DEFAULT_PERIODS));
        const sj = localStorage.getItem('tm_julgae');
        G.julgae = sj ? JSON.parse(sj) : {};
        const ss = localStorage.getItem('tm_settings');
        if (ss) G.settings = JSON.parse(ss);
        const smf = localStorage.getItem('tm_monthlyFees');
        G.monthlyFees = smf ? JSON.parse(smf) : {};
        const sid = localStorage.getItem('tm_invoiceData');
        G.invoiceData = sid ? JSON.parse(sid) : {};
        saveToLS(); // Firebase에 업로드
      } else {
        const json = await decompressB64(CLIENTS_B64);
        G.clients = expandClients(JSON.parse(json));
        G.periods = JSON.parse(JSON.stringify(DEFAULT_PERIODS));
      }
    }
  } catch(e) {
    console.error('Firebase 로드 실패, 로컬 데이터 사용:', e);
    const saved = localStorage.getItem('tm_clients');
    if (saved) G.clients = JSON.parse(saved);
    const sp = localStorage.getItem('tm_periods');
    G.periods = sp ? JSON.parse(sp) : JSON.parse(JSON.stringify(DEFAULT_PERIODS));
    const sj = localStorage.getItem('tm_julgae');
    G.julgae = sj ? JSON.parse(sj) : {};
    const ss = localStorage.getItem('tm_settings');
    if (ss) G.settings = JSON.parse(ss);
    const smf = localStorage.getItem('tm_monthlyFees');
    G.monthlyFees = smf ? JSON.parse(smf) : {};
    const sid2 = localStorage.getItem('tm_invoiceData');
    G.invoiceData = sid2 ? JSON.parse(sid2) : {};
  }
  migrateJulgae();
  if (G.settings.managers) MANAGERS = ['전체', ...G.settings.managers];
  updateBadge();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page-dashboard').style.display = 'block';
  renderDashboard();
}

// ══════════════════════════════════════════════════════
// 앱 시작
// ══════════════════════════════════════════════════════
function init() {
  document.getElementById('login-screen').style.display = 'flex';
  fbAuth.onAuthStateChanged(async user => {
    if (user) {
      G.user = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      const nameEl = document.getElementById('user-name');
      const logoutBtn = document.getElementById('logout-btn');
      nameEl.textContent = user.displayName || user.email;
      nameEl.style.display = 'inline';
      logoutBtn.style.display = 'inline';
      await loadFromFirebase();
    } else {
      G.user = null;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('user-name').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'none';
      ['dashboard','clients','schedule','closure','julgae','aitools']
        .forEach(p => { const el = document.getElementById('page-'+p); if(el) el.style.display='none'; });
    }
  });
}

init();

// ── 리스트 가장자리 스크롤 시 페이지 이동 버튼 ──────────────────────────
(function() {
  function getOrCreateBtn(id, side) {
    let btn = document.getElementById(id);
    if (!btn) {
      btn = document.createElement('button');
      btn.id = id;
      const r = side === 'left' ? '0 14px 14px 0' : '14px 0 0 14px';
      btn.style.cssText = `position:fixed;top:50%;${side}:0;transform:translateY(-50%);z-index:9999;background:rgba(30,30,60,.82);color:#fff;border:none;border-radius:${r};padding:22px 10px;font-size:22px;font-weight:900;cursor:pointer;display:none;box-shadow:0 2px 12px rgba(0,0,0,.4);touch-action:manipulation;-webkit-tap-highlight-color:transparent;line-height:1`;
      document.body.appendChild(btn);
    }
    return btn;
  }

  function updateNav() {
    const wrap = document.querySelector('.tbl-wrap');
    const isClients = G.currentTab === 'clients';
    const totalPages = isClients ? (Math.ceil(filteredClients().length / 50) || 1) : 1;
    const atLeft  = !wrap || wrap.scrollLeft <= 4;
    const atRight = !wrap || wrap.scrollLeft >= wrap.scrollWidth - wrap.clientWidth - 4;

    const lb = getOrCreateBtn('_prev-page-btn', 'left');
    lb.textContent = '◀';
    lb.style.display = (isClients && atLeft && G.clientPage > 0) ? '' : 'none';
    lb.onclick = () => { G.clientPage--; renderClients(); window.scrollTo({top:0,behavior:'instant'}); };

    const rb = getOrCreateBtn('_next-page-btn', 'right');
    rb.textContent = '▶';
    rb.style.display = (isClients && atRight && G.clientPage < totalPages - 1) ? '' : 'none';
    rb.onclick = () => { G.clientPage++; renderClients(); window.scrollTo({top:0,behavior:'instant'}); };
  }

  // 스크롤 이벤트는 버블되지 않으므로 capture 단계에서 감지
  document.addEventListener('scroll', e => {
    if (e.target && e.target.classList && e.target.classList.contains('tbl-wrap')) {
      updateNav();
    }
  }, true);

  // renderClients 후 DOM 재구성 시 버튼 상태 갱신
  const _rc = renderClients;
  renderClients = function() { _rc.apply(this, arguments); requestAnimationFrame(updateNav); };
})();
</script>
