  const period = G.periods[pIdx];
  if (!period) return;
  const checked = [...document.querySelectorAll('[data-cl-id]:checked')].map(el=>Number(el.dataset.clId));
  if (!checked.length) return alert('거래처를 선택해주세요');
  const results = document.getElementById('cl-results');
  results.innerHTML = `<div style="text-align:center;padding:16px;color:#888">${spinnerHTML}AI 생성 중...</div>`;
  const sys = `당신은 한국 세무사 사무소의 신고 업무 전문가입니다. 거래처별 맞춤 신고 체크리스트를 작성합니다.
형식: 번호 목록(1. 2. 3. ...), 각 항목은 구체적이고 실무적으로, 5~8개 항목, 마크다운 없이`;
  let html = '';
  for (const id of checked.slice(0, 10)) {
    const c = G.clients.find(x=>x.id===id);
    if (!c) continue;
    const prompt = `신고기간: ${period.label}
거래처: ${c.name} (대표: ${c.rep})
사업자유형: ${c.taxType} / 부가세: ${c.vatType} / 업종: ${c.bizType||'-'}
수임항목: ${(c.contracts||[]).map(contractLabel).join(', ')||'-'}
담당자: ${getManagers(c).join(', ')||'-'}

위 정보를 바탕으로 이번 ${period.label} 신고 시 확인해야 할 맞춤 체크리스트를 작성해주세요.`;
    try {
      const text = await aiCall(sys, prompt, 600);
      if (!text) break;
      html += `<div style="margin-bottom:14px;border:1px solid #e8e8e8;border-radius:10px;padding:12px">
        <div style="font-weight:700;font-size:13px;margin-bottom:6px;color:#1565c0">${esc(c.name)} <span style="font-size:11px;font-weight:400;color:#888">${esc(c.rep)}</span>

        </div>
        <div id="cl-txt-${c.id}" style="font-size:12px;line-height:1.7;color:#444;white-space:pre-wrap">${esc(text)}</div>
      </div>`;
      results.innerHTML = html;
    } catch(e) {
      html += `<div style="color:#e53935;font-size:12px;margin-bottom:8px">${esc(c.name)}: 실패 — ${esc(String(e.message||e))}</div>`;
      results.innerHTML = html;
    }
  }
  if (!html) results.innerHTML = '<div style="color:#aaa">생성된 체크리스트가 없습니다</div>';
}

const _IMPORT_COL_RULES = {
  bizNo:         ['사업자번호','사업자등록번호','사업자 번호','등록번호'],

  taxType:       ['인격','법인구분','개인법인'],
  vatType:       ['과세유형','부가세유형','과세구분','과세형태'],
  phone:         ['전화번호','전화','연락처','휴대폰'],
  bizType:       ['업태','업종'],
  taxOffice:     ['관할세무서','세무서'],
  period:        ['과세기간','기간','신고기간'],
  salesCount:    ['매출건수','매출 건수','(매출)건수'],
  salesAmount:   ['매출금액','매출 금액','공급가액(매출)','매출공급가액'],
  purchaseCount: ['매입건수','매입 건수','(매입)건수'],
  purchaseAmount:['매입금액','매입 금액','공급가액(매입)','매입공급가액'],
};

function autoDetectColumns(headers) {
  const map = {};
  headers.forEach((h, i) => {
    const hc = String(h).replace(/\s+/g,'').toLowerCase();
    for (const [field, candidates] of Object.entries(_IMPORT_COL_RULES)) {
      if (map[field] !== undefined) continue;
      if (candidates.some(c => hc.includes(c.replace(/\s+/g,'').toLowerCase()))) map[field] = i;
    }
  });
  return map;
}

function parseImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (data.length < 2) {
        document.getElementById('import-preview').innerHTML = '<div style="color:#e53935;margin-top:12px;font-size:13px">데이터가 없습니다.</div>';
        return;
      }
      window._importHeaders = data[0].map(String);
      window._importRows = data.slice(1).filter(r => r.some(v => String(v).trim()));
      showImportPreview();
    } catch(err) {
      document.getElementById('import-preview').innerHTML = `<div style="color:#e53935;margin-top:12px;font-size:13px">파일 오류: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function showImportPreview() {
  const preview = document.getElementById('import-preview');
  if (!preview || !window._importHeaders) return;
  const headers = window._importHeaders;
  const rows = window._importRows;
  const colMap = autoDetectColumns(headers);
  const type = window._importType;
  const fieldLabels = {
    bizNo:'사업자번호',name:'상호명',rep:'대표자',taxType:'인격',vatType:'부가세',
    phone:'전화번호',bizType:'업태',taxOffice:'세무서',period:'기간',
    salesCount:'매출건수',salesAmount:'매출금액',purchaseCount:'매입건수',purchaseAmount:'매입금액'
  };
  const relevantFields = type==='clients'
    ? ['bizNo','name','rep','taxType','vatType','phone','bizType','taxOffice']
    : ['bizNo','name','period','salesCount','salesAmount','purchaseCount','purchaseAmount'];
  const mappedFields = relevantFields.filter(f => colMap[f] !== undefined);
  const unmapped = relevantFields.filter(f => colMap[f] === undefined);

  preview.innerHTML = `
  <div style="margin-top:14px">

      ${unmapped.length>0?`<span style="color:#e65100;background:#fff3e0;padding:2px 8px;border-radius:10px">⚠ 미인식: ${unmapped.map(f=>fieldLabels[f]).join(', ')}</span>`:''}
    </div>
    ${mappedFields.length===0?`<div style="color:#e53935;font-size:13px;padding:12px;background:#fdecea;border-radius:8px;margin-bottom:12px">컬럼을 자동 인식하지 못했습니다. 파일의 헤더 행을 확인해주세요.</div>`:`

      </table>
    </div>
    ${rows.length>8?`<div style="font-size:11px;color:#aaa;margin-bottom:8px">...외 ${rows.length-8}행</div>`:''}`}

      <button class="btn-primary" onclick="doImport()" ${mappedFields.length===0?'disabled style="opacity:.5"':''}>

      </button>

  </div>`;
}

function doImport() {
  const rows = window._importRows;
  const headers = window._importHeaders;
  if (!rows || !headers) return;
  const colMap = autoDetectColumns(headers);
  const type = window._importType;
  const getVal = (row, field) => colMap[field]!==undefined ? String(row[colMap[field]]||'').trim() : '';

  if (type === 'clients') {
    let added=0, updated=0, skipped=0;
    rows.forEach(row => {
      const bizNo = getVal(row,'bizNo').replace(/[^0-9]/g,'');
      const name = getVal(row,'name');
      if (!name) { skipped++; return; }
      let existing = (bizNo.length>=10) ? G.clients.find(c=>(c.bizNo||'').replace(/[^0-9]/g,'')===bizNo) : null;
      if (!existing) existing = G.clients.find(c=>c.name===name);
      const rawVat = getVal(row,'vatType');
      const vatType = rawVat.includes('일반')?'일반':rawVat.includes('간이')?'간이':rawVat.includes('면세')?'면세':null;
      const rawTax = getVal(row,'taxType');
      const taxType = rawTax.includes('법인')?'법인':rawTax.includes('개인')?'개인':null;
      if (existing) {
        if (bizNo.length>=10 && !existing.bizNo) existing.bizNo = bizNo;
        if (vatType) existing.vatType = vatType;
        if (taxType) existing.taxType = taxType;
        if (getVal(row,'rep') && !existing.rep) existing.rep = getVal(row,'rep');
        if (getVal(row,'phone') && !existing.phone) existing.phone = getVal(row,'phone');
        if (getVal(row,'bizType') && !existing.bizType) existing.bizType = getVal(row,'bizType');
        if (getVal(row,'taxOffice') && !existing.taxOffice) existing.taxOffice = getVal(row,'taxOffice');
        updated++;
      } else {
        const maxId = G.clients.reduce((a,c)=>Math.max(a,c.id||0),0);
        G.clients.push({
          id:maxId+1+added, name, rep:getVal(row,'rep'),
          bizNo:bizNo||'', jumin:'', relatedGroup:'',
          phone:getVal(row,'phone'), email:'',
          taxType:taxType||'개인', vatType:vatType||'일반',
          bizType:getVal(row,'bizType'), taxOffice:getVal(row,'taxOffice'),
          manager:'', managers:[], dealType:'기장', dealTypes:['기장'],
          fee:0, feeStatus:'청구완료', status:'정상',
          dataReceived:false, bookkeeping:false, approved:false,
          memo:'', contractDate:'', contracts:[],
          terminationDate:'', terminationReason:'', closureYear:'',
          closureTaxFiled:false, closureTaxApproved:false
        });
        added++;
      }
    });
    saveToLS(); closeModal(); renderClients();
    alert(`거래처 가져오기 완료!\n• 신규 추가: ${added}개\n• 업데이트: ${updated}개\n• 건너뜀: ${skipped}개`);
  } else {
    if (!G.invoiceData) G.invoiceData = {};
    let matched=0, unmatched=0;
    rows.forEach(row => {
      const bizNo = getVal(row,'bizNo').replace(/[^0-9]/g,'');
      const name = getVal(row,'name');
      if (!bizNo && !name) return;
      let client = (bizNo.length>=10) ? G.clients.find(c=>(c.bizNo||'').replace(/[^0-9]/g,'')===bizNo) : null;
      if (!client && name) client = G.clients.find(c=>c.name===name);
      if (!client) { unmatched++; return; }
      const period = getVal(row,'period') || new Date().toLocaleDateString('ko-KR');
      if (!G.invoiceData[client.id]) G.invoiceData[client.id] = {periods:{}, lastImported:''};
      G.invoiceData[client.id].periods[period] = {
        salesCount:   Number(getVal(row,'salesCount').replace(/[^0-9]/g,'')||0),
        salesAmount:  Number(getVal(row,'salesAmount').replace(/[^0-9]/g,'')||0),
        purchaseCount:Number(getVal(row,'purchaseCount').replace(/[^0-9]/g,'')||0),
        purchaseAmount:Number(getVal(row,'purchaseAmount').replace(/[^0-9]/g,'')||0),
      };
      G.invoiceData[client.id].lastImported = new Date().toLocaleDateString('ko-KR');
      matched++;
    });
    saveToLS(); closeModal();
    alert(`세금계산서 현황 가져오기 완료!\n• 매칭 성공: ${matched}개\n• 미매칭: ${unmatched}개${unmatched>0?'\n  (사업자번호/상호명으로 거래처를 찾을 수 없는 행)':''}`);
  }
}

async function runAINotice() {
  const chips = document.querySelectorAll('.nc-chip.on');
  if (!chips.length) return alert('거래처를 선택해 주세요');
  const type = document.getElementById('notice-type').value;
  const tone = document.getElementById('notice-tone').value;
  const deadline = document.getElementById('notice-deadline').value;
  const results = document.getElementById('notice-results');
  results.innerHTML = `<div style="text-align:center;padding:20px;color:#888">${spinnerHTML}AI 생성 중...</div>`;

  for (const chip of chips) {
    const c = G.clients.find(x=>x.id===Number(chip.dataset.id));
    if (!c) continue;
    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 ${type} 신고 안내문을 작성해주세요.
거래처명: ${c.name}, 대표자: ${c.rep}님, 과세유형: ${c.taxType}/${c.vatType}, 수임항목: ${(c.contracts||[]).map(contractLabel).join(', ')}${deadline?', 마감일: '+deadline:''}
조건: ${tone}한 어투, 4~6문장, 자료 제출 요청 포함, 사무소 서명 없이 본문만, 마크다운 없이`;
    try {
      const text = await aiCall(null, prompt, 600);
      if (!text) return;
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">

async function runAIReminder() {
  const chips = document.querySelectorAll('.sc-chip.on');
  if (!chips.length) return alert('거래처를 선택해 주세요');
  const type = document.getElementById('sms-type').value;
  const tone = document.getElementById('sms-tone').value;
  const deadline = document.getElementById('sms-deadline').value;
  const results = document.getElementById('sms-results');
  results.innerHTML = `<div style="text-align:center;padding:20px;color:#888">${spinnerHTML}AI 생성 중...</div>`;

  for (const chip of chips) {
    const c = G.clients.find(x=>x.id===Number(chip.dataset.id));
    if (!c) continue;
    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 자료 제출 요청 문자를 작성해주세요.
거래처: ${c.name} (${c.rep}님), 신고 유형: ${type}${deadline?', 마감일: '+deadline:''}
조건: ${tone}한 어투, SMS 80자 이내, 마감일 강조, 연락처 자리는 [연락처]로, 본문만, 마크다운 없이`;
    try {
      const rawText = await aiCall(null, prompt, 200);
      if (!rawText) return;
      const text = rawText.trim();
      const len = text.length;
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700">${esc(c.name)} <span style="font-size:12px;color:#888">${esc(c.phone)}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;font-weight:700;color:${len>80?'#e53935':'#43a047'}">${len}자</span>
            <button class="btn-sm" style="background:#f5f5f5" onclick="navigator.clipboard.writeText(document.getElementById('sms-${c.id}').textContent);this.textContent='✓ 복사됨'">복사</button>
          </div>
        </div>
        <div class="sms-bubble" id="sms-${c.id}">${esc(text)}</div>
      </div>`;
    } catch(e) {
      results.innerHTML += `<div style="color:red;margin-top:8px">${esc(c.name)}: 생성 실패</div>`;
    }
  }
}

function tcQuickAsk(q) {
  document.getElementById('tc-input').value = q;
  tcSendChat();

function tcAddMsg(role, html) {
  const box = document.getElementById('tc-chat-box');
  const div = document.createElement('div');
  const isUser = role === 'user';
  div.style.cssText = `align-self:${isUser?'flex-end':'flex-start'};background:${isUser?'#f5f5f5':'#fff'};border:1px solid #e0e0e0;border-radius:${isUser?'16px 16px 4px 16px':'16px 16px 16px 4px'};padding:10px 13px;max-width:88%;font-size:14px;line-height:1.65`;
  div.innerHTML = html;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function tcSendChat() {
  const inp = document.getElementById('tc-input');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  window._tcMsgs.push({role:'user', content:q});
  tcAddMsg('user', esc(q));
  const loadDiv = tcAddMsg('ai', `${spinnerHTML} 답변 생성 중...`);
  try {
    const [aiRes, precRes] = await Promise.all([
      tcFetchAI(window._tcMsgs),
      tcFetchPrec(q, 'prec', 4)
    ]);
    window._tcMsgs.push({role:'assistant', content:aiRes.replace(/<br>/g,'\n').replace(/<[^>]+>/g,'')});
    let html = aiRes;
    if (precRes && precRes.length > 0) {
      html += '<div style="margin-top:10px;border-top:1px solid #e0e0e0;padding-top:8px;font-size:12px;color:#888">📋 관련 판례</div>';
      precRes.forEach(p => {
        const name = esc(p.사건명||p.제목||'판례');
        const year = (p.선고일자||p.생산일자||'').substring(0,4);

async function tcFetchAI(msgs) {
  const key = getAIKey();
  if (!key) { alert('⚙ 설정에서 Claude AI API 키를 먼저 입력해주세요'); return ''; }
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:aiHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      system:`당신은 한국 세무 전문 AI 상담사입니다. 세무사 사무소 업무용으로 사용됩니다.
- 개인소득세·종합소득세·법인세·부가가치세·양도소득세·상속증여세·원천징수 등 전 세목 상담
- 법령 근거(소득세법 제○조 등)와 실무 처리 방법을 함께 안내
- 답변은 핵심 위주로 간결하게 (3~5문장 또는 번호 목록)
- 계산이 필요한 경우 수식과 함께 설명
- 마지막에 주의사항·면책 한 줄 추가`,
      messages: msgs
    })
  });
  if (!resp.ok) { const e=await resp.json().catch(()=>({error:{message:resp.statusText}})); return '오류: '+(e?.error?.message||resp.statusText); }
  const data = await resp.json();
  const text = data.content?.[0]?.text || '답변을 가져올 수 없습니다.';
  return text.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

async function tcFetchPrec(keyword, type, display) {
  try {
    const url = `https://www.law.go.kr/DRF/lawSearch.do?OC=shinetax&target=${type}&type=JSON&query=${encodeURIComponent(keyword)}&display=${display}&search=2`;
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const data = await resp.json();
    const key = type==='prec'?'PrecSearch':'ExpcSearch';
    const subKey = type==='prec'?'prec':'expc';
    const items = data[key]?.[subKey] || [];
    return Array.isArray(items) ? items : [items];
  } catch(e) { return null; }
}

function addClientNote(id) {
  const txt = (document.getElementById('note-input')||{}).value?.trim();

  if (!G.clientNotes) G.clientNotes = {};
  if (!G.clientNotes[id]) G.clientNotes[id] = [];
  const reminder = document.getElementById('note-reminder')?.value || '';
  G.clientNotes[id].push({id:Date.now()+'', date:new Date().toLocaleString('ko-KR'), text:txt, reminder});
  saveToLS();
  openClientNotes(id);
}
function deleteClientNote(clientId, noteId) {
  if (!G.clientNotes?.[clientId]) return;
  G.clientNotes[clientId] = G.clientNotes[clientId].filter(n=>n.id!==noteId);
  saveToLS();
  openClientNotes(clientId);
}

function openManagerAnalysis() {
  const managers = (G.settings?.managers||[]);
  const thisYM = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  const rows = managers.map(m=>{
    const allC=G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&getManagers(c).includes(m));
    const monthlyC=allC.filter(c=>getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
    const monthlyFee=monthlyC.reduce((a,c)=>a+(c.fee||0),0);
    const collected=monthlyC.filter(c=>(G.monthlyFees[c.id]||{})[thisYM]).reduce((a,c)=>a+(c.fee||0),0);
    const collPct=monthlyFee>0?Math.round(collected/monthlyFee*100):0;
    let jDone=0,jTotal=0;
    (G.periods||[]).forEach(p=>{
      allC.forEach(c=>{
        const v=julgaeVal(p.id+'|'+(p.reportType||p.type),c.id);
        if(v&&(v.a!==undefined||v.d!==undefined)){jTotal++;if(v.a)jDone++;}
      });
    });
    const jPct=jTotal>0?Math.round(jDone/jTotal*100):0;
    return `<tr style="border-bottom:1px solid #f0f0f0">
      <td style="padding:10px 12px;font-weight:700">${esc(m)}</td>
      <td style="text-align:center;padding:10px 12px">${allC.length}</td>
      <td style="text-align:center;padding:10px 12px">${monthlyC.length}</td>
      <td style="text-align:right;padding:10px 12px;font-weight:600;color:#4f8ef7">${monthlyFee.toLocaleString()}원</td>
      <td style="text-align:center;padding:10px 12px"><span style="background:${collPct>=80?'#e8f5e9':'#fff3e0'};color:${collPct>=80?'#2e7d32':'#e65100'};padding:2px 8px;border-radius:8px;font-size:12px">${collPct}%</span></td>
      <td style="text-align:center;padding:10px 12px"><span style="font-size:12px;color:#888">${jDone}/${jTotal} (${jPct}%)</span></td>
    </tr>`;

function openBulkReminder() {
  const thisYM = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  const prevYMs = [1,2,3].map(i=>{
    const d=new Date(); d.setMonth(d.getMonth()-i);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  });

  const feeTargets = G.clients.filter(c=>
    c.status!=='해지'&&c.status!=='폐업'&&
    (c.fee||0)>0&&
    getDealTypes(c).some(d=>['기장','고문','성실'].includes(d))
  );

  const unpaidByClient = feeTargets.map(c=>{
    const unpaidMonths = [thisYM,...prevYMs].filter(ym=>!(G.monthlyFees[c.id]||{})[ym]);
    const total = unpaidMonths.length * (c.fee||0);
    return {...c, unpaidMonths, total};
  }).filter(c=>c.unpaidMonths.length>0);

  const s = G.settings||{};

  showModal(`<div style="max-width:620px;width:100%">

        미수금 거래처 <b>${unpaidByClient.length}개</b> · 총 <b>${unpaidByClient.reduce((s,c)=>s+c.total,0).toLocaleString()}원</b>
      </div>
      <button onclick="brGenAll()" style="padding:8px 16px;border-radius:8px;border:none;background:#1565c0;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">✦ 전체 AI 생성</button>
      <button onclick="brCopyAll()" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">📋 전체 복사</button>
    </div>
    <div style="margin-bottom:10px;display:flex;gap:8px;align-items:center">
      <label style="font-size:12px;color:#666;white-space:nowrap">문체</label>
      <select id="br-tone" style="font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-family:inherit">
        <option value="정중">정중</option>
        <option value="친근">친근</option>
        <option value="간결">간결</option>
      </select>
    </div>
    <div id="br-list" style="display:flex;flex-direction:column;gap:8px;max-height:480px;overflow-y:auto">
      ${unpaidByClient.length===0
        ? '<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">🎉 미수금 거래처가 없습니다</div>'
        : unpaidByClient.map(c=>{
            const defaultMsg = `[${esc(s.name||'세무사무소')}] ${esc(c.rep||c.name)}님, ${c.unpaidMonths.map(m=>m.slice(5)+'월').join('·')} 기장료 ${c.total.toLocaleString()}원 납부 부탁드립니다.\n계좌: ${s.bank||''} ${s.account||''} (${s.accountHolder||''})`;
            return `<div style="background:#f8f9ff;border-radius:10px;padding:12px 14px;border:1px solid #e8eaf6" data-cid="${c.id}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <div>
                  <span style="font-weight:700;font-size:13px">${esc(c.name)}</span>
                  <span style="color:#888;font-size:11px;margin-left:6px">${esc(c.rep||'')}</span>
                  <span style="margin-left:8px;font-size:11px;background:#fff3e0;color:#e65100;padding:2px 7px;border-radius:12px">${c.unpaidMonths.length}개월 미납 · ${c.total.toLocaleString()}원</span>
                </div>
                <div style="display:flex;gap:6px">
                  <button onclick="brGenOne(${c.id})" style="padding:3px 10px;border-radius:6px;border:1px solid #1565c0;background:#e8f0fe;color:#1565c0;font-size:11px;cursor:pointer;font-family:inherit">✦ AI</button>
                  <button onclick="brCopyOne(${c.id})" style="padding:3px 10px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;font-size:11px;cursor:pointer;font-family:inherit">복사</button>
                </div>
              </div>
              <textarea id="br-msg-${c.id}" style="width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;line-height:1.6;box-sizing:border-box" rows="3">${defaultMsg}</textarea>
            </div>`;
          }).join('')}
    </div>
  </div></div>`);

  window._brClients = unpaidByClient;
  window._brSettings = s;
}

async function brGenOne(cid) {
  const c = (window._brClients||[]).find(x=>x.id===cid);
  if (!c) return;
  const s = window._brSettings||{};
  const tone = document.getElementById('br-tone')?.value||'정중';
  const ta = document.getElementById(`br-msg-${cid}`);
  if (!ta) return;
  ta.value = '생성 중...';
  try {
    const prompt = `세무사 사무소에서 기장료 미납 거래처에 보내는 수금 요청 문자를 작성해주세요.
거래처: ${c.name} (대표자: ${c.rep||''}), 미납금액: ${c.total.toLocaleString()}원 (${c.unpaidMonths.map(m=>m.slice(5)+'월').join('·')} 미납)
사무소: ${s.name||'세무사무소'}, 계좌: ${s.bank||''} ${s.account||''} (${s.accountHolder||''})
조건: ${tone}한 어투, SMS 100자 이내, 금액 강조, 본문만, 마크다운 없이`;
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':(G.settings?.aiKey||''),'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    ta.value = (data.content?.map(b=>b.text||'').join('')||'생성 실패').trim();
  } catch(e) { ta.value = '생성 실패. 다시 시도해주세요.'; }
}

async function brGenAll() {
  const clients = window._brClients||[];
  for (const c of clients) {
    await brGenOne(c.id);
  }
}

function brCopyOne(cid) {
  const ta = document.getElementById(`br-msg-${cid}`);
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(()=>{
    const card = ta.closest('[data-cid]');
    const btn = card ? card.querySelector('button:last-child') : null;
    if(btn){btn.textContent='✓';setTimeout(()=>btn.textContent='복사',1500);}
  });
}

function brCopyAll() {
  const all = (window._brClients||[]).map(c=>{
    const ta = document.getElementById(`br-msg-${c.id}`);
    return ta ? `▶ ${c.name}\n${ta.value}` : '';
  }).filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(all).then(()=>alert('전체 복사됨'));
}

function previewFeeRaise() {
  const pct=Number(document.getElementById('raise-pct')?.value)||5;

  const clients=window._feeRaiseClients||[];
  const rows=clients.map(c=>{

    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #f5f5f5">
      <span style="flex:1;font-weight:600;font-size:13px">${esc(c.name)}</span>

      <span style="color:#aaa">→</span>
      <span style="color:#1565c0;font-weight:700;font-size:13px">${newFee.toLocaleString()}원</span>
      <span style="color:#2e7d32;font-size:11px;min-width:60px;text-align:right">+${diff.toLocaleString()}</span>
    </div>`;
  }).join('');
  const preview=document.getElementById('raise-preview');
  if(preview) preview.innerHTML=rows||'<div style="padding:16px;text-align:center;color:#aaa">대상 거래처 없음</div>';
}
function applyFeeRaise() {
  if(!confirm('수수료를 인상하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  const pct=Number(document.getElementById('raise-pct')?.value)||5;
  const roundTo=Number(document.getElementById('raise-round')?.value)||1000;
  (window._feeRaiseClients||[]).forEach(c=>{
    const cl=G.clients.find(x=>x.id===c.id);
    if(cl) cl.fee=Math.round((cl.fee||0)*(1+pct/100)/roundTo)*roundTo;
  });
  saveToLS();
  closeModal();
  renderClients();
  alert('수수료 인상이 완료되었습니다.');
}

function openAnnualFeeStatement() {
  const yr = new Date().getFullYear();
  const years = [yr, yr-1, yr-2];
  let selYr = yr;
  const genHTML = (y) => {
    const months = Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0')).map(m=>`${y}-${m}`);
    const feeClients = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
    const rows = feeClients.filter(c=>c.fee>0).map(c=>{
      const cells = months.map(ym=>G.monthlyFees[c.id]?.[ym]?`<td style="text-align:center;background:#e8f5e9;color:#2e7d32;font-size:11px">${(G.feePayments?.[c.id]?.[ym]?.method||'✓')}</td>`:`<td style="text-align:center;color:#ddd;font-size:11px">-</td>`);
      const paid = months.filter(ym=>G.monthlyFees[c.id]?.[ym]).length;
      return `<tr><td style="padding:6px 8px;font-size:12px;font-weight:600;white-space:nowrap">${esc(c.name)}</td><td style="padding:6px 8px;font-size:12px;text-align:right">${(c.fee||0).toLocaleString()}</td>${cells.join('')}<td style="padding:6px 8px;font-size:12px;text-align:center;font-weight:700;color:${paid===12?'#2e7d32':'#e65100'}">${paid}/12</td><td style="padding:6px 8px;font-size:12px;text-align:right;font-weight:700">${((c.fee||0)*paid).toLocaleString()}</td></tr>`;
    }).join('');
    const totRow = (() => {
      const cells2 = months.map(ym=>{
        const mTotal = feeClients.filter(c=>G.monthlyFees[c.id]?.[ym]).reduce((a,c)=>a+(c.fee||0),0);
        return `<td style="text-align:right;font-size:11px;color:#555">${mTotal>0?mTotal.toLocaleString():''}</td>`;
      });
      return `<tr style="background:#f5f5f5;font-weight:700"><td colspan="2" style="padding:6px 8px;font-size:12px">합계</td>${cells2.join('')}<td></td><td style="padding:6px 8px;font-size:12px;text-align:right">${feeClients.reduce((a,c)=>a+(c.fee||0)*months.filter(ym=>G.monthlyFees[c.id]?.[ym]).length,0).toLocaleString()}</td></tr>`;
    })();
    return `<table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:#f0f4ff"><th style="padding:6px 8px;text-align:left">거래처</th><th style="padding:6px 8px;text-align:right">월정액</th>${months.map(ym=>`<th style="padding:4px 2px;text-align:center;font-size:10px;min-width:28px">${ym.slice(5)}월</th>`).join('')}<th style="padding:6px 4px;text-align:center">납부</th><th style="padding:6px 8px;text-align:right">합계</th></tr></thead>
      <tbody>${rows}${totRow}</tbody></table>`;
  };
  showModal(`<div style="max-width:90vw;width:900px">
  <div class="modal-header">
    <h3>📊 연간 수수료 명세서</h3>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
      ${years.map(y=>`<button onclick="document.getElementById('annual-stmt-body').innerHTML=genAnnualFee(${y});this.closest('.filter-bar')?.querySelectorAll('button').forEach(b=>b.style.background='#fff');this.style.background='#e8f0fe'" style="padding:6px 16px;border-radius:8px;border:1.5px solid #e0e0e0;background:${y===yr?'#e8f0fe':'#fff'};font-size:13px;cursor:pointer;font-family:inherit">${y}년</button>`).join('')}
      <button onclick="printAnnualStmt()" style="margin-left:auto;padding:6px 16px;border-radius:8px;border:1.5px solid #4f8ef7;background:#e8f0fe;color:#4f8ef7;font-size:13px;cursor:pointer;font-family:inherit">🖨 인쇄</button>
    </div>
    <div id="annual-stmt-body" style="overflow-x:auto;max-height:60vh;overflow-y:auto">${genHTML(yr)}</div>
  </div></div>`);
  window.genAnnualFee = genHTML;
}
function printAnnualStmt() {
  const body = document.getElementById('annual-stmt-body')?.innerHTML||'';

  w.document.close(); w.print();
}

function exportBackup() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    clients: G.clients,
    periods: G.periods,
    julgae: G.julgae,
    settings: G.settings
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taxmanager_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('backup-status');
  st.textContent = '읽는 중...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.clients || !Array.isArray(data.clients)) throw new Error('올바른 백업 파일이 아닙니다.');
      if (!confirm(`백업 파일에 거래처 ${data.clients.length}개, 신고기간 ${(data.periods||[]).length}개가 있습니다.\n현재 데이터를 모두 교체할까요?`)) {
        st.textContent = '취소되었습니다.';
        input.value = '';
        return;
      }
      G.clients  = data.clients;
      G.periods  = data.periods  || G.periods;
      G.julgae   = data.julgae   || G.julgae;
      G.settings = data.settings || G.settings;
      saveToLS();

function importExcel(input) {
  const file = input.files[0]; if (!file) return;
  const mode = document.querySelector('input[name="importMode"]:checked')?.value||'append';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const imported = rows.map((r,i)=>({
        id: Date.now()+i, name:String(r['거래처명']||'').trim(), rep:String(r['대표자']||'').trim(),
        bizNo:'', phone:String(r['연락처']||'').trim(), email:String(r['이메일']||'').trim(),
        taxType:['법인','개인'].includes(r['과세유형'])?r['과세유형']:'개인',
        vatType:['일반','간이','면세'].includes(r['부가세유형'])?r['부가세유형']:'일반',
        bizType:String(r['업종']||''), taxOffice:String(r['관할세무서']||''),
        manager:String(r['담당자']||''), dealType:String(r['거래유형']||'기장'),
        fee:Number(r['월수수료'])||0, feeStatus:String(r['수금상태']||'청구완료'),
        contracts:r['수임계약항목']?String(r['수임계약항목']).split(',').map(s=>s.trim()).filter(Boolean):[],
        status:String(r['거래처상태']||'정상'), contractDate:String(r['수임일자']||''),
        terminationDate:String(r['해지일자']||''), terminationReason:String(r['해지사유']||''),
        closureYear:String(r['폐업연도']||''),
        closureTaxFiled:String(r['신고접수']).toUpperCase()==='Y',
        closureTaxApproved:String(r['신고완료']).toUpperCase()==='Y',
        dataReceived:String(r['자료수령']).toUpperCase()==='Y',
        bookkeeping:String(r['기장완료']).toUpperCase()==='Y',
        approved:String(r['결재완료']).toUpperCase()==='Y',
        memo:String(r['메모']||'')
      })).filter(c=>c.name);
      if (mode==='replace') G.clients=imported;
      else {
        const existing = new Set(G.clients.map(c=>c.name+c.rep));
        G.clients=[...G.clients,...imported.filter(c=>!existing.has(c.name+c.rep))];
      }
      saveToLS();
      document.getElementById('import-status').innerHTML=`<span style="color:#2e7d32;font-weight:600">✓ ${imported.length}개 거래처 ${mode==='replace'?'교체':'추가'} 완료</span>`;
      updateBadge();
    } catch(err) {
      document.getElementById('import-status').innerHTML=`<span style="color:red">파일 읽기 실패: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function getAIKey() { return G.settings?.aiKey || ''; }
function aiHeaders() {
  return {'Content-Type':'application/json','x-api-key':getAIKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
}
async function aiCall(system, userMsg, maxTokens=800) {
  const key = getAIKey();
  if (!key) { alert('⚙ 설정에서 Claude AI API 키를 먼저 입력해주세요 (설정 → Claude AI API 키)'); return null; }
  const body = {model:'claude-sonnet-4-6', max_tokens:maxTokens, messages:[{role:'user', content:userMsg}]};
  if (system) body.system = system;
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 30000);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:aiHeaders(),body:JSON.stringify(body),signal:ctrl.signal});
    if (!res.ok) { const e=await res.json().catch(()=>({error:{message:res.statusText}})); throw new Error(e?.error?.message||res.statusText); }
    const data = await res.json();
    return data.content?.map(b=>b.text||'').join('') || '';
  } catch(e) {
    if (e.name==='AbortError') throw new Error('AI 응답 시간 초과 (30초). 다시 시도해주세요.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

// Feature 2: 알림 센터 (Notification Center)
// ══════════════════════════════════════════════════════
function computeAlerts() {
  const alerts = [];
  const today = new Date(); today.setHours(0,0,0,0);
  // 신고 마감 D-7
  G.periods.forEach(p => {
    const tpl = PERIOD_TEMPLATES.find(t=>t.reportType===p.reportType||t.tpl===p.reportType);
    if (!tpl||!tpl.deadline) return;
    const m = tpl.deadline.match(/(\d+)월\s*(\d+)일/);
    if (!m) return;
    const yr = today.getFullYear();
    let dl = new Date(yr, Number(m[1])-1, Number(m[2]));
    if (dl < today) dl = new Date(yr+1, Number(m[1])-1, Number(m[2]));
    const diff = Math.ceil((dl-today)/86400000);
    if (diff<=7) alerts.push({type:'deadline',label:'신고 마감 D-'+diff,detail:esc(p.label)+' · '+tpl.deadline,color:'#e53935'});
  });
  // 장기 미수금 (3개월 이상)
  const activeClients = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&c.fee>0&&getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
  activeClients.forEach(c=>{
    let uncollected = 0;
    const now2 = new Date();
    for (let i=1;i<=6;i++) {
      const d2 = new Date(now2.getFullYear(), now2.getMonth()-i, 1);
      const ym2 = d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0');
      if (!c.contractDate||c.contractDate.slice(0,7)>ym2) break;
      if (!(G.monthlyFees[c.id]&&G.monthlyFees[c.id][ym2])) uncollected++;
      else break;
    }
    if (uncollected>=3) alerts.push({type:'unpaid',label:'장기 미수금',detail:esc(c.name)+' '+uncollected+'개월 미수',color:'#c62828'});
  });
  // 계약 갱신 필요 (11개월 이상)
  const renewalClients = G.clients.filter(c=>{
    if(c.status!=='정상'||!c.contractDate)return false;
    const cd=new Date(c.contractDate);
    const months=(today.getFullYear()-cd.getFullYear())*12+(today.getMonth()-cd.getMonth());
    return months>=11;
  });
  if (renewalClients.length) alerts.push({type:'renewal',label:'계약 갱신 필요',detail:renewalClients.length+'개 거래처 (11개월 이상 경과)',color:'#e65100'});
  // 사업자번호 미입력
  const noBizNo = G.clients.filter(c=>!c.bizNo&&c.status==='정상').length;
  if (noBizNo>0) alerts.push({type:'missingBiz',label:'사업자번호 미입력',detail:noBizNo+'개 거래처 사업자번호 미입력',color:'#888'});
  // 메모 알림 날짜
  const todayStr = new Date().toISOString().slice(0,10);
  const tomorrowStr = new Date(Date.now()+86400000).toISOString().slice(0,10);
  Object.entries(G.clientNotes||{}).forEach(([idStr,notes])=>{
    const c = G.clients.find(x=>x.id===Number(idStr));
    if (!c) return;
    (notes||[]).forEach(n=>{
      if (!n.reminder) return;
      if (n.reminder <= tomorrowStr && n.reminder >= todayStr) {
        alerts.push({type:'memo',label:'메모 알림',detail:esc(c.name)+': '+esc(n.text.slice(0,30)),color:'#9c27b0'});
      }
    });
  });
  return alerts;
}
function openNotificationCenter(btn) {
  const existing = document.getElementById('notification-panel');
  if (existing) { existing.remove(); return; }
  const alerts = computeAlerts();
  const panel = document.createElement('div');
  panel.id = 'notification-panel';
  const rect = btn.getBoundingClientRect();
  panel.style.cssText = `position:fixed;top:${rect.bottom+6}px;left:${Math.min(rect.left,window.innerWidth-320)}px;z-index:500;background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.22);padding:14px;width:300px;max-height:70vh;overflow-y:auto`;
  panel.innerHTML = `<div style="font-weight:700;font-size:14px;margin-bottom:10px">🔔 알림 센터 (${alerts.length})</div>
    ${alerts.length?alerts.map(a=>`<div style="padding:10px 12px;border-radius:10px;border-left:4px solid ${a.color};background:#fafbff;margin-bottom:6px">
      <div style="font-weight:700;font-size:13px;color:${a.color}">${a.label}</div>
      <div style="font-size:11px;color:#666;margin-top:2px">${a.detail}</div>
    </div>`).join(''):`<div style="color:#aaa;text-align:center;padding:20px">알림이 없습니다</div>`}`;
  document.body.appendChild(panel);
  setTimeout(()=>{ document.addEventListener('click', function _npOut(e){ if(!panel.contains(e.target)&&!btn.contains(e.target)){panel.remove();document.removeEventListener('click',_npOut);} }); }, 100);
}

function clientRiskLevel(c) {
  if (c.status==='주의') return 'red';
  // Count uncollected months
  const now3 = new Date();
  let uncollected = 0;
  if (c.fee>0&&getDealTypes(c).some(d=>['기장','고문','성실'].includes(d))) {
    for (let i=1;i<=6;i++) {
      const d3 = new Date(now3.getFullYear(), now3.getMonth()-i, 1);
      const ym3 = d3.getFullYear()+'-'+String(d3.getMonth()+1).padStart(2,'0');
      if (!c.contractDate||c.contractDate.slice(0,7)>ym3) break;
      if (!(G.monthlyFees[c.id]&&G.monthlyFees[c.id][ym3])) uncollected++;
      else break;
    }
  }
  if (uncollected>=3) return 'red';
  // Contract age
  let contractMonths = 0;
  if (c.contractDate) {
    const cd=new Date(c.contractDate);
    contractMonths=(now3.getFullYear()-cd.getFullYear())*12+(now3.getMonth()-cd.getMonth());
  }
  if (contractMonths>=12) return 'red';
  if (uncollected>=1&&uncollected<=2) return 'yellow';
  if (!c.bizNo) return 'yellow';
  if (contractMonths>=10&&contractMonths<=11) return 'yellow';
  return 'green';
}

function autoCreatePeriods(year) {
  const yy = String(year).slice(2);
  let created = 0;
  PERIOD_TEMPLATES.forEach(tpl => {
    const label = yy + '년 ' + tpl.label;
    const exists = G.periods.find(p => p.label === label && p.reportType === tpl.reportType);
    if (exists) return;
    const newId = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    G.periods.push({
      id: newId,
      label,
      type: tpl.type,
      reportType: tpl.reportType,
      targetType: tpl.targetType,
      deadline: tpl.deadline,
      hint: tpl.hint,
      enrolled: []
    });
    created++;
  });
  if (created > 0) { saveToLS(); alert(year+'년 신고기간 '+created+'개 자동 생성 완료'); renderJulgae(); }
  else alert(year+'년 신고기간이 이미 모두 존재합니다');
}

function migrateJulgae() {
  for (const pKey of Object.keys(G.julgae)) {
    for (const cId of Object.keys(G.julgae[pKey])) {
      if (typeof G.julgae[pKey][cId] === 'boolean') {
        G.julgae[pKey][cId] = {d:false, b:false, a:G.julgae[pKey][cId], s:false, revenue:0, income:0, taxBase:0, fee:0};
      } else if (G.julgae[pKey][cId] && G.julgae[pKey][cId].s === undefined) {
        G.julgae[pKey][cId].s = false;
        G.julgae[pKey][cId].revenue    = G.julgae[pKey][cId].revenue    || 0;
        G.julgae[pKey][cId].income     = G.julgae[pKey][cId].income     || 0;
        G.julgae[pKey][cId].taxBase    = G.julgae[pKey][cId].taxBase    || 0;
        G.julgae[pKey][cId].fee        = G.julgae[pKey][cId].fee        || 0;
        G.julgae[pKey][cId].feeSeongsi = G.julgae[pKey][cId].feeSeongsi || 0;
      }
    }
  }
  // 수수료 4종 필드 마이그레이션: feeSingo가 미정의인 거래처에 한해 deal type 기준으로 이동
  const bookingTypes = ['기장', '고문', '성실'];
  let feesMigrated = false;
  G.clients.forEach(c => {
    if (c.feeSingo === undefined) {
      feesMigrated = true;
      c.feeSingo   = 0;
      c.feeJojung  = 0;
      c.feeSeongsi = 0;
      const dt = getDealTypes(c);
      const hasBooking = dt.some(d => bookingTypes.includes(d));
      const hasSingo   = dt.includes('신고대리');
      if (hasSingo && !hasBooking && c.fee > 0) {
        // 신고대리 전용 거래처: 기존 fee → feeSingo로 이동
        c.feeSingo = c.fee;
        c.fee = 0;
      }
    }
  });
  if (feesMigrated) saveToLS();
}

// ── 리스트 가장자리 스크롤 시 페이지 이동 버튼 ──────────────────────────
(function() {
  function getOrCreateBtn(id, side) {
    let btn = document.getElementById(id);
    if (!btn) {
      btn = document.createElement('button');
      btn.id = id;
      const r = side === 'left' ? '0 14px 14px 0' : '14px 0 0 14px';
      btn.style.cssText = `position:fixed;top:50%;${side}:0;transform:translateY(-50%);z-index:9999;background:rgba(30,30,60,.82);color:#fff;border:none;border-radius:${r};padding:22px 10px;font-size:22px;font-weight:900;cursor:pointer;display:none;box-shadow:0 2px 12px rgba(0,0,0,.4);touch-action:manipulation;-webkit-tap-highlight-color:transparent;line-height:1`;
      document.body.appendChild(btn);
    }
    return btn;
  }

  function updateNav() {
    const wrap = document.querySelector('.tbl-wrap');
    const isClients = G.currentTab === 'clients';
    const totalPages = isClients ? (Math.ceil(filteredClients().length / 50) || 1) : 1;
    const atLeft  = !wrap || wrap.scrollLeft <= 4;
    const atRight = !wrap || wrap.scrollLeft >= wrap.scrollWidth - wrap.clientWidth - 4;

    const lb = getOrCreateBtn('_prev-page-btn', 'left');
    lb.textContent = '◀';
    lb.style.display = (isClients && atLeft && G.clientPage > 0) ? '' : 'none';
    lb.onclick = () => { G.clientPage--; renderClients(); window.scrollTo({top:0,behavior:'instant'}); };

    const rb = getOrCreateBtn('_next-page-btn', 'right');
    rb.textContent = '▶';
    rb.style.display = (isClients && atRight && G.clientPage < totalPages - 1) ? '' : 'none';
    rb.onclick = () => { G.clientPage++; renderClients(); window.scrollTo({top:0,behavior:'instant'}); };
  }

  // 스크롤 이벤트는 버블되지 않으므로 capture 단계에서 감지
  document.addEventListener('scroll', e => {
    if (e.target && e.target.classList && e.target.classList.contains('tbl-wrap')) {
      updateNav();
    }
  }, true);

  // renderClients 후 DOM 재구성 시 버튼 상태 갱신
  const _rc = renderClients;
  renderClients = function() { _rc.apply(this, arguments); requestAnimationFrame(updateNav); };
})();
