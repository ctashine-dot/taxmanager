<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TaxManager — 세무사무소 거래처 관리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f8ef7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TaxManager">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
:root{--blue:#4f8ef7;--purple:#a259ff;--green:#2e7d32;--red:#c62828;--orange:#e65100}

/* ── 헤더 */
#header{background:#1a1a2e;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
#logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#4f8ef7,#a259ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
#header-btns{display:flex;gap:8px;align-items:center}
.hbtn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.hbtn.blue{background:rgba(79,142,247,.25);color:#4f8ef7}
.badge-alert{background:#e53935;border-radius:12px;padding:2px 8px;font-size:12px;font-weight:700}

/* ── 탭 */
#tabs{background:#242440;display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap}
.tab{background:transparent;border:none;color:rgba(255,255,255,.7);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:6px}
.tab.active{background:rgba(79,142,247,.28);color:#4f8ef7}

/* ── 컨테이너 */
#main{max-width:1200px;margin:0 auto;padding:20px 16px}

/* ── 카드 */
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-weight:700;font-size:15px;margin-bottom:12px}

/* ── 통계 그리드 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:800}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}

/* ── 배지 */
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-green{background:#e6f4ea;color:#1e7e34}
.badge-red{background:#fdecea;color:#c62828}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-purple{background:#f3e5f5;color:#6a1b9a}
.badge-gray{background:#f5f5f5;color:#555}
.badge-teal{background:#e0f2f1;color:#00695c}

/* ── 필터바 */
.filter-bar{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{display:flex;align-items:center;gap:6px;flex:1 1 200px;background:#f5f5f5;border-radius:8px;padding:7px 12px}
.search-box input{border:none;background:transparent;font-size:13px;outline:none;width:100%;color:#333;font-family:inherit}
.filter-bar select{padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;background:#fff;cursor:pointer;font-family:inherit;color:#333}

/* ── 테이블 */
.tbl-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);-webkit-overflow-scrolling:touch;display:block}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
thead tr{background:#f8f9ff;border-bottom:2px solid #e8eaf6}
th{padding:10px 12px;text-align:left;font-weight:700;color:#555;white-space:nowrap;font-size:12px}
tbody tr{border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
tbody tr:nth-child(even){background:#fafbff}
tbody tr:hover{background:#e8f0fe}
td{padding:10px 12px;vertical-align:middle}
.td-name{font-weight:700;font-size:13px}
.td-sub{font-size:11px;color:#999}

/* ── 체크박스 */
.chk{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:2px solid #e0e0e0;background:#fafafa}
.chk.on{background:#e8f5e9;border-color:#43a047;color:#43a047}

/* ── 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.modal,.overlay>div{background:#fff;border-radius:16px;width:100%;max-width:520px;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,.22);position:relative}
.modal-header{padding:10px 14px 8px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0}
.modal-header h3{font-size:15px;font-weight:800}
.modal-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.close-btn{background:transparent;border:none;cursor:pointer;color:#888;font-size:20px;font-family:inherit;line-height:1}

/* ── 폼 */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid.full{grid-template-columns:1fr}
label.flabel{font-size:11px;font-weight:600;color:#555;display:block;margin-bottom:3px}
input.finput,select.fsel,textarea.ftarea{width:100%;padding:5px 8px;border:1.5px solid #e0e0e0;border-radius:7px;font-size:12px;outline:none;font-family:inherit;box-sizing:border-box}
select.fsel{background:#fff;cursor:pointer}
textarea.ftarea{resize:vertical}
/* 3열 컴팩트 편집 폼 */
.form-cpt{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-items:start}
.form-cpt .c2{grid-column:span 2}
.form-cpt .c3{grid-column:1/-1}
.ff{display:flex;align-items:center;gap:5px;min-width:0;background:#f0f4ff;border-radius:7px;padding:4px 8px}
.ffl{font-size:11px;color:#1565c0;font-weight:700;white-space:nowrap;flex-shrink:0}
.ff .finput,.ff .fsel,.ff .ftarea{flex:1;min-width:0;width:auto;padding:3px 6px;font-size:11px}
.fsec{font-size:11px;font-weight:700;color:#1565c0;background:#e8f0fe;border-radius:7px;padding:5px 10px;margin-bottom:6px}
input.finput:focus,select.fsel:focus,textarea.ftarea:focus{border-color:#4f8ef7}

/* ── 버튼 */
.btn-primary{background:linear-gradient(135deg,#4f8ef7,#a259ff);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-secondary{background:#f5f5f5;color:#555;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.btn-green{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-sm{padding:0 12px;height:30px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;box-sizing:border-box;line-height:1;white-space:nowrap}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-row .btn-primary{flex:2}.btn-row .btn-secondary{flex:1}

/* ── 상세 섹션 */
.detail-section{margin-bottom:14px}
.detail-section-title{font-size:11px;font-weight:700;color:#4f8ef7;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.detail-section-body{background:#fafbff;border-radius:10px;padding:2px 14px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-row .lbl{color:#888}

/* ── 진행 바 */
.progress-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#4f8ef7,#2e7d32);border-radius:3px}

/* ── 필터 팝업 공통 */
.fpop{position:fixed;z-index:9999;background:#fff;border:1.5px solid #e0e0e0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:14px;min-width:200px}
/* ── AI 도구 카드 */
.tool-card{background:#fff;border-radius:16px;padding:22px;cursor:pointer;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,.07);border:2px solid transparent;transition:box-shadow .15s,border-color .15s;width:100%}
.tool-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.tool-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}

/* ── AI 결과 */
.ai-result{background:#fafbff;border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.9;white-space:pre-wrap;border-left:3px solid #4f8ef7}
.sms-bubble{background:#e3f2fd;border-radius:0 14px 14px 14px;padding:12px 14px;font-size:14px;line-height:1.8;white-space:pre-wrap;display:inline-block;max-width:100%}

/* ── 로딩 */
#loading{text-align:center;padding:60px 20px;color:#888}
#loading .spin{font-size:40px;display:block;margin-bottom:12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── 반응형 */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  #header-btns .hbtn span{display:none}
  th:nth-child(n+7){display:none}
  td:nth-child(n+7){display:none}
}

/* ── 수임항목 그룹 */
.contract-group{margin-bottom:6px}
.contract-group-title{font-size:10px;font-weight:700;color:#9e9e9e;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.contract-chips{display:flex;flex-wrap:wrap;gap:4px}
.contract-chip{padding:3px 9px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;color:#888;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.contract-chip.on{border-color:#4f8ef7;background:#e8f0fe;color:#1565c0}
.contract-chip.disabled{opacity:.3;cursor:not-allowed}

/* ── 인쇄 */
@media print {
  #header, #tabs, .filter-bar, .btn-row, #header-btns,
  .hbtn, button:not(.print-keep), .tool-card,
  #page-aitools, #page-schedule { display: none !important; }
  #main { padding: 0; max-width: 100%; }
  body { background: #fff; font-size: 12px; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  table { font-size: 11px; border-collapse: collapse; }
  td, th { border: 1px solid #ddd !important; padding: 6px 8px !important; }
  thead { display: table-header-group; }
  tr { break-inside: avoid; }
  .tbl-wrap { overflow: visible; box-shadow: none; }
  .badge { border: 1px solid currentColor; }
  .stat-card { border: 1px solid #ddd; box-shadow: none; }
  @page { margin: 1.5cm; size: A4 landscape; }
}

/* ── 확장 행 */
.expand-row td{background:#f0f4ff;padding:0;flex:0 0 100%}
.client-row{user-select:none;-webkit-user-select:none}
.client-row.expanded{background:#e8f0fe!important}
.client-row.expanded:hover{background:#dce8fd!important}
.expand-inner{display:flex;flex-wrap:wrap;gap:14px 24px;padding:14px 16px;align-items:flex-start;border-top:1px solid #c5cae9}
.inline-edit{font-size:12px;padding:4px 6px;border:1px solid #4f8ef7;border-radius:6px;background:#fff;font-family:inherit;max-width:100%;color:#1a1a2e}
.inline-edit:focus{outline:none;border-color:#2962ff;box-shadow:0 0 0 2px rgba(79,142,247,.2)}
.julgae-num-input{font-family:inherit;color:#333;background:#fafafa}
.julgae-num-input:focus{outline:none;border-color:#4f8ef7!important;background:#fff;box-shadow:0 0 0 2px rgba(79,142,247,.15)}
body.dark-mode { background: #0d0d1a; color: #e0e0e0; }
body.dark-mode .card { background: #1a1a2e; color: #e0e0e0; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
body.dark-mode .stat-card { background: #1a1a2e; }
body.dark-mode table { background: #1a1a2e; }
body.dark-mode thead tr { background: #242440; }
body.dark-mode tbody tr:nth-child(even) { background: #1e1e30; }
body.dark-mode tbody tr:hover { background: #2a2a40; }
body.dark-mode td, body.dark-mode th { color: #ddd; border-color: #2a2a40; }
body.dark-mode .filter-bar { background: #1a1a2e; }
body.dark-mode .modal, body.dark-mode .overlay>div { background: #1a1a2e; }
body.dark-mode .modal-header { background: #1a1a2e; border-color: #2a2a40; }
body.dark-mode .finput, body.dark-mode .fsel { background: #242440; color: #ddd; border-color: #3a3a50; }
body.dark-mode .tbl-wrap { box-shadow: 0 1px 4px rgba(0,0,0,.3); }
body.dark-mode .btn-sm { background: #242440; color: #bbb; border-color: #3a3a50; }
body.dark-mode .td-sub { color: #888; }
body.dark-mode .stat-label { color: #aaa; }
body.dark-mode .stat-sub { color: #888; }
body.dark-mode .overlay { background: rgba(0,0,0,.65); }
.client-mobile-filters { display: none; }
.pwa-only { display: none; }
@media (display-mode: standalone) { .pwa-only { display: inline-flex !important; } }
@media (max-width: 768px) {
  #main { padding: 12px 8px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  /* 테이블 → 블록 레이아웃으로 전환 (expand-row 위치 버그 해결) */
  .client-table-wrap table { display: block; width: 100%; }
  .client-table-wrap table tbody { display: block; }
  .client-table-wrap table thead { display: none; }
  .client-mobile-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; padding: 8px 10px; background: #f8f9ff; border-radius: 10px; border: 1px solid #e8eaf6; }


  /* 카드 행: flex-wrap 그리드 */
  .client-table-wrap table tbody tr:not(.expand-row) {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    position: relative;
    margin-bottom: 10px;
    border-radius: 12px;
    border: 1px solid #e8eaf6;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
  }

  /* 거래처명 셀 — 전체 너비, 위 배치 */
  .client-table-wrap table tbody td:has(.td-name) {
    flex: 0 0 100%;
    display: block;
    padding: 10px 12px 8px 12px;
    border-bottom: 1px solid #eeeff6;
    box-sizing: border-box;
  }

  /* 체크박스 셀 (일괄편집 모드) */
  .client-table-wrap table tbody td:has(input[type="checkbox"]) {
    flex: 0 0 100%;
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid #f0f0f0;
    box-sizing: border-box;
  }

  /* 데이터 셀 — 4열 그리드, 라벨 위·값 아래, 테두리 없음 */
  .client-table-wrap table tbody td[data-label] {
    flex: 0 0 25%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 6px 10px;
    border: none;
    min-width: 0;
  }
  .client-table-wrap table tbody td[data-label]:before {
    content: attr(data-label);
    font-size: 10px;
    color: #aaa;
    margin-bottom: 3px;
    display: block;
    white-space: nowrap;
    font-weight: 400;
  }
  /* 클릭 시 아래로 펼쳐지는 확장 패널 */
  .client-table-wrap table tbody tr.expand-row {
    display: block;
    margin-bottom: 10px;
    border: 1px solid #c5cae9;
    border-top: none;
    border-radius: 0 0 12px 12px;
    background: #f0f4ff;
    overflow: hidden;
  }
  .client-table-wrap table tbody tr.expand-row td {
    display: block;
    padding: 0;
    background: #f0f4ff;
    box-sizing: border-box;
  }
  /* 확장된 카드: 하단 모서리 직각으로 */
  .client-table-wrap table tbody tr.client-row.expanded {
    margin-bottom: 0 !important;
    border-radius: 12px 12px 0 0 !important;
  }

  .tbl-wrap { overflow-x: auto; }
  #header { padding: 0 10px; }
  #header-btns .hbtn:not(.always-show) { display: none; }
  #tabs { padding: 6px 8px; gap: 2px; }
  .tab { padding: 5px 10px; font-size: 12px; }
  .filter-bar { gap: 6px; }
  .modal { max-width: 95vw !important; width: 95vw !important; }
}
/* 가로(landscape): 8개 셀 한 줄 (각 12.5%) */
@media (max-width: 900px) and (orientation: landscape) {
  .client-table-wrap table tbody td[data-label] {
    flex: 1 1 12.5%;
    min-width: 68px;
  }
}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:#1a1a2e;z-index:9999;align-items:center;justify-content:center">
  <div style="background:#242440;border-radius:20px;padding:40px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);max-width:360px;width:90%">
    <div style="width:56px;height:56px;background:linear-gradient(135deg,#4f8ef7,#a259ff);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 20px;color:#fff">T</div>
    <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:6px">TaxManager</div>
    <div style="font-size:14px;color:#888;margin-bottom:32px">세무사무소 거래처 관리</div>
    <button onclick="signInWithGoogle()" style="width:100%;padding:14px;border-radius:12px;border:none;background:#fff;color:#1a1a2e;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 계정으로 로그인
    </button>
    <div id="login-error" style="margin-top:12px;font-size:13px;color:#ef5350;display:none"></div>
  </div>
</div>

<!-- 헤더 -->
<div id="header">
  <div id="logo">
    <div id="logo-icon">T</div>
    TaxManager
  </div>

async function decompressB64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const reader = ds.readable.getReader();
  const out = []; let total = 0;
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    out.push(value); total += value.length;
  }
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const c of out) { merged.set(c, offset); offset += c.length; }
  return new TextDecoder().decode(merged);
}

// 기장대행 보수표 2023 – 개인/법인 구분
function getJangRyo(revenue, taxType) {
  const corp = taxType === '법인';
  if (!revenue || revenue <= 0) return corp ? 150000 : 80000;
  const r = revenue;
  if (r < 1e8)  return corp ? 150000 :  80000;
  if (r < 3e8)  return corp ? 200000 : 100000;
  if (r < 5e8)  return corp ? 250000 : 150000;
  if (r < 1e9)  return corp ? 300000 : 200000;
  if (r < 2e9)  return corp ? 400000 : 300000;
  if (r < 3e9)  return corp ? 500000 : 400000;
  if (r < 4e9)  return corp ? 600000 : 500000;
  if (r < 5e9)  return corp ? 700000 : 600000;
  // 50억 이상: 각 10억마다 5만(법인 7만) 추가
  const extra = Math.floor((r - 5e9) / 1e9);
  return corp ? 700000 + extra * 70000 : 600000 + extra * 50000;
}
// 세무조정계산서 작성 보수표 2023 – 공식 기반
function calcCorpFee(revenue) {
  if (!revenue || revenue <= 0) return 0;
  const r = revenue;
  if (r < 1e8)   return 300000;
  if (r < 5e8)   return Math.round(300000  + (r - 1e8)  * 0.001);
  if (r < 1e9)   return Math.round(700000  + (r - 5e8)  * 0.0008);
  if (r < 3e9)   return Math.round(1100000 + (r - 1e9)  * 0.0005);
  if (r < 5e9)   return Math.round(2100000 + (r - 3e9)  * 0.0004);
  if (r < 1e10)  return Math.round(2900000 + (r - 5e9)  * 0.0003);
  if (r < 5e10)  return Math.round(4400000 + (r - 1e10) * 0.00025);
  return Math.round(14400000 + (r - 5e10) * 0.00015);
}
function getBosuTable() { return G.settings.bosuTable || DEFAULT_BOSU_TABLE; }
function getBosuTier(revenue) {
  const t = getBosuTable();
  return t.find(r => revenue <= r.max) || t[t.length-1];
}
function getBosuFeeRec(revenue, reportType) {
  if (!revenue || revenue <= 0) return null;
  const tier = getBosuTier(revenue);
  const map = {
    vat:      {field:'fee',       label:'부가세신고', fee: tier.vat},
    vat_hak_1:{field:'fee',       label:'부가세신고', fee: tier.vat},
    vat_hak_2:{field:'fee',       label:'부가세신고', fee: tier.vat},
    vat_yej:  {field:'fee',       label:'부가세예정', fee: tier.vat},
    sajup:    {field:'fee',       label:'사업장현황', fee: tier.vat},
    income:   {field:'fee',       label:'종소세신고', fee: tier.income},
    corp:     {field:'fee',       label:'법인세신고', fee: calcCorpFee(revenue)},
    seongsi:  {field:'feeSeongsi',label:'성실신고료', fee: tier.seongsi},
  };

function applyReportFilter(clients, period) {
  if (!period) return clients;
  if (period.reportType && REPORT_TYPE_FILTERS[period.reportType]) {
    return clients.filter(REPORT_TYPE_FILTERS[period.reportType]);
  }
  if (period.targetType === '법인') return clients.filter(c => c.taxType === '법인');
  if (period.targetType === '개인') return clients.filter(c => c.taxType === '개인');
  return clients;
}

function julgaeVal(pKey, clientId) {
  const v = G.julgae[pKey]?.[clientId];
  const def = {d:false, b:false, a:false, c:false, s:false, revenue:0, income:0, taxBase:0, totalTax:0, payTax:0, residentTax:0, prevRevenue:0, fee:0, paid:0, fee25:0, fee24:0, fee23:0, feeSeongsi:0};
  if (!v) return def;
  if (typeof v === 'boolean') return {...def, a:v};
  return {...def, ...v};
}

function contractLabel(key) {
  for (const g of CONTRACT_GROUPS)
    for (const i of g.items) if (i.key === key) return i.label;
  return key;
}

function rebuildAllContracts(showToast = true) {
  G.clients.forEach(c => {
    const dt = getDealTypes(c)[0] || '';
    if (!dt) { if (!c.contracts) c.contracts = []; return; }
    c.contracts = getDefaultContracts(dt, c.taxType, c.vatType);
  });
  saveToLS();
  if (showToast) toast('수임계약항목이 전체 재설정되었습니다.', 'success');
}

function buildContractAreaHTML() {
  const avail = availableContracts(window._formData.vatType, window._formData.taxType);
  const items = avail.flatMap(g=>g.items);
  const sel = window._formData.contracts||[];
  const seongsiOn = window._formData.seongsi ? 'on' : '';
  return `<div class="contract-chips">${items.map(item=>`<button type="button" class="contract-chip ${sel.includes(item.key)?'on':''}" onclick="toggleContract('${item.key}')">${item.label}</button>`).join('')}<button type="button" class="contract-chip ${seongsiOn}" onclick="window._formData.seongsi=!window._formData.seongsi;this.classList.toggle('on',window._formData.seongsi)">성실신고확인대상</button></div>`;
}

function availableContracts(vatType, taxType) {
  return CONTRACT_GROUPS.map(g => ({
    ...g,
    items: g.items.filter(i => i.vat.includes(vatType) && i.tax.includes(taxType))
  })).filter(g => g.items.length > 0);
}

function getDefaultContracts(dealType, taxType, vatType) {
  const dt = dealType || '기장';
  const cs = [];
  const isBook = ['기장','고문','성실'].includes(dt);
  const isCorp = taxType === '법인';
  const isVat = ['일반','간이','간세'].includes(vatType);
  const isExempt = vatType === '면세';
  if (isBook) {
    cs.push('기장_일반');
    if (isVat) cs.push('부가세신고');
    if (isExempt) cs.push('사업장현황신고');
    if (isCorp) cs.push('법인세');
    if (!isCorp) cs.push('소득세');
    cs.push('세무조정','원천세');
  }
  if (dt==='신고대리') {
    if (isVat) cs.push('부가세신고');
    if (isExempt) cs.push('사업장현황신고');
    if (isCorp) cs.push('법인세');
    if (!isCorp) cs.push('소득세');
  }
  if (dt==='종소세대리') cs.push('소득세');
  const avail = availableContracts(vatType, taxType).flatMap(g=>g.items).map(i=>i.key);
  return cs.filter(k=>avail.includes(k));
}

function getStats() {
  const active = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  return {
    total: G.clients.length,
    active: active.length,
    noData: active.filter(c => !c.dataReceived).length,
    pending: active.filter(c => c.dataReceived && !c.bookkeeping).length,
    unpaid: active.filter(c => c.feeStatus === '미수금').length,
    totalFee: active.reduce((s,c) => s+c.fee, 0),
    collected: active.filter(c => c.feeStatus==='수금완료').reduce((s,c)=>s+c.fee,0),
    terminated: G.clients.filter(c=>c.status==='해지').length,
    closure: G.clients.filter(c=>c.status==='폐업').length,
    closurePending: G.clients.filter(c=>c.status==='폐업'&&!c.closureTaxApproved).length,
  };
}

const DEAL_SORT_ORDER = ['고문','성실','기장','신고대리','종소세대리'];
function dealSortRank(dt) {
  const i = DEAL_SORT_ORDER.indexOf(dt);
  return i >= 0 ? i : DEAL_SORT_ORDER.length;
}
function getDealTypes(c) {
  let types;
  if (Array.isArray(c.dealTypes) && c.dealTypes.length > 0) types = [...c.dealTypes];
  else if (c.dealType) types = [c.dealType];
  else types = ['기장'];
  if (c.seongsi && !types.includes('성실')) {
    types = types.map(t => t === '기장' ? '성실' : t);
    if (!types.includes('성실')) types.push('성실');
  }
  return types;
}
function getManagers(c) {
  if (Array.isArray(c.managers) && c.managers.length > 0) return c.managers;
  if (c.manager) return [c.manager];
  return [];
}
function getUnpaidStreak(c, currentYM) {
  if (!c.fee) return 0;
  const UNPAID_START = '2026-06';
  const adjYM = (ym, delta) => {
    const [y,m] = ym.split('-').map(Number);
    const d = new Date(y, m-1+delta, 1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  };
  let count = 0, checkYM = currentYM;
  const start = c.contractDate ? c.contractDate.slice(0,7) : '2000-01';
  const effectiveStart = start >= UNPAID_START ? start : UNPAID_START;
  while (count < 36) {
    if (checkYM < effectiveStart) break;
    if (G.monthlyFees[c.id]?.[checkYM]) break;
    count++;
    checkYM = adjYM(checkYM, -1);
  }
  return count;
}
function isMonthCollected(clientId, ym) {
  return ym < '2026-06' || !!(G.monthlyFees[clientId]?.[ym]);
}
function handleActualAmount(clientId, ym, input) {
  const actualAmt = parseInt(String(input.value).replace(/[^0-9]/g,'')) || 0;
  if (!actualAmt) { input.value = ''; return; }
  const c = G.clients.find(x => x.id === clientId);
  const feeAmt = getFeeForYM(c, ym);
  window._pendingActual = { clientId, ym, actualAmt, feeAmt };
  function applyActual(updateFee) {
    const { clientId, ym, actualAmt, feeAmt } = window._pendingActual;
    if (!G.monthlyFees[clientId]) G.monthlyFees[clientId] = {};
    G.monthlyFees[clientId][ym] = true;
    if (!G.feeHistory) G.feeHistory = {};
    if (!G.feeHistory[clientId]) G.feeHistory[clientId] = {};
    G.feeHistory[clientId][ym] = { date: new Date().toLocaleString('ko-KR') };
    if (!G.feePayments) G.feePayments = {};
    if (!G.feePayments[clientId]) G.feePayments[clientId] = {};
    const diff = feeAmt - actualAmt;
    G.feePayments[clientId][ym] = { method: 'CMS', amount: actualAmt, underpaid: diff > 0 ? diff : 0, date: new Date().toISOString().slice(0,10), note: '' };
    if (updateFee) {
      const cl = G.clients.find(x => x.id === clientId);
      if (cl) cl.fee = actualAmt;
    }
    saveToLS(); closeModal(); renderFees();
  }
  window._applyActual = applyActual;
  if (actualAmt === feeAmt) { applyActual(false); return; }
  const diff = feeAmt - actualAmt;
  showModal(`<div style="max-width:360px;width:min(360px,95vw)">
    <div class="modal-header"><h3>💳 실수금액 처리</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:#444;margin-bottom:16px">${esc(c.name)} · ${ym}<br>수수료 <b>${feeAmt.toLocaleString()}원</b> / 실수금액 <b>${actualAmt.toLocaleString()}원</b><br>${diff>0?`<span style="color:#e53935">차액 ${diff.toLocaleString()}원 미수금</span>`:`<span style="color:#2e7d32">초과 수납 ${Math.abs(diff).toLocaleString()}원</span>`}</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button onclick="window._applyActual(false)" class="btn-primary" style="padding:10px;text-align:left">${diff>0?`📌 차액 ${diff.toLocaleString()}원을 미수금으로 기록`:`💰 ${actualAmt.toLocaleString()}원으로 수납 처리`}</button>
        <button onclick="window._applyActual(true)" style="padding:10px;border-radius:8px;border:1px solid #e0e0e0;background:#f5f5f5;cursor:pointer;font-family:inherit;text-align:left">✏ 수수료를 ${actualAmt.toLocaleString()}원으로 변경 후 수납</button>
        <button onclick="closeModal()" style="padding:8px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;color:#888">취소</button>
      </div>
    </div>
  </div>`);
}

function dealSortRankForClient(c) {
  return Math.min(...getDealTypes(c).map(dt => dealSortRank(dt)));
}

function groupColor(key) {
  const palette = ['#4f8ef7','#a259ff','#2e7d32','#e65100','#c62828','#1976d2','#795548','#00838f'];
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) & 0xffff;
  return palette[h % palette.length];
}

function buildClientGroupMap(allClients) {
  const repCount = {};
  const juminCount = {};
  allClients.forEach(c => {
    if (c.status === '해지' || c.status === '폐업') return;
    const r = (c.rep || '').trim();
    if (r) repCount[r] = (repCount[r] || 0) + 1;
    const jn = (c.jumin || '').replace(/[-\s]/g, '');
    if (jn && jn.length >= 13 && c.taxType !== '법인') juminCount[jn] = (juminCount[jn] || 0) + 1;
  });
  return function getGroupKey(c) {
    if (c.soloGroup) return 'S:' + c.id;
    if (c.relatedGroup && c.relatedGroup.trim()) return 'G:' + c.relatedGroup.trim();
    const jn = (c.jumin || '').replace(/[-\s]/g, '');
    if (jn && jn.length >= 13 && c.taxType !== '법인' && juminCount[jn] > 1) return 'J:' + jn;
    const r = (c.rep || '').trim();
    if (r && repCount[r] > 1) return 'R:' + r;
    return 'S:' + c.id;
  };
}

function gradeBadge(grade, manual) {

function computeGrades() {
  const active = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  G.clients.filter(c => c.status === '해지' || c.status === '폐업').forEach(c => { if (!c.gradeManual) c.grade = ''; });
  const autoTargets = active.filter(c => !c.gradeManual);
  const ym = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  const fee = c => (c.feeChanges&&c.feeChanges.length ? (()=>{const s=[...c.feeChanges].sort((a,b)=>b.from.localeCompare(a.from));const ap=s.find(ch=>ch.from<=ym);return ap?ap.amount:(c.feeChanges[0]?.amount||c.fee||0);})() : c.fee||0);
  const sorted = [...autoTargets].sort((a, b) => fee(b) - fee(a));
  const n = sorted.length;
  const aCut = Math.ceil(n * 0.2);
  const bCut = Math.ceil(n * 0.7);
  sorted.forEach((c, idx) => {
    let grade;
    if (idx < aCut && fee(c) > 0) grade = 'A';
    else if (idx < bCut) grade = 'B';
    else grade = 'C';
    const target = G.clients.find(x => x.id === c.id);
    if (target) target.grade = grade;
  });
}

function setClientGradeManual(clientId, grade) {
  const c = G.clients.find(x => x.id === clientId);
  if (!c) return;
  if (grade === null) {
    c.gradeManual = false;
    computeGrades();
  } else {
    c.grade = grade;
    c.gradeManual = true;
  }
  saveToLS();
  renderClients();
}

function _filterJuminGroups(sortedList, getGroupKey) {
  const groups = {}, keyToLead = {}, final = [];
  const relGroups = {}, relKeyToLead = {};
  for (const c of sortedList) {
    const gk = getGroupKey(c);
    if (gk.startsWith('J:')) {
      if (!keyToLead[gk]) { keyToLead[gk] = c.id; groups[c.id] = []; final.push(c); }
      else groups[keyToLead[gk]].push(c);
    } else if (gk.startsWith('G:')) {
      if (!relKeyToLead[gk]) { relKeyToLead[gk] = c.id; relGroups[c.id] = []; final.push(c); }
      else relGroups[relKeyToLead[gk]].push(c);
    } else { final.push(c); }
  }
  window._juminGroups = groups;
  window._relatedGroups = relGroups;
  return final;
}

function filteredClients() {
  const getGroupKey = buildClientGroupMap(G.clients);
  let list = G.clients.filter(c => {
    if (!G.showTerminated && (c.status==='해지'||c.status==='폐업')) return false;
    if (G.searchText && !c.name.includes(G.searchText)) return false;
    if (G.clientRepSearch && !(c.rep||'').includes(G.clientRepSearch)) return false;
    if (G.filterManagers.length > 0) {
      const hasNone = G.filterManagers.includes('(없음)');
      const mgrs = getManagers(c);
      if (!(hasNone && mgrs.length === 0) && !mgrs.some(m => G.filterManagers.includes(m))) return false;
    }
    if (G.filterTaxTypes.length > 0 && !G.filterTaxTypes.includes(c.taxType)) return false;
    if (G.filterVatTypes.length > 0 && !G.filterVatTypes.includes(c.vatType)) return false;
    if (G.filterFeeStatuses.length > 0 && !G.filterFeeStatuses.includes(c.feeStatus)) return false;
    if (G.filterDealTypes.length > 0 && !getDealTypes(c).some(d => G.filterDealTypes.includes(d))) return false;
    if (G.filterCMS.length > 0 && !G.filterCMS.includes(c.cms ? '가입' : '미가입')) return false;
    if (G.filterTags?.length) {
      const ctags = (G.clientTags||{})[c.id] || [];
      if (!ctags.some(t => G.filterTags.includes(t))) return false;
    }
    if (G.filterRisk==='위험' && clientRiskLevel(c)!=='red') return false;
    if (G.filterRisk==='주의' && clientRiskLevel(c)!=='yellow') return false;
    if (G.filterGrade && c.grade !== G.filterGrade) return false;
    return true;
  });
  if (G.showFavorites) list = list.filter(c=>(G.favorites||[]).includes(c.id));

  // 수임일자 정렬키: 없으면 뒤로
  const csk = c => c.contractDate || 'ZZZZ-ZZ-ZZ';

  const groupBuckets = {};
  list.forEach(c => {
    const k = getGroupKey(c);
    if (!groupBuckets[k]) groupBuckets[k] = [];
    groupBuckets[k].push(c);
  });
  const groupSortKeys = {};
  Object.entries(groupBuckets).forEach(([k, members]) => {
    // 대표업체: groupMain=true 인 멤버, 없으면 수임일자 가장 빠른 멤버
    const lead = members.find(m=>m.groupMain) ||
      [...members].sort((a,b)=>csk(a).localeCompare(csk(b))||a.name.localeCompare(b.name,'ko'))[0];
    groupSortKeys[k] = { dateKey: csk(lead), lead: lead.name, mainId: lead.id, dealRank: Math.min(...members.map(m=>dealSortRankForClient(m))) };
  });

  // 검색 중일 때는 일치도 높은 순으로 정렬
  if (G.searchText) {
    const q = G.searchText;
    const score = c => {
      const name = c.name || '', rep = c.rep || '', biz = c.bizType || '';
      if (name === q) return 100;
      if (name.startsWith(q)) return 90 - name.length;
      if (name.includes(q)) return 80 - name.indexOf(q);
      if (rep === q) return 70;
      if (rep.startsWith(q)) return 60 - rep.length;
      if (rep.includes(q)) return 50 - rep.indexOf(q);
      if (biz.includes(q)) return 40;
      return 30;
    };
    window._juminGroups = {};
    window._relatedGroups = {};
    return list.sort((a, b) => score(b) - score(a));
  }

  // 정렬 적용 (기본: 수임내용순 → 수임일자 오름차순)
  const {field, dir} = G.clientSort || {field:'d', dir:'asc'};
  if (field !== 'd' || dir !== 'asc') {
    list.sort((a,b) => {
      let av, bv;
      if (field === 'd') {
        const ar = dealSortRankForClient(a), br = dealSortRankForClient(b);
        if (ar !== br) return dir==='asc' ? ar-br : br-ar;
        return csk(a).localeCompare(csk(b));
      }
      if (field === 'c') { av = csk(a); bv = csk(b); return dir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av); }
      if (field === 'n') { av = a.name||''; bv = b.name||''; return dir==='asc' ? av.localeCompare(bv,'ko') : bv.localeCompare(av,'ko'); }
      if (field === 'r') { av = a.rep||''; bv = b.rep||''; return dir==='asc' ? av.localeCompare(bv,'ko') : bv.localeCompare(av,'ko'); }
      if (field === 'f') { av = a.fee||0; bv = b.fee||0; return dir==='asc' ? av-bv : bv-av; }
      if (field === 'm') { av = getManagers(a)[0]||''; bv = getManagers(b)[0]||''; return dir==='asc' ? av.localeCompare(bv,'ko') : bv.localeCompare(av,'ko'); }
      if (field === 'o') { av = a.taxOffice||''; bv = b.taxOffice||''; return dir==='asc' ? av.localeCompare(bv,'ko') : bv.localeCompare(av,'ko'); }
      return 0;
    });
    return _filterJuminGroups(list, getGroupKey);
  }

  return _filterJuminGroups(list.sort((a, b) => {
    const ka = getGroupKey(a), kb = getGroupKey(b);
    if (ka !== kb) {
      const ga = groupSortKeys[ka], gb = groupSortKeys[kb];
      if (ga.dealRank !== gb.dealRank) return ga.dealRank - gb.dealRank;
      return ga.dateKey.localeCompare(gb.dateKey) || ga.lead.localeCompare(gb.lead, 'ko');
    }
    // 같은 그룹 내: 대표업체 먼저, 나머지는 수임일자 → 이름
    const mainId = groupSortKeys[ka].mainId;
    if (a.id === mainId) return -1;
    if (b.id === mainId) return 1;
    return csk(a).localeCompare(csk(b)) || a.name.localeCompare(b.name, 'ko');
  }), getGroupKey);
}

function createIncome26UnmatchedClients() {
  const list = G.income26Unmatched || [];
  if (!list.length) return;
  const incPeriod = G.periods.find(p => p.reportType==='income' && (p.label.startsWith('26년')||p.id.includes('2026')));
  const ssiPeriod = G.periods.find(p => p.reportType==='seongsi' && (p.label.startsWith('26년')||p.id.includes('2026')));
  let created = 0;
  for (const row of list) {
    const maxId = G.clients.reduce((a,c)=>Math.max(a,c.id||0), 0);
    const newId = maxId + 1 + created;
    const newClient = {
      id: newId, name: row.name||'', rep: row.rep||'',
      bizNo:'', jumin:'', relatedGroup:'',
      phone:'', email:'',
      taxType:'개인', vatType:'일반',
      bizType: row.bizType||'', taxOffice:'',
      manager: row.manager||'', managers: row.manager?[row.manager]:[],
      dealType:'기장', dealTypes:['기장'],
      fee:0, feeStatus:'청구완료', status:'정상',
      dataReceived:false, bookkeeping:false, approved:false,
      memo:'', contractDate:'2020-01-01', contracts:[],
      terminationDate:'', terminationReason:'', closureYear:'',
      closureTaxFiled:false, closureTaxApproved:false
    };
    G.clients.push(newClient);
    const period = row.seongsi ? ssiPeriod : incPeriod;
    if (period) {
      const pKey = period.id;
      if (!G.julgae[pKey]) G.julgae[pKey] = {};
      G.julgae[pKey][newId] = {
        revenue: row.revenue||0, income: row.income||0,
        totalTax: row.totalTax||0, payTax: row.payTax||0,
        prevRevenue: row.prevRevenue||0, fee: row.fee||0, paid: row.paid||0,
        fee25: row.fee25||0, fee24: row.fee24||0, fee23: row.fee23||0,
        note: row.note||'', a: row.a||false, s: row.s||false,
      };
    }
    created++;
  }
  G.income26Unmatched = [];
  localStorage.removeItem('tm_income26Unmatched');
  saveToLS();
  closeModal();
  toast(`${created}개 거래처 생성 완료 — 종소세 신고 리스트에 반영됨`, 'success', 5000);
  renderClients();
}

function clearTodayContractDates(today) {
  const cleared = G.clients.filter(c=>c.contractDate===today&&c.status!=='해지'&&c.status!=='폐업');
  cleared.forEach(c=>{ c.contractDate = ''; });
  saveToLS();
  closeModal();
  showMissingClientsModal();
  toast(`수임일자 ${cleared.length}개 초기화 완료`,'info');
}

  const monthlyClients = feeActive.filter(c=>getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));

  const monthlyCollected = monthlyClients.filter(c=>G.monthlyFees[c.id]?.[thisYM]).reduce((a,c)=>a+(c.fee||0),0);

  // 신고 수수료 (전체 누계)
  let filingTotal=0, filingCollected=0;

  for (const pKey of Object.keys(G.julgae)) {
    const pData = G.julgae[pKey];
    for (const [cidStr,v] of Object.entries(pData)) {
      if (!v||!v.fee) continue;
      filingTotal += v.fee;
      if (v.s) filingCollected += v.fee;
      else {
        const cl = G.clients.find(c=>c.id===Number(cidStr));
        if (cl) filingUnpaidClients.push({client:cl, fee:v.fee, period:G.periods.find(p=>p.id===pKey)});
      }
    }
  }

  const grandTotal     = monthlyTotal + filingTotal;
  const grandCollected = monthlyCollected + filingCollected;
  const grandUnpaid    = grandTotal - grandCollected;
  const grandPct       = grandTotal>0?Math.round(grandCollected/grandTotal*100):0;

  // 월정 미수금 목록 (이달)
  const monthlyUnpaid = monthlyClients.filter(c=>!(G.monthlyFees[c.id]?.[thisYM]));

  const feeByManager = MANAGERS.slice(1).map(m=>{
    const allMC = G.clients.filter(c=>getManagers(c).includes(m)&&c.status!=='해지'&&c.status!=='폐업');
    const mc = allMC.filter(c=>getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
    const t = mc.reduce((a,c)=>a+(c.fee||0),0);
    const col = mc.filter(c=>G.monthlyFees[c.id]?.[thisYM]).reduce((a,c)=>a+(c.fee||0),0);
    const p = t>0?Math.round(col/t*100):0;
    const s2 = allMC.filter(c=>getDealTypes(c).some(d=>d.includes('신고')||d==='종소세대리')).length;
    return `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f0f0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

        <span style="font-size:12px;color:#888;margin-left:8px">${allMC.length}개 · 월정 ${mc.length} · 신고 ${s2}</span></div>
        <span style="font-size:13px;color:#555;font-weight:600">${t.toLocaleString()}원</span>
      </div>

    </div>`;

  document.getElementById('page-dashboard').innerHTML = `

  ${(()=>{
    const now = new Date();
    const deadlineItems = [];
    for (const tpl of PERIOD_TEMPLATES) {
      const dm = tpl.deadline.match(/(\d+)월\s*(\d+)일/);
      if (!dm) continue;
      const mo = Number(dm[1])-1, dy = Number(dm[2]);
      let chosen = null;
      for (const yr of [now.getFullYear(), now.getFullYear()+1]) {
        const d = new Date(yr, mo, dy);
        const diff = Math.round((d - now) / 86400000);
        if (diff >= -3 && diff <= 60) { chosen = {diff, yr}; break; }

      const {diff, yr} = chosen;
      const yy = String(yr).slice(2);

// ══════════════════════════════════════════════════════
// 거래처 목록
// ══════════════════════════════════════════════════════
const CLIENT_PAGE_SIZE = 50;

function renderClients() {
  const list = filteredClients();
  const terminated = G.clients.filter(c=>c.status==='해지'||c.status==='폐업').length;
  // _filterJuminGroups hides group sub-members from the list; count them to show real total
  const hiddenInGroups = Object.values(window._juminGroups||{}).reduce((a,v)=>a+v.length,0)
                       + Object.values(window._relatedGroups||{}).reduce((a,v)=>a+v.length,0);
  const totalCount = list.length + hiddenInGroups;
  const totalPages = Math.max(1, Math.ceil(list.length / CLIENT_PAGE_SIZE));
  if (G.clientPage >= totalPages) G.clientPage = totalPages - 1;
  const pageList = list.slice(G.clientPage * CLIENT_PAGE_SIZE, (G.clientPage + 1) * CLIENT_PAGE_SIZE);

  const filterSel = (field, opts, label='style="width:100%;font-size:11px;padding:3px 4px;border:1px solid #ddd;border-radius:6px"') =>
    `<select ${label} onchange="onFilter('${field}',this.value)">${opts.map(v=>`<option${G[field]===v?' selected':''}>${v}</option>`).join('')}</select>`;
  const emptyTh = `<th style="padding:4px 6px;font-weight:normal"></th>`;
  const filterRowSel = `style="width:100%;font-size:11px;padding:3px 4px;border:1px solid #ddd;border-radius:6px"`;

  const hc = G.hiddenCols || {};
  const hiddenChips = _hcChips([['c_rep','대표자'],['c_dealType','수임내용'],['c_taxType','인격'],['c_vatType','과세유형'],['c_manager','담당자'],['c_fee','수수료'],['c_status','상태'],['c_cms','CMS'],['c_grade','등급']]);

  document.getElementById('page-clients').innerHTML = `
  <div style="margin-bottom:10px">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">거래처 목록</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${hiddenChips}
      <button class="btn-sm" style="background:${G.editMode?'#e8f5e9':'#f0faf1'};color:${G.editMode?'#2e7d32':'#5a9b65'};border:2px solid ${G.editMode?'#43a047':'#c3e6c8'}" onclick="toggleEditMode()">${G.editMode?'✓ 수정모드 ON':'✏ 수정모드'}</button>
      <button class="btn-sm" style="background:${G.filterRisk==='위험'?'#fdecea':G.filterRisk==='주의'?'#fff3e0':'#fdf5f5'};color:${G.filterRisk==='위험'?'#c62828':G.filterRisk==='주의'?'#e65100':'#b07070'};border:1.5px solid ${G.filterRisk==='위험'?'#ef9a9a':G.filterRisk==='주의'?'#ffcc80':'#f0c0c0'}" onclick="G.filterRisk=G.filterRisk===''?'위험':G.filterRisk==='위험'?'주의':'';G.clientPage=0;renderClients()">● 위험도${G.filterRisk?' ('+G.filterRisk+')':' (전체)'}</button>
      <button class="btn-sm" style="background:${G.filterGrade==='A'?'#e8f0fe':G.filterGrade==='B'?'#e8f5e9':G.filterGrade==='C'?'#f5f5f5':'#f0f2ff'};color:${G.filterGrade==='A'?'#1565c0':G.filterGrade==='B'?'#2e7d32':G.filterGrade==='C'?'#888':'#7080c8'};border:1.5px solid ${G.filterGrade==='A'?'#4f8ef7':G.filterGrade==='B'?'#43a047':G.filterGrade==='C'?'#bbb':'#c5cef0'};font-weight:${G.filterGrade?'700':'400'}" onclick="G.filterGrade=G.filterGrade===''?'A':G.filterGrade==='A'?'B':G.filterGrade==='B'?'C':'';G.clientPage=0;renderClients()">등급${G.filterGrade?' ('+G.filterGrade+')':''}</button>
      <button class="btn-sm" style="background:${G.showFavorites?'#fff8e1':'#fefae0'};color:${G.showFavorites?'#f57c00':'#a08028'};border:2px solid ${G.showFavorites?'#ffd54f':'#e8d870'}" onclick="G.showFavorites=!G.showFavorites;G.clientPage=0;renderClients()">⭐ 즐겨찾기${G.showFavorites?' ON':''}</button>
      <button class="btn-sm" style="background:${(G.filterTags||[]).length?'#e8f0fe':'#f0f4ff'};color:${(G.filterTags||[]).length?'#4f8ef7':'#5878cc'};border:1.5px solid ${(G.filterTags||[]).length?'#4f8ef7':'#b8c8f8'}" onclick="openTagFilterDropdown(this)">🏷 태그${(G.filterTags||[]).length?' ('+G.filterTags.length+')':''}</button>
      <button class="btn-sm" style="background:#f3e5f5;color:#6a1b9a;border:1.5px solid #ce93d8" onclick="openFilterPresets(this)">⭐ 프리셋${(G.filterPresets||[]).length?' ('+(G.filterPresets||[]).length+')':''}</button>
      <button class="btn-sm" style="background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80" onclick="openNotesSearch()">🔍 메모검색</button>
      ${(()=>{const hasFilter=G.searchText||G.clientRepSearch||(G.filterManagers||[]).length||(G.filterTaxTypes||[]).length||(G.filterVatTypes||[]).length||(G.filterFeeStatuses||[]).length||(G.filterDealTypes||[]).length||(G.filterCMS||[]).length||(G.filterTags||[]).length||G.filterRisk||G.filterGrade||G.showFavorites;return hasFilter?`<button class="btn-sm" style="background:#fdecea;color:#c62828;border:1.5px solid #ef9a9a;font-weight:700" onclick="G.searchText='';G.clientRepSearch='';G.filterManagers=[];G.filterTaxTypes=[];G.filterVatTypes=[];G.filterFeeStatuses=[];G.filterDealTypes=[];G.filterCMS=[];G.filterTags=[];G.filterRisk='';G.filterGrade='';G.showFavorites=false;G.clientPage=0;renderClients()">✕ 필터초기화</button>`:'';})()}
      <button class="btn-primary btn-sm" onclick="openForm(null)">+ 거래처 추가</button>
      <button class="btn-sm" style="background:#fff3e0;color:#bf360c;border:1.5px solid #ffab91" onclick="openTerminatedModal()">📁 해지폐업 관리${terminated?' ('+terminated+')':''}</button>
      <button class="btn-sm" style="background:#f0f8ff;color:#1565c0;border:1.5px solid #90caf9" onclick="openImportExportMenu(this)">⇅ 가져오기/내보내기</button>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:flex-end;gap:5px;flex-wrap:wrap;margin-bottom:8px">
    ${(()=>{
      const sf = (G.clientSort||{}).field||'d', sd = (G.clientSort||{}).dir||'asc';
      const opts = [{k:'c',l:'수임일자'},{k:'n',l:'업체명'},{k:'r',l:'대표자'},{k:'d',l:'수임내용'},{k:'f',l:'수수료'},{k:'m',l:'담당자'}];
      const btns = opts.map(({k,l})=>{
        const active = sf===k;
        const nextDir = active && sd==='asc' ? 'desc' : 'asc';
        const icon = active ? (sd==='asc'?' ↑':' ↓') : '';
        const st = active ? 'background:#e8f0fe;color:#1565c0;border:1.5px solid #4f8ef7;font-weight:700' : 'background:#f5f5f5;color:#888;border:1.5px solid #e0e0e0';
        return `<button onclick="G.clientSort={field:'${k}',dir:'${nextDir}'};G.clientPage=0;renderClients()" style="padding:4px 9px;border-radius:16px;font-size:11px;cursor:pointer;font-family:inherit;${st}">${l}${icon}</button>`;
      }).join('');
      const resetBtn = (sf!=='d'||sd!=='asc') ? `<button onclick="G.clientSort={field:'d',dir:'asc'};G.clientPage=0;renderClients()" style="padding:4px 7px;border-radius:16px;font-size:10px;cursor:pointer;font-family:inherit;background:#fdecea;color:#c62828;border:1.5px solid #ef9a9a" title="정렬 초기화">✕</button>` : '';
      return `<div style="display:contents">${btns}${resetBtn}</div>`;
    })()}
    <div style="font-size:12px;color:#888;white-space:nowrap;margin-left:4px">총 ${totalCount}개 (${G.clientPage+1}/${totalPages})</div>
    ${sectionToggleBtn('clients-list')}
  </div>

  <datalist id="taxoffice-list">${TAX_OFFICES.map(o=>`<option value="${esc(o)}">`).join('')}</datalist>

  ${G.editMode?`<div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#2e7d32">✏ <b>수정모드</b> — 수임내용·인격·과세유형·담당자·수수료를 클릭해 바로 변경하세요. 행을 펼치면 전화번호·관할세무서·수임일자도 수정할 수 있습니다.</div>`:''}

  <div class="client-mobile-filters">
    ${(()=>{
      const pill = (active, label, onclick) => `<button onclick="${onclick}" style="padding:5px 11px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;border:1.5px solid ${active?'#4f8ef7':'#ddd'};background:${active?'#e8f0fe':'#fff'};color:${active?'#1565c0':'#555'}">${label}</button>`;
      const filterPill = (field, label) => { const v=G[field]||[]; return pill(v.length>0, label+(v.length?` (${v.length})`:'')+'▾', `openFilterPopup('${field}',this)`); };
      const sa = G.searchText, ra = G.clientRepSearch;
      return [
        pill(!!sa, '🔍 '+(sa?esc(sa):'업체명'), 'openClientNameSearch(this)'),
        pill(!!ra, '🔍 '+(ra?esc(ra):'대표자'), 'openClientRepSearch(this)'),
        filterPill('filterDealTypes','수임내용'),
        filterPill('filterTaxTypes','인격'),
        filterPill('filterVatTypes','과세유형'),
        filterPill('filterManagers','담당자'),
        filterPill('filterCMS','CMS'),
        filterPill('filterFeeStatuses','수수료상태'),
      ].join('');
    })()}
  </div>

  <div class="tbl-wrap client-table-wrap" style="${(G.sectionCollapsed||{})['clients-list']?'display:none':''}">
  <table>
    <thead>
    <tr>
      <th style="padding:4px 6px">${(()=>{const a=G.searchText;return`<button onclick="openClientNameSearch(this)" style="width:100%;padding:4px 7px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit;border:1.5px solid ${a?'#4f8ef7':'#ddd'};background:${a?'#e8f0fe':'#fff'};color:${a?'#1565c0':'#555'};display:flex;justify-content:space-between;align-items:center;gap:4px"><span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a?esc(a):'거래처명'}</span><span style="font-size:9px;opacity:.5">🔍</span></button>`;})()}</th>
      <th style="width:72px;padding:3px 4px;${_hcStyle('c_rep')}"><div style="display:flex;align-items:center">${(()=>{const a=G.clientRepSearch;return`<button onclick="openClientRepSearch(this)" style="width:100%;padding:4px 6px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit;border:1.5px solid ${a?'#4f8ef7':'#ddd'};background:${a?'#e8f0fe':'#fff'};color:${a?'#1565c0':'#555'};display:flex;justify-content:space-between;align-items:center;gap:3px"><span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a?esc(a):'대표자'}</span><span style="font-size:9px;opacity:.5">🔍</span></button>`;})()}${_hcBtn('c_rep')}</div></th>
      <th style="padding:4px 6px;${_hcStyle('c_dealType')}"><div style="display:flex;align-items:center">${filterPopupBtn('filterDealTypes','수임내용')}${_hcBtn('c_dealType')}</div></th>
      <th style="padding:4px 6px;${_hcStyle('c_taxType')}"><div style="display:flex;align-items:center">${filterPopupBtn('filterTaxTypes','인격')}${_hcBtn('c_taxType')}</div></th>
      <th style="padding:4px 6px;${_hcStyle('c_vatType')}"><div style="display:flex;align-items:center">${filterPopupBtn('filterVatTypes','과세유형')}${_hcBtn('c_vatType')}</div></th>
      <th style="padding:4px 6px;${_hcStyle('c_manager')}"><div style="display:flex;align-items:center">${filterPopupBtn('filterManagers','담당자')}${_hcBtn('c_manager')}</div></th>
      <th style="${_hcStyle('c_fee')}"><div style="display:flex;align-items:center;justify-content:center">수수료${_hcBtn('c_fee')}</div></th>
      <th style="${_hcStyle('c_status')}"><div style="display:flex;align-items:center;justify-content:center">상태${_hcBtn('c_status')}</div></th>
      <th style="padding:4px 6px;${_hcStyle('c_cms')}"><div style="display:flex;align-items:center">${filterPopupBtn('filterCMS','CMS')}${_hcBtn('c_cms')}</div></th>
      <th style="width:42px;text-align:center;${_hcStyle('c_grade')}"><div style="display:flex;align-items:center;justify-content:center">등급${_hcBtn('c_grade')}</div></th>
      <th style="width:28px"></th>
    </tr>
    </thead>
    <tbody>
    ${(()=>{
      const getGroupKey = buildClientGroupMap(G.clients);
      const groupCounts = {};
      pageList.forEach(c => { const k=getGroupKey(c); groupCounts[k]=(groupCounts[k]||0)+1; });
      return pageList.map(c=>{
      const contracts = (c.contracts||[]).map(k=>contractLabel(k)).join(', ');
      const em = G.editMode;
      const iSel = (field,opts,val)=>`<select onclick="event.stopPropagation()" onchange="event.stopPropagation();updateClientField(${c.id},'${field}',this.value)" class="inline-edit">${opts.map(v=>`<option${val===v?' selected':''}>${esc(v)}</option>`).join('')}</select>`;
      const iInput = (field,val,attrs='')=>`<input ${attrs} onclick="event.stopPropagation()" onchange="event.stopPropagation();updateClientField(${c.id},'${field}',this.value)" value="${esc(val||'')}" class="inline-edit">`;
      const gk = getGroupKey(c);
      const juminMembers = (window._juminGroups || {})[c.id] || [];
      const isJuminLead = juminMembers.length > 0;
      const relatedMembers = (window._relatedGroups || {})[c.id] || [];
      const isRelatedLead = relatedMembers.length > 0;
      const inGroup = groupCounts[gk] > 1 || isRelatedLead;
      const gc = inGroup ? groupColor(gk) : null;
      const groupLabel = inGroup ? (c.relatedGroup && c.relatedGroup.trim() ? c.relatedGroup.trim() : c.rep) : null;
      const groupDot = inGroup ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${gc};margin-right:5px;vertical-align:middle"></span>` : '';
      const groupSub = inGroup ? `<span style="font-size:10px;color:${gc};font-weight:600;margin-left:4px">👥 ${esc(groupLabel)}</span>` : '';
      return `<tr class="client-row" onpointerdown="startLongPress(event,${c.id})" onpointermove="moveLongPress(event)" onpointerup="cancelLongPress()" onpointercancel="cancelLongPress()" oncontextmenu="event.preventDefault()" onclick="if(window._lpFired){window._lpFired=false}else{toggleExpand(${c.id})}" style="${inGroup?`border-left:3px solid ${gc}`:''}" >
        ${G.bulkMode?`<td onclick="event.stopPropagation();toggleClientSelect(${c.id})" style="width:32px;text-align:center;cursor:pointer"><input type="checkbox" ${(G.selectedClients||[]).includes(c.id)?'checked':''} style="width:16px;height:16px;cursor:pointer" onclick="event.stopPropagation();toggleClientSelect(${c.id})"></td>`:''}
        <td><div class="td-name">${(()=>{const risk=clientRiskLevel(c);return risk==='red'?'<span title="위험" style="color:#e53935;margin-right:4px">●</span>':risk==='yellow'?'<span title="주의" style="color:#f57c00;margin-right:4px">●</span>':''})()}${groupDot}${esc(c.name)}<button onclick="event.stopPropagation();openClientNotes(${c.id})" style="margin-left:4px;padding:1px 5px;border-radius:5px;border:1px solid #e0e0e0;background:#f8f9ff;font-size:11px;cursor:pointer;vertical-align:middle" title="메모/이력">📝${(G.clientNotes||{})[c.id]?.length?` ${G.clientNotes[c.id].length}`:''}</button><button onclick="event.stopPropagation();toggleFavorite(${c.id})" style="margin-left:2px;padding:1px 4px;border-radius:5px;border:1px solid #e0e0e0;background:#fff;font-size:12px;cursor:pointer;vertical-align:middle" title="즐겨찾기">${(G.favorites||[]).includes(c.id)?'⭐':'☆'}</button>${isJuminLead ? `<button onclick="event.stopPropagation();toggleJuminGroup(${c.id})" id="jumin-btn-${c.id}" style="margin-left:4px;padding:1px 6px;border-radius:10px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;font-size:10px;font-weight:700;cursor:pointer;vertical-align:middle" title="같은 사업주의 다른 사업장">▲ 접기</button>` : ''}${isRelatedLead ? `<button onclick="event.stopPropagation();toggleRelatedGroup(${c.id})" id="related-btn-${c.id}" style="margin-left:4px;padding:1px 6px;border-radius:10px;background:#ede7f6;color:#6a1b9a;border:1px solid #ce93d8;font-size:10px;font-weight:700;cursor:pointer;vertical-align:middle" title="관계사 그룹">▲ 접기</button>` : ''}</div>${(c.bizType||c.bizCode||groupSub)?`<div class="td-sub">${c.bizType?esc(c.bizType):''}${c.bizCode?` <span style="color:#aaa;font-size:10px">[${esc(c.bizCode)}]</span>`:''}${groupSub}</div>`:''}</td>
        <td data-label="대표자" style="font-size:12px;color:#444;${hc['c_rep']?'display:none':''}">${esc(c.rep)||'-'}</td>
        <td data-label="수임내용" style="${hc['c_dealType']?'display:none':''}">${em?iSel('dealType',DEAL_TYPES.slice(1),getDealTypes(c)[0]):getDealTypes(c).map(d=>dealBadge(d)).join('')}</td>
        <td data-label="인격" style="${hc['c_taxType']?'display:none':''}">${em?iSel('taxType',TAX_TYPES.slice(1),c.taxType):badge(c.taxType,c.taxType==='법인'?'blue':'gray')}</td>
        <td data-label="과세유형" style="${hc['c_vatType']?'display:none':''}">${em?iSel('vatType',VAT_TYPES.slice(1),c.vatType):badge(c.vatType,c.vatType==='일반'?'blue':c.vatType==='간이'?'orange':c.vatType==='간세'?'teal':'gray')}</td>
        <td data-label="담당자" style="color:#555;font-size:12px;${hc['c_manager']?'display:none':''}">${em?iSel('manager',MANAGERS.slice(1),getManagers(c)[0]||''):getManagers(c).join(', ')||'-'}</td>
        <td data-label="수수료" style="font-weight:600;font-size:11px;${hc['c_fee']?'display:none':''}">${em?`<div onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:4px;font-size:10px"><span style="color:#888">기장</span><input type="number" onchange="event.stopPropagation();updateClientField(${c.id},'fee',this.value)" value="${c.fee||0}" class="inline-edit" style="width:70px"></div>`:(c.status==='정상'||c.status==='주의'?(()=>{const cym=currentYM();const pending=((G.adHocFees||{})[c.id]||[]).filter(f=>!f.collected&&f.ym===cym);const parts=[];if(c.fee)parts.push('<span style="color:#aaa;font-size:10px">기장</span> '+c.fee.toLocaleString());if(pending.length)parts.push('<span style="font-size:10px;color:#e65100">+'+pending.length+'건 미수</span>');return parts.length?parts.join('<br>'):'-';})():'-')}</td>
        <td data-label="상태" ${em?`onclick="event.stopPropagation();openStatusModal(${c.id})" style="cursor:pointer;` : `style="opacity:.95;`}${hc['c_status']?'display:none':''}${em?`" title="클릭하여 상태 변경"` : `" title="상태 변경은 수정모드에서 가능합니다"`}>${badge(c.status,statusColor(c.status))}</td>
        <td data-label="CMS" ${em?`onclick="event.stopPropagation();toggleCMS(${c.id})" style="cursor:pointer;` : `style="opacity:.95;`}${hc['c_cms']?'display:none':''}${em?`"` : `" title="CMS 변경은 수정모드에서 가능합니다"`}>${badge(c.cms?'가입':'미가입',c.cms?'green':'gray')}</td>
        <td data-label="등급" style="text-align:center;${hc['c_grade']?'display:none':''}">${gradeBadge(c.grade,c.gradeManual)}</td>
      </tr>
      <tr class="expand-row" id="expand-${c.id}" style="display:none">
        <td colspan="${10-['c_rep','c_dealType','c_taxType','c_vatType','c_manager','c_fee','c_status','c_cms','c_grade'].filter(k=>hc[k]).length}">
          <div class="expand-inner">
            <div style="flex-basis:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;background:${c.gradeManual?'#fff8e1':'#f8f9ff'};border-radius:8px;border:1px solid ${c.gradeManual?'#ffe082':'#e8eaf6'}">
              <span style="font-size:11px;color:#888;white-space:nowrap;font-weight:600">등급</span>
              ${['A','B','C'].map(g=>{const cfg={A:{bg:'#e8f0fe',col:'#1565c0',bd:'#4f8ef7'},B:{bg:'#e8f5e9',col:'#2e7d32',bd:'#43a047'},C:{bg:'#f5f5f5',col:'#666',bd:'#bbb'}};const cv=cfg[g];const on=c.grade===g;return`<button onclick="event.stopPropagation();setClientGradeManual(${c.id},'${g}')" style="padding:3px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid ${on?cv.bd:'#e0e0e0'};background:${on?cv.bg:'#fff'};color:${on?cv.col:'#ccc'};transition:all .12s">${g}</button>`;}).join('')}
              ${c.gradeManual?`<button onclick="event.stopPropagation();setClientGradeManual(${c.id},null)" style="padding:3px 10px;border-radius:8px;border:1.5px solid #ffcc80;background:#fff3e0;color:#e65100;font-size:11px;cursor:pointer;font-family:inherit;margin-left:4px">↺ 자동산출</button>`:`<span style="font-size:11px;color:#aaa;margin-left:4px">자동산출 중</span>`}
            </div>

  closureManagerFilter:'담당자 필터', scheduleManagerFilter:'담당자 필터',
};
let _fpField = null;
function openFilterPopup(field, btnEl) {
  const existing = document.getElementById('filter-popup');
  if (existing) { existing.remove(); document.removeEventListener('click', _fpOutside); if (_fpField===field) { _fpField=null; return; } }
  _fpField = field;
  const options = (_FP_OPTIONS[field]||(() => []))();
  const current = G[field] || [];
  const rect = btnEl.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.id = 'filter-popup';
  pop.className = 'fpop';
  pop.style.cssText += 'max-height:80vh;overflow-y:auto;';
  const top = Math.min(rect.bottom + 6, window.innerHeight - 340);
  const left = Math.max(8, Math.min(rect.left, window.innerWidth - 200));
  pop.style.top = top + 'px'; pop.style.left = left + 'px';
  pop.innerHTML = `
    <div style="font-size:12px;font-weight:800;color:#333;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0">${_FP_TITLES[field]||'필터'}</div>
    <div>${options.map(v=>`<label style="display:flex;align-items:center;gap:9px;padding:7px 6px;cursor:pointer;border-radius:8px;-webkit-tap-highlight-color:rgba(0,0,0,0.05)" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background=''">
      <input type="checkbox" class="fp-chk" data-val="${v}" ${current.includes(v)?'checked':''} style="width:17px;height:17px;cursor:pointer;accent-color:#4f8ef7;flex-shrink:0">
      <span style="font-size:14px;font-weight:500">${v==='(없음)'?'담당자 없음':v}</span>
    </label>`).join('')}</div>
    <div style="display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0">
      <button onclick="fpAll()" style="flex:1;padding:8px 4px;border-radius:8px;border:1px solid #e0e0e0;background:#f5f5f5;color:#555;font-size:13px;cursor:pointer;font-family:inherit">전체</button>
      <button onclick="fpNone()" style="flex:1;padding:8px 4px;border-radius:8px;border:1px solid #e0e0e0;background:#f5f5f5;color:#555;font-size:13px;cursor:pointer;font-family:inherit">해제</button>
      <button onclick="fpConfirm()" style="flex:2;padding:8px 10px;border-radius:8px;border:none;background:#4f8ef7;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">확인</button>
    </div>`;
  document.body.appendChild(pop);
  setTimeout(() => document.addEventListener('click', _fpOutside), 10);
}
function _fpOutside(e) {
  const pop = document.getElementById('filter-popup');
  if (pop && !pop.contains(e.target)) { pop.remove(); document.removeEventListener('click', _fpOutside); _fpField=null; }
}
function fpAll()  { document.querySelectorAll('.fp-chk').forEach(c=>c.checked=true); }
function fpNone() { document.querySelectorAll('.fp-chk').forEach(c=>c.checked=false); }
function fpConfirm() {
  const selected = [...document.querySelectorAll('.fp-chk:checked')].map(c=>c.dataset.val);
  G[_fpField] = selected;
  G.clientPage = 0;
  const pop = document.getElementById('filter-popup');
  if (pop) { pop.remove(); document.removeEventListener('click', _fpOutside); }
  const f = _fpField; _fpField = null;
  if (f==='julgaeManagers') renderJulgae();
  else if (['feesManagerFilter','feesDealFilter','filingManagerFilter'].includes(f)) renderFees();
  else if (f==='closureManagerFilter') renderClosure();
  else if (f==='scheduleManagerFilter') renderSchedule();
  else if (G.currentTab==='clients') renderClients();
}

function filterPopupBtn(field, defaultLabel) {

function openGroupEditModal(id) {
  const c = G.clients.find(x=>x.id===id); if (!c) return;
  const getGroupKey = buildClientGroupMap(G.clients);
  const gk = getGroupKey(c);
  const groupCounts = {};
  G.clients.forEach(cl=>{ const k=getGroupKey(cl); groupCounts[k]=(groupCounts[k]||0)+1; });
  const inGrp = groupCounts[gk] > 1;
  let memberIds;
  if (c.relatedGroup) {
    memberIds = G.clients.filter(cl=>cl.relatedGroup===c.relatedGroup).map(cl=>cl.id);
  } else if (inGrp) {
    memberIds = G.clients.filter(cl=>getGroupKey(cl)===gk&&!cl.soloGroup).map(cl=>cl.id);
  } else {
    memberIds = [id];
  }
  window._geClientId = id;
  window._geOrigGroupName = c.relatedGroup || '';
  window._geMembers = [...memberIds];
  window._geGroupName = c.relatedGroup || (inGrp ? (c.rep||'') : '');
  // 대표업체: groupMain=true 인 멤버 우선, 없으면 수임일자 가장 빠른 멤버
  const csk2 = x => x.contractDate || 'ZZZZ';
  const byDate = [...memberIds].map(mid=>G.clients.find(x=>x.id===mid)).filter(Boolean)
    .sort((a,b)=>csk2(a).localeCompare(csk2(b))||a.name.localeCompare(b.name,'ko'));
  window._geMainId = (byDate.find(m=>m.groupMain)||byDate[0]||c).id;
  renderGroupEditModal();
}

  const id = window._geClientId;

function geSetMain(clientId) {
  window._geGroupName = document.getElementById('ge-name')?.value ?? window._geGroupName;
  window._geMainId = clientId;
  renderGroupEditModal();
}

function geAddMember(clientId) {
  window._geGroupName = document.getElementById('ge-name')?.value ?? window._geGroupName;
  if (window._geMembers.includes(clientId)) { renderGroupEditModal(); return; }
  const cl = G.clients.find(x=>x.id===clientId);
  if (!cl) return;
  // 추가하려는 업체가 다른 그룹에 속해있으면 선택 팝업
  if (cl.relatedGroup && cl.relatedGroup !== (window._geGroupName||'')) {
    window._geConflictId = clientId;
    window._geConflictGroup = cl.relatedGroup;
    geShowConflictDialog();
    return;
  }
  window._geMembers.push(clientId);
  if (!window._geGroupName) {
    const c0 = G.clients.find(x=>x.id===window._geClientId);
    window._geGroupName = c0?.rep || c0?.name || cl?.rep || '';
  }
  renderGroupEditModal();
}

  const allIds = [...window._geMembers];

  window._geGroupName = '';
  allIds.filter(id=>id!==window._geClientId).forEach(id=>{
    const cl = G.clients.find(x=>x.id===id);

function doGroupEdit() {
  const name = (document.getElementById('ge-name')?.value||window._geGroupName||'').trim();
  const c = G.clients.find(x=>x.id===window._geClientId); if (!c) return;
  const origName = window._geOrigGroupName;
  if (window._geMembers.length<=1) {
    c.relatedGroup=''; c.soloGroup=true;
  } else {
    if (!name) { toast('그룹명을 입력해주세요','warning'); return; }
    window._geMembers.forEach(id=>{
      const cl=G.clients.find(x=>x.id===id);
      if (cl) { cl.relatedGroup=name; cl.soloGroup=false; cl.groupMain=(id===window._geMainId); }
    });
    if (origName) {
      G.clients.forEach(cl=>{
        if (cl.relatedGroup===origName&&!window._geMembers.includes(cl.id)) { cl.relatedGroup=''; cl.soloGroup=true; }
      });
    }
  }
  saveToLS(); closeModal(); renderClients();
}

function updateClientField(id, field, value, _skipCheck) {
  const c = G.clients.find(x=>x.id===id); if(!c) return;
  if (!_skipCheck && ['dealType','taxType','vatType','seongsi','status'].includes(field)) {
    const sim = {...c, dealTypes:[...(c.dealTypes||[])], managers:[...(c.managers||[])]};
    if (field==='dealType') { sim.dealType=value; sim.dealTypes=[value]; }
    else sim[field] = value;
    const autoPeriods = (G.periods||[]).filter(p=>!p.enrolled||!p.enrolled.length);
    const adds=[], removes=[];
    autoPeriods.forEach(p=>{
      const base = x => x.status!=='해지'&&x.status!=='폐업';
      const wasIn = base(c) && applyReportFilter([c],p).length>0;
      const willIn = base(sim) && applyReportFilter([sim],p).length>0;
      if (wasIn&&!willIn) removes.push(p);
      if (!wasIn&&willIn) adds.push(p);
    });
    if (adds.length||removes.length) {
      window._ucfCb = ()=>updateClientField(id,field,value,true);
      const li = p=>`<li>${esc(p.label||p.id)}</li>`;
      showModal(`<div style="max-width:400px;width:min(400px,95vw)">
        <div class="modal-header"><h3>📋 신고리스트 변경 확인</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
          <p style="margin-bottom:10px"><b>${esc(c.name)}</b> 수정으로 아래 신고리스트가 변경됩니다.</p>
          ${adds.length?`<div style="margin-bottom:8px;color:#2e7d32"><b>추가될 리스트 (${adds.length}개):</b><ul style="margin:4px 0 0 16px;font-size:13px">${adds.map(li).join('')}</ul></div>`:''}
          ${removes.length?`<div style="margin-bottom:8px;color:#c62828"><b>제거될 리스트 (${removes.length}개):</b><ul style="margin:4px 0 0 16px;font-size:13px">${removes.map(li).join('')}</ul></div>`:''}
          <p style="font-size:12px;color:#888">수동 등록 리스트는 영향을 받지 않습니다.</p>
        </div>
        <div style="padding:12px 16px;border-top:1px solid #f0f0f0;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn-secondary" onclick="closeModal();renderClients()">취소</button>
          <button class="btn-primary" onclick="closeModal();window._ucfCb&&window._ucfCb()">반영</button>
        </div>
      </div>`);
      return;
    }
  }
  if (field==='fee') value = Number(value)||0;
  if (field==='dealType') { c.dealType=value; c.dealTypes=[value]; }
  else if (field==='manager') { c.manager=value; c.managers=value?[value]:[]; }
  else c[field] = value;
  saveToLS();
}

function selectStatusOption(s) {

    btn.style.border = `2px solid ${opt===s?'#4f8ef7':'#e0e0e0'}`;

  if (dr) dr.style.display = ['휴업','해지','폐업'].includes(s)?'block':'none';

function applyStatusChange(id) {
  const c = G.clients.find(x=>x.id===id); if(!c) return;
  const newStatus = window._statusSelected;
  if (!newStatus) return;
  if (['휴업','해지','폐업'].includes(newStatus)) {
    const dateVal = document.getElementById('status-event-date')?.value;
    if (!dateVal) { alert('사유발생일을 입력해주세요'); return; }
    c.terminationDate = dateVal;

  c.status = newStatus;
  saveToLS(); closeModal(); renderClients();
  toast(`${c.name} 상태 변경: ${newStatus}`, 'success');
}

function applyBulkManagerChange() {

  (G.selectedClients||[]).forEach(id=>{
    const c = G.clients.find(x=>x.id===id);

    const oldStr = getManagers(c).sort().join(',');
    c.managers = [newMgr];
    c.manager = newMgr;
    if (!G.managerHistory) G.managerHistory = {};
    if (!G.managerHistory[id]) G.managerHistory[id] = [];
    G.managerHistory[id].push({ date: new Date().toLocaleString('ko-KR'), from: oldStr, to: newMgr });

  G.selectedClients = [];
  G.bulkMode = false;
  saveToLS();
  closeModal();
  renderClients();

        <input type="checkbox" data-amgr-id="${c.id}" style="width:15px;height:15px;cursor:pointer">
        <span style="font-weight:600;font-size:13px">${esc(c.name)}</span>
        <span style="font-size:11px;color:#888">${esc(c.rep||'')}</span>
        <span style="font-size:10px;color:#bbb;margin-left:auto">${esc(getDealTypes(c).join(', ')||'-')}</span>
      </label>`).join('')}
    </div>
    <div style="display:flex;gap:8px;padding-bottom:14px">
      <div id="amgr-count" style="flex:1;font-size:12px;color:#888;align-self:center">0개 선택됨</div>
      <button onclick="saveAssignManager()" style="padding:10px 24px;background:#4f8ef7;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">저장</button>
    </div>
  </div></div>`);
  document.getElementById('amgr-list').addEventListener('change', ()=>{
    const cnt = document.querySelectorAll('[data-amgr-id]:checked').length;
    const el = document.getElementById('amgr-count');
    if (el) el.textContent = cnt + '개 선택됨';
  });
}
function amgrSelectAll(v) {
  document.querySelectorAll('[data-amgr-id]').forEach(el => el.checked = v);
  const cnt = v ? document.querySelectorAll('[data-amgr-id]').length : 0;
  const el = document.getElementById('amgr-count');
  if (el) el.textContent = cnt + '개 선택됨';
}
function saveAssignManager() {
  const mgr = document.getElementById('amgr-sel')?.value;
  if (!mgr) { toast('담당자를 선택해주세요','warning'); return; }
  const checked = [...document.querySelectorAll('[data-amgr-id]:checked')].map(el => Number(el.dataset.amgrId));
  if (!checked.length) { toast('배정할 거래처를 선택해주세요','warning'); return; }
  if (!G.managerHistory) G.managerHistory = {};
  checked.forEach(id => {
    const c = G.clients.find(x => x.id===id);
    if (!c) return;
    const oldStr = getManagers(c).join(', ') || '(없음)';
    c.managers = [mgr];
    c.manager = mgr;
    if (!G.managerHistory[id]) G.managerHistory[id] = [];
    G.managerHistory[id].push({ date: new Date().toLocaleString('ko-KR'), from: oldStr, to: mgr });
  });
  saveToLS();
  closeModal();
  renderDashboard();
  toast(`${mgr} 담당자로 ${checked.length}개 업체 배정 완료`,'success');
}

function openDetail(id) {

  const contractRows = CONTRACT_GROUPS.map(g=>{

      <div style="font-size:11px;color:#aaa;margin-bottom:4px">${g.label}</div>

    </div>`;
  }).join('');

  const progressSection = !isTerminated?`
  <div class="detail-section">
    <div class="detail-section-title">이달 업무 진행</div>

      <div class="detail-row">
        <span class="lbl">${l}</span>
        <button onclick="toggleField(${c.id},'${f}');closeModal();openDetail(${c.id})" style="background:${c[f]?'#e8f5e9':'#fafafa'};border:2px solid ${c[f]?'#43a047':'#e0e0e0'};border-radius:20px;padding:4px 16px;font-size:12px;font-weight:600;color:${c[f]?'#2e7d32':'#aaa'};cursor:pointer;font-family:inherit">
          ${c[f]?'완료':'미완료'}

    <div class="detail-section-body">
      ${[['closureTaxFiled','신고서 접수'],['closureTaxApproved','신고 완료']].map(([f,l])=>`
      <div class="detail-row">
        <span class="lbl">${l}</span>
        <button onclick="toggleField(${c.id},'${f}');closeModal();openDetail(${c.id})" style="background:${c[f]?'#e8f5e9':'#fafafa'};border:2px solid ${c[f]?'#43a047':'#e0e0e0'};border-radius:20px;padding:4px 16px;font-size:12px;font-weight:600;color:${c[f]?'#2e7d32':'#aaa'};cursor:pointer;font-family:inherit">
          ${c[f]?'완료':'미완료'}

      </div>`).join('')}

      </div>
    </div>`:''}
    ${c.memo?`<div class="detail-section"><div class="detail-section-title">메모</div><div style="font-size:14px;color:#555;line-height:1.6;background:#fafbff;border-radius:8px;padding:10px 14px">${esc(c.memo)}</div></div>`:''}
    ${(()=>{const inv=G.invoiceData&&G.invoiceData[c.id];if(!inv||!inv.periods||Object.keys(inv.periods).length===0)return'';const entries=Object.entries(inv.periods);return`<div class="detail-section"><div class="detail-section-title">🧾 세금계산서 현황</div><div class="detail-section-body">${entries.map(([period,d])=>`<div style="padding:8px 0;border-bottom:1px solid #f0f0f0"><div style="font-size:11px;color:#888;margin-bottom:4px">${esc(period)}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px"><div><span style="color:#888">매출</span> <b>${(d.salesCount||0)}건</b> ${(d.salesAmount||0).toLocaleString()}원</div><div><span style="color:#888">매입</span> <b>${(d.purchaseCount||0)}건</b> ${(d.purchaseAmount||0).toLocaleString()}원</div></div></div>`).join('')}<div style="font-size:11px;color:#aaa;padding-top:6px">최종 가져오기: ${esc(inv.lastImported||'-')}</div></div></div>`;})()}
  </div>
  </div>`);
}

window.validateBizNo = function(val, input) {
  // Auto-insert hyphens: remove all non-digits first
  const digits = val.replace(/\D/g,'').slice(0,10);
  let formatted = digits;
  if (digits.length > 5) formatted = digits.slice(0,3)+'-'+digits.slice(3,5)+'-'+digits.slice(5);
  else if (digits.length > 3) formatted = digits.slice(0,3)+'-'+digits.slice(3);
  if (input && input.value !== formatted) {
    const pos = input.selectionStart + (formatted.length - val.length);
    input.value = formatted;
    try { input.setSelectionRange(pos, pos); } catch(e) {}
  }
  window._formData.bizNo = formatted;
  const msg = document.getElementById('bizno-msg');
  if (!msg) return;
  if (digits.length !== 10) { msg.textContent=''; return; }
  // Checksum validation
  const w = [1,3,7,1,3,7,1,3,5,1];
  const d = digits.split('').map(Number);
  let sum = 0;
  for (let i=0; i<9; i++) {
    sum += d[i]*w[i];
    if (i===8) sum += Math.floor(d[8]*w[8]/10);
  }
  const valid = (sum + d[9]) % 10 === 0;
  msg.innerHTML = valid
    ? '<span style="color:#2e7d32">✓ 유효한 번호</span>'
    : '<span style="color:#c62828">✗ 유효하지 않은 번호</span>';
};

window.addFormTag = function(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const input = document.getElementById('form-tag-input');
  const tag = (input.value||'').trim();
  if (!tag) return;
  if (!window._formTags) window._formTags = [];
  if (!window._formTags.includes(tag)) {
    window._formTags.push(tag);
    const display = document.getElementById('form-tags-display');
    if (display) {
      const span = document.createElement('span');
      span.style.cssText = 'background:#e8f0fe;color:#4f8ef7;border-radius:10px;padding:2px 10px;font-size:12px;display:flex;align-items:center;gap:4px';
      span.innerHTML = `${esc(tag)}<button type="button" onclick="removeFormTag('${esc(tag).replace(/'/g,"\\'")}')" style="border:none;background:transparent;color:#4f8ef7;cursor:pointer;padding:0;font-size:13px;line-height:1">×</button>`;
      display.appendChild(span);
    }
  }
  input.value = '';
};

window.removeFormTag = function(tag) {
  if (!window._formTags) return;
  window._formTags = window._formTags.filter(t=>t!==tag);
  const display = document.getElementById('form-tags-display');
  if (display) {
    display.innerHTML = window._formTags.map(t=>`<span style="background:#e8f0fe;color:#4f8ef7;border-radius:10px;padding:2px 10px;font-size:12px;display:flex;align-items:center;gap:4px">${esc(t)}<button type="button" onclick="removeFormTag('${esc(t).replace(/'/g,"\\'")}')" style="border:none;background:transparent;color:#4f8ef7;cursor:pointer;padding:0;font-size:13px;line-height:1">×</button></span>`).join('');
  }
};
