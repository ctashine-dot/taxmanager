function openAnnualFeeStatement() {
  const yr = new Date().getFullYear();
  const years = [yr, yr-1, yr-2];
  let selYr = yr;
  const genHTML = (y) => {
    const months = Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0')).map(m=>`${y}-${m}`);
    const feeClients = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
    const rows = feeClients.filter(c=>c.fee>0).map(c=>{
      const cells = months.map(ym=>G.monthlyFees[c.id]?.[ym]?`<td style="text-align:center;background:#e8f5e9;color:#2e7d32;font-size:11px">${(G.feePayments?.[c.id]?.[ym]?.method||'✓')}</td>`:`<td style="text-align:center;color:#ddd;font-size:11px">-</td>`);
      const paid = months.filter(ym=>G.monthlyFees[c.id]?.[ym]).length;
      return `<tr><td style="padding:6px 8px;font-size:12px;font-weight:600;white-space:nowrap">${esc(c.name)}</td><td style="padding:6px 8px;font-size:12px;text-align:right">${(c.fee||0).toLocaleString()}</td>${cells.join('')}<td style="padding:6px 8px;font-size:12px;text-align:center;font-weight:700;color:${paid===12?'#2e7d32':'#e65100'}">${paid}/12</td><td style="padding:6px 8px;font-size:12px;text-align:right;font-weight:700">${((c.fee||0)*paid).toLocaleString()}</td></tr>`;
    }).join('');
    const totRow = (() => {
      const cells2 = months.map(ym=>{
        const mTotal = feeClients.filter(c=>G.monthlyFees[c.id]?.[ym]).reduce((a,c)=>a+(c.fee||0),0);
        return `<td style="text-align:right;font-size:11px;color:#555">${mTotal>0?mTotal.toLocaleString():''}</td>`;
      });
      return `<tr style="background:#f5f5f5;font-weight:700"><td colspan="2" style="padding:6px 8px;font-size:12px">합계</td>${cells2.join('')}<td></td><td style="padding:6px 8px;font-size:12px;text-align:right">${feeClients.reduce((a,c)=>a+(c.fee||0)*months.filter(ym=>G.monthlyFees[c.id]?.[ym]).length,0).toLocaleString()}</td></tr>`;
    })();
    return `<table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:#f0f4ff"><th style="padding:6px 8px;text-align:left">거래처</th><th style="padding:6px 8px;text-align:right">월정액</th>${months.map(ym=>`<th style="padding:4px 2px;text-align:center;font-size:10px;min-width:28px">${ym.slice(5)}월</th>`).join('')}<th style="padding:6px 4px;text-align:center">납부</th><th style="padding:6px 8px;text-align:right">합계</th></tr></thead>
      <tbody>${rows}${totRow}</tbody></table>`;
  };
  showModal(`<div style="max-width:90vw;width:900px">
  <div class="modal-header">
    <h3>📊 연간 수수료 명세서</h3>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
      ${years.map(y=>`<button onclick="document.getElementById('annual-stmt-body').innerHTML=genAnnualFee(${y});this.closest('.filter-bar')?.querySelectorAll('button').forEach(b=>b.style.background='#fff');this.style.background='#e8f0fe'" style="padding:6px 16px;border-radius:8px;border:1.5px solid #e0e0e0;background:${y===yr?'#e8f0fe':'#fff'};font-size:13px;cursor:pointer;font-family:inherit">${y}년</button>`).join('')}
      <button onclick="printAnnualStmt()" style="margin-left:auto;padding:6px 16px;border-radius:8px;border:1.5px solid #4f8ef7;background:#e8f0fe;color:#4f8ef7;font-size:13px;cursor:pointer;font-family:inherit">🖨 인쇄</button>
    </div>
    <div id="annual-stmt-body" style="overflow-x:auto;max-height:60vh;overflow-y:auto">${genHTML(yr)}</div>
  </div></div>`);
  window.genAnnualFee = genHTML;
}
function printAnnualStmt() {
  const body = document.getElementById('annual-stmt-body')?.innerHTML||'';
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>연간 수수료 명세서</title><style>table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:4px 6px;font-size:11px}th{background:#f0f4ff}@media print{body{margin:0}}</style></head><body>${body}</body></html>`);
  w.document.close(); w.print();
}

function exportBackup() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    clients: G.clients,
    periods: G.periods,
    julgae: G.julgae,
    settings: G.settings
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taxmanager_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('backup-status');
  st.textContent = '읽는 중...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.clients || !Array.isArray(data.clients)) throw new Error('올바른 백업 파일이 아닙니다.');
      if (!confirm(`백업 파일에 거래처 ${data.clients.length}개, 신고기간 ${(data.periods||[]).length}개가 있습니다.\n현재 데이터를 모두 교체할까요?`)) {
        st.textContent = '취소되었습니다.';
        input.value = '';
        return;
      }
      G.clients  = data.clients;
      G.periods  = data.periods  || G.periods;
      G.julgae   = data.julgae   || G.julgae;
      G.settings = data.settings || G.settings;
      saveToLS();
      st.innerHTML = `<span style="color:#2e7d32">✔ 복원 완료 — 거래처 ${G.clients.length}개</span>`;
      closeModal();
      renderDashboard();
    } catch(err) {
      st.innerHTML = `<span style="color:#e53935">오류: ${err.message}</span>`;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportExcel() {
  const wb = XLSX.utils.book_new();

  // Sheet 1: 거래처 기본정보
  const rows1 = G.clients.map(c=>({
    거래처명:c.name, 대표자:c.rep, 연락처:c.phone, 이메일:c.email||'',
    과세유형:c.taxType, 부가세유형:c.vatType, 업종:c.bizType||'', 업종코드:c.bizCode||'', 관할세무서:c.taxOffice||'',
    담당자:getManagers(c).join(', '), 거래유형:getDealTypes(c).join(', '), 월수수료:c.fee,
    수금상태:c.feeStatus, 수임계약항목:(c.contracts||[]).map(contractLabel).join(', '),
    거래처상태:c.status, 수임일자:c.contractDate||'', 해지일자:c.terminationDate||'',
    해지사유:c.terminationReason||'', 폐업연도:c.closureYear||'',
    신고접수:c.closureTaxFiled?'Y':'N', 신고완료:c.closureTaxApproved?'Y':'N',
    자료수령:c.dataReceived?'Y':'N', 기장완료:c.bookkeeping?'Y':'N', 결재완료:c.approved?'Y':'N',
    메모:c.memo||''
  }));
  const ws1 = XLSX.utils.json_to_sheet(rows1);
  ws1['!cols'] = [20,12,14,22,8,10,12,10,12,10,10,12,10,30,8,12,12,14,10,8,8,8,8,8,30].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, '거래처목록');

  // Sheet 2: 신고 현황
  const rows2 = [];
  (G.periods||[]).forEach(p=>{
    const pk = p.id+'|'+(p.reportType||p.type);
    const clients2 = p.enrolled && p.enrolled.length
      ? p.enrolled.map(id=>G.clients.find(c=>c.id===id)).filter(Boolean)
      : G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업');
    clients2.forEach(c=>{
      const v = julgaeVal(pk, c.id);
      if (!v||(!v.d&&!v.b&&!v.a&&!v.fee&&!v.s)) return;
      rows2.push({'신고기간':p.label,'거래처명':c.name,'대표자':c.rep||'','담당자':getManagers(c).join(','),'자료수령':v.d?'Y':'','기장완료':v.b?'Y':'','결재완료':v.a?'Y':'','수수료청구':v.fee||0,'수금완료':v.s?'Y':''});
    });
  });
  if (rows2.length) {
    const ws2 = XLSX.utils.json_to_sheet(rows2);
    ws2['!cols'] = [20,16,12,14,8,8,8,10,8].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws2, '신고현황');
  }

  // Sheet 3: 메모 이력
  const rows3 = [];
  Object.entries(G.clientNotes||{}).forEach(([idStr, notes])=>{
    const c = G.clients.find(x=>x.id===Number(idStr));
    if (!c||!notes||!notes.length) return;
    notes.forEach(n=>rows3.push({'거래처명':c.name,'대표자':c.rep||'','날짜':n.date,'메모내용':n.text}));
  });
  if (rows3.length) {
    const ws3 = XLSX.utils.json_to_sheet(rows3);
    ws3['!cols'] = [16,12,16,40].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws3, '메모이력');
  }

  XLSX.writeFile(wb, `TaxManager_${new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')}.xlsx`);
}

function importExcel(input) {
  const file = input.files[0]; if (!file) return;
  const mode = document.querySelector('input[name="importMode"]:checked')?.value||'append';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const imported = rows.map((r,i)=>({
        id: Date.now()+i, name:String(r['거래처명']||'').trim(), rep:String(r['대표자']||'').trim(),
        bizNo:'', phone:String(r['연락처']||'').trim(), email:String(r['이메일']||'').trim(),
        taxType:['법인','개인'].includes(r['과세유형'])?r['과세유형']:'개인',
        vatType:['일반','간이','면세'].includes(r['부가세유형'])?r['부가세유형']:'일반',
        bizType:String(r['업종']||''), taxOffice:String(r['관할세무서']||''),
        manager:String(r['담당자']||''), dealType:String(r['거래유형']||'기장'),
        fee:Number(r['월수수료'])||0, feeStatus:String(r['수금상태']||'청구완료'),
        contracts:r['수임계약항목']?String(r['수임계약항목']).split(',').map(s=>s.trim()).filter(Boolean):[],
        status:String(r['거래처상태']||'정상'), contractDate:String(r['수임일자']||''),
        terminationDate:String(r['해지일자']||''), terminationReason:String(r['해지사유']||''),
        closureYear:String(r['폐업연도']||''),
        closureTaxFiled:String(r['신고접수']).toUpperCase()==='Y',
        closureTaxApproved:String(r['신고완료']).toUpperCase()==='Y',
        dataReceived:String(r['자료수령']).toUpperCase()==='Y',
        bookkeeping:String(r['기장완료']).toUpperCase()==='Y',
        approved:String(r['결재완료']).toUpperCase()==='Y',
        memo:String(r['메모']||'')
      })).filter(c=>c.name);
      if (mode==='replace') G.clients=imported;
      else {
        const existing = new Set(G.clients.map(c=>c.name+c.rep));
        G.clients=[...G.clients,...imported.filter(c=>!existing.has(c.name+c.rep))];
      }
      saveToLS();
      document.getElementById('import-status').innerHTML=`<span style="color:#2e7d32;font-weight:600">✓ ${imported.length}개 거래처 ${mode==='replace'?'교체':'추가'} 완료</span>`;
      updateBadge();
    } catch(err) {
      document.getElementById('import-status').innerHTML=`<span style="color:red">파일 읽기 실패: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function getAIKey() { return G.settings?.aiKey || ''; }
function aiHeaders() {
  return {'Content-Type':'application/json','x-api-key':getAIKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
}
async function aiCall(system, userMsg, maxTokens=800) {
  const key = getAIKey();
  if (!key) { toast('⚙ 설정에서 Claude AI API 키를 먼저 입력해주세요 (설정 → Claude AI API 키)','warning'); return null; }
  const body = {model:'claude-sonnet-4-6', max_tokens:maxTokens, messages:[{role:'user', content:userMsg}]};
  if (system) body.system = system;
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 30000);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:aiHeaders(),body:JSON.stringify(body),signal:ctrl.signal});
    if (!res.ok) { const e=await res.json().catch(()=>({error:{message:res.statusText}})); throw new Error(e?.error?.message||res.statusText); }
    const data = await res.json();
    return data.content?.map(b=>b.text||'').join('') || '';
  } catch(e) {
    if (e.name==='AbortError') throw new Error('AI 응답 시간 초과 (30초). 다시 시도해주세요.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

function applyBosuFee(pKey, clientId, field, fee) {

  cur[field] = fee;
  G.julgae[pKey][clientId] = cur;
  const period = G.periods.find(p=>p.id===pKey);
  const client = G.clients.find(c=>c.id===clientId);
  if (client && period) {
    if (field==='feeSeongsi') client.feeSeongsi = fee;
    else { const ff=REPORT_FEE_FIELD[period.reportType]; if(ff) client[ff]=fee; }
  }
  saveToLS();
  renderJulgae();
}

function renderMgrTransferList() {
  const fromMgr = document.getElementById('mgr-from')?.value;
  const list = document.getElementById('mgr-transfer-list');
  if (!list||!fromMgr) return;
  const clients = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&getManagers(c).includes(fromMgr));
  list.innerHTML = clients.length===0
    ? `<div style="color:#aaa;font-size:13px;text-align:center">${fromMgr}의 거래처 없음</div>`
    : clients.map(c=>`<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;cursor:pointer">
        <input type="checkbox" class="mgr-chk" data-id="${c.id}" checked style="width:16px;height:16px;accent-color:#4f8ef7">
        <span style="font-size:13px;font-weight:600">${esc(c.name)}</span>
        <span style="font-size:11px;color:#888">${esc(c.taxType||'')} · ${esc(c.vatType||'')}</span>
      </label>`).join('');
  const cnt = document.getElementById('mgr-transfer-count');
  if (cnt) cnt.textContent = `총 ${clients.length}개 거래처 (전체 선택됨 — 개별 해제 가능)`;
}
function applyManagerTransfer() {
  const fromMgr = document.getElementById('mgr-from')?.value;
  const toMgr = document.getElementById('mgr-to')?.value;
  if (!fromMgr||!toMgr) { alert('FROM과 TO 담당자를 모두 선택해주세요'); return; }
  if (fromMgr===toMgr) { alert('같은 담당자입니다'); return; }
  const checked = [...document.querySelectorAll('.mgr-chk:checked')].map(c=>Number(c.dataset.id));
  if (!checked.length) { alert('이동할 거래처를 선택해주세요'); return; }
  const today = new Date().toISOString().slice(0,10);
  checked.forEach(id=>{
    const c = G.clients.find(x=>x.id===id); if(!c) return;
    const mgrs = getManagers(c);
    const idx2 = mgrs.indexOf(fromMgr);
    if (idx2>=0) mgrs[idx2] = toMgr;
    c.manager = mgrs[0]||'';
    if (!G.managerHistory) G.managerHistory = {};
    if (!G.managerHistory[id]) G.managerHistory[id] = [];
    G.managerHistory[id].push({date:today, from:fromMgr, to:toMgr});
  });
  saveToLS(); closeModal(); renderClients();
  toast(`${checked.length}개 거래처 담당자 이동: ${fromMgr} → ${toMgr}`,'success');
}

function toast(msg, type='info', ms=3000) {
  const C={success:'#2e7d32',error:'#c62828',warning:'#e65100',info:'#1565c0'};
  const B={success:'#e8f5e9',error:'#ffebee',warning:'#fff3e0',info:'#e3f2fd'};
  let box=document.getElementById('_toast-box');
  if(!box){box=document.createElement('div');box.id='_toast-box';box.style.cssText='position:fixed;bottom:24px;right:20px;z-index:99999;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none';document.body.appendChild(box);}
  const el=document.createElement('div');
  el.style.cssText=`background:${B[type]};color:${C[type]};border-left:4px solid ${C[type]};border-radius:8px;padding:10px 16px;font-size:13px;line-height:1.5;box-shadow:0 2px 12px rgba(0,0,0,.15);pointer-events:auto;max-width:320px;animation:toastIn .2s ease;white-space:pre-line`;
  el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>{el.style.cssText+=';opacity:0;transition:opacity .3s';setTimeout(()=>el.remove(),300);},ms);
}
function manualSave() {
  saveToLS();
  const toast = document.getElementById('save-toast');
  toast.style.display = 'inline';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

function updateBadge() {

  try {

      if (alerts.length > 0) { nb.style.display='inline'; nb.textContent=alerts.length; }

  } catch(e) {}
}

}
function doGlobalSearch(q) {

// ══════════════════════════════════════════════════════
// Feature 2: 알림 센터 (Notification Center)
// ══════════════════════════════════════════════════════
function computeAlerts() {
  const alerts = [];
  const today = new Date(); today.setHours(0,0,0,0);
  // 신고 마감 D-7
  G.periods.forEach(p => {
    const tpl = PERIOD_TEMPLATES.find(t=>t.reportType===p.reportType||t.tpl===p.reportType);
    if (!tpl||!tpl.deadline) return;
    const m = tpl.deadline.match(/(\d+)월\s*(\d+)일/);
    if (!m) return;
    const yr = today.getFullYear();
    let dl = new Date(yr, Number(m[1])-1, Number(m[2]));
    if (dl < today) dl = new Date(yr+1, Number(m[1])-1, Number(m[2]));
    const diff = Math.ceil((dl-today)/86400000);
    if (diff<=7) alerts.push({type:'deadline',label:'신고 마감 D-'+diff,detail:esc(p.label)+' · '+tpl.deadline,color:'#e53935'});
  });
  // 장기 미수금 (3개월 이상)
  const activeClients = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&c.fee>0&&getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
  activeClients.forEach(c=>{
    let uncollected = 0;
    const now2 = new Date();
    for (let i=1;i<=6;i++) {
      const d2 = new Date(now2.getFullYear(), now2.getMonth()-i, 1);
      const ym2 = d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0');
      if (!c.contractDate||c.contractDate.slice(0,7)>ym2) break;
      if (!(G.monthlyFees[c.id]&&G.monthlyFees[c.id][ym2])) uncollected++;
      else break;
    }
    if (uncollected>=3) alerts.push({type:'unpaid',label:'장기 미수금',detail:esc(c.name)+' '+uncollected+'개월 미수',color:'#c62828'});
  });
  // 계약 갱신 필요 (11개월 이상)
  const renewalClients = G.clients.filter(c=>{
    if(c.status!=='정상'||!c.contractDate)return false;
    const cd=new Date(c.contractDate);
    const months=(today.getFullYear()-cd.getFullYear())*12+(today.getMonth()-cd.getMonth());
    return months>=11;
  });
  if (renewalClients.length) alerts.push({type:'renewal',label:'계약 갱신 필요',detail:renewalClients.length+'개 거래처 (11개월 이상 경과)',color:'#e65100'});
  // 사업자번호 미입력
  const noBizNo = G.clients.filter(c=>!c.bizNo&&c.status==='정상').length;
  if (noBizNo>0) alerts.push({type:'missingBiz',label:'사업자번호 미입력',detail:noBizNo+'개 거래처 사업자번호 미입력',color:'#888'});
  // 메모 알림 날짜
  const todayStr = new Date().toISOString().slice(0,10);
  const tomorrowStr = new Date(Date.now()+86400000).toISOString().slice(0,10);
  Object.entries(G.clientNotes||{}).forEach(([idStr,notes])=>{
    const c = G.clients.find(x=>x.id===Number(idStr));
    if (!c) return;
    (notes||[]).forEach(n=>{
      if (!n.reminder) return;
      if (n.reminder <= tomorrowStr && n.reminder >= todayStr) {
        alerts.push({type:'memo',label:'메모 알림',detail:esc(c.name)+': '+esc(n.text.slice(0,30)),color:'#9c27b0'});
      }
    });
  });
  return alerts;
}
function openNotificationCenter(btn) {
  const existing = document.getElementById('notification-panel');
  if (existing) { existing.remove(); return; }
  const alerts = computeAlerts();
  const panel = document.createElement('div');
  panel.id = 'notification-panel';
  const rect = btn.getBoundingClientRect();
  panel.style.cssText = `position:fixed;top:${rect.bottom+6}px;left:${Math.min(rect.left,window.innerWidth-320)}px;z-index:500;background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.22);padding:14px;width:300px;max-height:70vh;overflow-y:auto`;
  panel.innerHTML = `<div style="font-weight:700;font-size:14px;margin-bottom:10px">🔔 알림 센터 (${alerts.length})</div>
    ${alerts.length?alerts.map(a=>`<div style="padding:10px 12px;border-radius:10px;border-left:4px solid ${a.color};background:#fafbff;margin-bottom:6px">
      <div style="font-weight:700;font-size:13px;color:${a.color}">${a.label}</div>
      <div style="font-size:11px;color:#666;margin-top:2px">${a.detail}</div>
    </div>`).join(''):`<div style="color:#aaa;text-align:center;padding:20px">알림이 없습니다</div>`}`;
  document.body.appendChild(panel);

// Feature 5: 거래처 위험도 자동 배지
// ══════════════════════════════════════════════════════
function clientRiskLevel(c) {
  if (c.status==='주의') return 'red';
  // Count uncollected months
  const now3 = new Date();
  let uncollected = 0;
  if (c.fee>0&&getDealTypes(c).some(d=>['기장','고문','성실'].includes(d))) {
    for (let i=1;i<=6;i++) {
      const d3 = new Date(now3.getFullYear(), now3.getMonth()-i, 1);
      const ym3 = d3.getFullYear()+'-'+String(d3.getMonth()+1).padStart(2,'0');
      if (!c.contractDate||c.contractDate.slice(0,7)>ym3) break;
      if (!(G.monthlyFees[c.id]&&G.monthlyFees[c.id][ym3])) uncollected++;
      else break;
    }
  }
  if (uncollected>=3) return 'red';
  // Contract age
  let contractMonths = 0;
  if (c.contractDate) {
    const cd=new Date(c.contractDate);
    contractMonths=(now3.getFullYear()-cd.getFullYear())*12+(now3.getMonth()-cd.getMonth());
  }
  if (contractMonths>=12) return 'red';
  if (uncollected>=1&&uncollected<=2) return 'yellow';
  if (!c.bizNo) return 'yellow';
  if (contractMonths>=10&&contractMonths<=11) return 'yellow';
  return 'green';
}

// Feature 10: 신고기간 자동 생성 스케줄러
// ══════════════════════════════════════════════════════
function autoCreatePeriods(year) {
  const yy = String(year).slice(2);
  let created = 0;
  PERIOD_TEMPLATES.forEach(tpl => {
    const label = yy + '년 ' + tpl.label;
    const exists = G.periods.find(p => p.label === label && p.reportType === tpl.reportType);
    if (exists) return;
    const newId = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    G.periods.push({
      id: newId,
      label,
      type: tpl.type,
      reportType: tpl.reportType,
      targetType: tpl.targetType,
      deadline: tpl.deadline,
      hint: tpl.hint,
      enrolled: []
    });
    created++;
  });
  if (created > 0) { saveToLS(); toast(year+'년 신고기간 '+created+'개 자동 생성 완료','success'); renderJulgae(); }
  else toast(year+'년 신고기간이 이미 모두 존재합니다','info');
}

function showModal(html) {
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() {
  if (window._formDataSnapshot !== undefined) {
    const cur = JSON.stringify(window._formData);
    if (cur !== window._formDataSnapshot) {
      if (!confirm('변경사항이 저장되지 않습니다. 닫으시겠습니까?')) return;
    }
    window._formDataSnapshot = undefined;
  }
  document.getElementById('modal-container').innerHTML='';
}

function migrateJulgae() {
  for (const pKey of Object.keys(G.julgae)) {
    for (const cId of Object.keys(G.julgae[pKey])) {
      if (typeof G.julgae[pKey][cId] === 'boolean') {
        G.julgae[pKey][cId] = {d:false, b:false, a:G.julgae[pKey][cId], s:false, revenue:0, income:0, taxBase:0, fee:0};
      } else if (G.julgae[pKey][cId] && G.julgae[pKey][cId].s === undefined) {
        G.julgae[pKey][cId].s = false;
        G.julgae[pKey][cId].revenue    = G.julgae[pKey][cId].revenue    || 0;
        G.julgae[pKey][cId].income     = G.julgae[pKey][cId].income     || 0;
        G.julgae[pKey][cId].taxBase    = G.julgae[pKey][cId].taxBase    || 0;
        G.julgae[pKey][cId].fee        = G.julgae[pKey][cId].fee        || 0;
        G.julgae[pKey][cId].feeSeongsi = G.julgae[pKey][cId].feeSeongsi || 0;
      }
    }
  }
  // 수임계약항목 마이그레이션: 구조 단순화
  const removedKeys = ['성실신고','연말정산','신고대리_부가세','신고대리_면세','종소세신고대리'];
  let contractsMigrated = false;
  G.clients.forEach(c => {
    if (!c.contracts) c.contracts = [];
    // 기장_간이 / 기장_면세 → 기장_일반
    ['기장_간이','기장_면세'].forEach(old => {
      if (c.contracts.includes(old)) {
        c.contracts = c.contracts.filter(k=>k!==old);
        if (!c.contracts.includes('기장_일반')) c.contracts.push('기장_일반');
        contractsMigrated = true;
      }
    });
    // 제거된 항목 삭제
    removedKeys.forEach(k => {
      if (c.contracts.includes(k)) { c.contracts = c.contracts.filter(x=>x!==k); contractsMigrated = true; }
    });
    // 새 항목 기본값 추가 (부가세신고, 사업장현황신고, 소득세, 원천세)
    const newKeys = ['부가세신고','사업장현황신고','소득세','원천세'];
    const dealType = getDealTypes(c)[0] || '기장';
    const defaults = getDefaultContracts(dealType, c.taxType, c.vatType);
    for (const key of defaults) {
      if (newKeys.includes(key) && !c.contracts.includes(key)) {
        c.contracts.push(key);
        contractsMigrated = true;
      }
    }
  });
  if (contractsMigrated) saveToLS();

  // 수임계약항목 전체 재설정 (dealType/vatType/taxType 기준 — 최초 1회)
  if (!localStorage.getItem('tm_contractsRebuildV2')) {
    rebuildAllContracts(false);
    localStorage.setItem('tm_contractsRebuildV2', '1');
  }

  // 수수료 4종 필드 마이그레이션: feeSingo가 미정의인 거래처에 한해 deal type 기준으로 이동
  const bookingTypes = ['기장', '고문', '성실'];
  let feesMigrated = false;
  G.clients.forEach(c => {
    if (c.feeSingo === undefined) {
      feesMigrated = true;
      c.feeSingo   = 0;
      c.feeJojung  = 0;
      c.feeSeongsi = 0;
      const dt = getDealTypes(c);
      const hasBooking = dt.some(d => bookingTypes.includes(d));
      const hasSingo   = dt.includes('신고대리');
      if (hasSingo && !hasBooking && c.fee > 0) {
        // 신고대리 전용 거래처: 기존 fee → feeSingo로 이동
        c.feeSingo = c.fee;
        c.fee = 0;
      }
    }
  });
  if (feesMigrated) saveToLS();
}

    G.closureChecklist = JSON.parse(localStorage.getItem('tm_closureChecklist')||'{}');
    G.withholding = JSON.parse(localStorage.getItem('tm_withholding')||'{}');
    G.invoiceHistory = JSON.parse(localStorage.getItem('tm_invoiceHistory')||'[]');
    G.periodNotes = JSON.parse(localStorage.getItem('tm_periodNotes')||'{}');
    G.julgaeLinks = JSON.parse(localStorage.getItem('tm_julgaeLinks')||'{}');
    G.feePayments = JSON.parse(localStorage.getItem('tm_feePayments')||'{}');
    G.filterPresets = JSON.parse(localStorage.getItem('tm_filterPresets')||'[]');
    G.contactLogs = JSON.parse(localStorage.getItem('tm_contactLogs')||'{}');
    G.adHocFees = JSON.parse(localStorage.getItem('tm_adHocFees')||'{}');
    G.income26Unmatched = JSON.parse(localStorage.getItem('tm_income26Unmatched')||'[]');
    const _sjsp = localStorage.getItem('tm_julgaeSelectedPeriods'); if(_sjsp) G.julgaeSelectedPeriods = JSON.parse(_sjsp);
    const _sjsy = localStorage.getItem('tm_julgaeSelectedYears'); if(_sjsy) G.julgaeSelectedYears = JSON.parse(_sjsy);
  }
  // Apply dark mode if saved
  if (localStorage.getItem('tm_darkMode')) { G.darkMode=true; document.body.classList.add('dark-mode'); }
  try { const _up=JSON.parse(localStorage.getItem('tm_uiPrefs')||'{}'); if(_up.julgaeSort)G.julgaeSort=_up.julgaeSort; if(_up.julgaeSortDir)G.julgaeSortDir=_up.julgaeSortDir; } catch(e){}
  try {
    migrateJulgae();
    migrate26IncomeTax();
    if (!localStorage.getItem('tm_contractDateFillV1')) {
      let filled = 0;
      G.clients.forEach(c => { if (!c.contractDate) { c.contractDate = '2020-01-01'; filled++; } });
      if (filled > 0) { saveToLS(); console.log(`수임일자 누락 ${filled}개 업체 → 2020-01-01 적용`); }
      localStorage.setItem('tm_contractDateFillV1', '1');
    }
    computeGrades();
    if (G.settings?.managers) MANAGERS = ['전체', ...G.settings.managers];
    if (G.settings.feeApplied === undefined) G.settings.feeApplied = false;
    if (G.settings.xlsApplied === undefined) G.settings.xlsApplied = false;
    if (G.settings.contractsApplied === undefined) G.settings.contractsApplied = false;
    updateBadge();
  } catch(e) {
    console.error('초기화 오류:', e);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('page-dashboard').style.display = 'block';
    updateSettingsBadge();
    renderDashboard();
    if (G.settings?.autoCreatePeriods) {
      const yr = new Date().getFullYear();
      const yy = String(yr).slice(2);
      const hasThisYear = G.periods.some(p => (p.label||'').startsWith(yy+'년'));
      if (!hasThisYear) autoCreatePeriods(yr);
    }
  }
}

// Feature B: 신고기간별 거래처 특이사항(메모) 관리
// ══════════════════════════════════════════════════════
function openJulgaeNote(pKey, clientId) {
  const c = G.clients.find(x=>x.id===clientId); if(!c) return;
  const cur = julgaeVal(pKey, clientId);
  showModal(`<div style="max-width:420px">
    <div class="modal-header"><h3>📝 특이사항 — ${esc(c.name)}</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="font-size:12px;color:#888;margin-bottom:8px">신고기간 내 특이사항을 기록합니다 (거래처 메모와 별개)</div>
      <textarea id="julgae-note-input" style="width:100%;height:100px;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box">${esc(cur.note||'')}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="saveJulgaeNote('${pKey}',${clientId})" class="btn-primary" style="flex:1;padding:10px">저장</button>
        ${cur.note?`<button onclick="clearJulgaeNote('${pKey}',${clientId})" style="padding:10px 14px;border-radius:8px;border:1px solid #fca5a5;background:#fef2f2;color:#e53935;cursor:pointer;font-family:inherit">삭제</button>`:''}
      </div>
    </div>
  </div>`);
  setTimeout(()=>document.getElementById('julgae-note-input')?.focus(),80);
}
function saveJulgaeNote(pKey, clientId) {
  const txt = document.getElementById('julgae-note-input')?.value?.trim()||'';
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const cur = julgaeVal(pKey, clientId);
  cur.note = txt;
  G.julgae[pKey][clientId] = cur;
  saveToLS(); closeModal(); renderJulgae();
  toast(txt ? '특이사항 저장됨' : '특이사항 삭제됨', 'success');
}
function clearJulgaeNote(pKey, clientId) {
  if (!G.julgae[pKey]) return;
  const cur = julgaeVal(pKey, clientId);
  delete cur.note;
  G.julgae[pKey][clientId] = cur;
  saveToLS(); closeModal(); renderJulgae();
  toast('특이사항 삭제됨', 'success');
}

// Feature C: 수수료 인상 이력 전체 보기
// ══════════════════════════════════════════════════════
function openFeeChangeHistory() {
  const hist = G.feeChangeHistory || {};
  const entries = [];
  Object.entries(hist).forEach(([idStr, logs]) => {
    const c = G.clients.find(x=>x.id===Number(idStr));
    if (!c || !logs.length) return;
    logs.forEach(h => entries.push({...h, clientName:c.name}));
  });
  entries.sort((a,b) => b.date.localeCompare(a.date));
  const rows = entries.length ? entries.map(h=>`
    <div style="padding:8px 12px;border-radius:10px;background:#f9f0ff;border-left:3px solid #9c27b0;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
        <span style="font-weight:700;font-size:13px">${esc(h.clientName)}</span>
        <span style="font-size:11px;color:#aaa">${esc(h.date)}</span>
      </div>
      <div style="font-size:13px;color:#555;margin-top:3px">${(h.from||0).toLocaleString()}원 → <b style="color:#7b1fa2">${(h.to||0).toLocaleString()}원</b></div>
    </div>`).join('')
    : '<div style="color:#aaa;text-align:center;padding:24px">수수료 변경 이력 없음</div>';
  showModal(`<div style="max-width:500px">
    <div class="modal-header"><h3>💴 수수료 인상 이력 (${entries.length}건)</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${rows}</div>
  </div>`);
}

// Feature D: 월정 수수료 일괄 청구서 인쇄
// ══════════════════════════════════════════════════════
function batchPrintFeeInvoices() {
  const ym = G.feesYM || currentYM();
  const clients = G.clients.filter(c =>
    c.status!=='해지'&&c.status!=='폐업'&&c.fee&&
    getDealTypes(c).some(d=>['기장','고문','성실'].includes(d))&&
    (!c.contractDate||c.contractDate.slice(0,7)<=ym)
  );
  if (!clients.length) { toast('인쇄할 거래처가 없습니다','warning'); return; }
  const [yr, mo] = ym.split('-');
  const invoiceHtml = clients.map(c => {
    const items = [];
    if (c.fee) items.push({name:'기장수수료', amount:c.fee});
    if (c.feeSingo) items.push({name:'신고수수료', amount:c.feeSingo});
    if (c.feeJojung) items.push({name:'조정수수료', amount:c.feeJojung});
    if (c.feeSeongsi) items.push({name:'성실신고수수료', amount:c.feeSeongsi});
    const total = items.reduce((a,i)=>a+i.amount,0);
    const rows = items.map(i=>`<tr><td style="padding:6px 8px;border-bottom:1px solid #eee">${i.name}</td><td style="padding:6px 8px;text-align:right;border-bottom:1px solid #eee;font-weight:700">${i.amount.toLocaleString()}원</td></tr>`).join('');
    return `<div style="border:1px solid #ddd;border-radius:8px;padding:20px 24px;margin-bottom:32px;page-break-inside:avoid">
      <h2 style="margin:0 0 4px;font-size:18px">${esc(c.name)}</h2>
      <div style="color:#888;font-size:13px;margin-bottom:16px">${yr}년 ${mo}월 수수료 청구서</div>
      <table style="width:100%;border-collapse:collapse;border-top:2px solid #4f8ef7">${rows}
      <tr style="background:#f5f9ff"><td style="padding:8px;font-weight:800">합계</td><td style="padding:8px;text-align:right;font-weight:800;color:#4f8ef7">${total.toLocaleString()}원</td></tr>
      </table>
    </div>`;
  }).join('');
  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${yr}년 ${mo}월 수수료 청구서 일괄</title>
    <style>body{font-family:inherit;margin:20px}@media print{.no-print{display:none}}</style>
  </head><body><button class="no-print" onclick="window.print()" style="margin-bottom:16px;padding:8px 16px;background:#4f8ef7;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨 인쇄</button>${invoiceHtml}</body></html>`);
  win.document.close();
}

function openContactLog(clientId) {
  const c = G.clients.find(x=>x.id===clientId); if(!c) return;
  const logs = (G.contactLogs||{})[clientId] || [];
  const logHtml = logs.length
    ? [...logs].reverse().map(l=>`<div style="padding:8px 12px;background:#f8f9ff;border-radius:8px;border-left:3px solid #4f8ef7;margin-bottom:6px">
        <div style="font-size:11px;color:#aaa;margin-bottom:2px">${esc(l.date)} · ${esc(l.method||'기타')}</div>
        <div style="font-size:13px">${esc(l.text)}</div>
        <button onclick="deleteContactLog(${clientId},'${l.id}')" style="margin-top:4px;padding:1px 8px;border-radius:5px;border:1px solid #fca5a5;background:#fef2f2;color:#e53935;font-size:10px;cursor:pointer;font-family:inherit">삭제</button>
      </div>`).join('')
    : '<div style="color:#aaa;text-align:center;padding:12px;font-size:12px">연락 이력 없음</div>';
  showModal(`<div style="max-width:420px">
    <div class="modal-header"><h3>📞 연락 이력 — ${esc(c.name)}</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
        <select id="cl-method" style="padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit">
          <option>전화</option><option>문자</option><option>카카오</option><option>방문</option><option>기타</option>
        </select>
        <textarea id="cl-text" placeholder="연락 내용 입력..." style="padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;height:72px"></textarea>
        <button onclick="addContactLog(${clientId})" class="btn-primary" style="padding:8px">기록 추가</button>
      </div>
      <div id="cl-log-list">${logHtml}</div>
    </div>
  </div>`);
  setTimeout(()=>document.getElementById('cl-text')?.focus(),80);
}
function addContactLog(clientId) {
  const method = document.getElementById('cl-method')?.value||'기타';
  const text = document.getElementById('cl-text')?.value?.trim()||'';
  if (!text) return;
  if (!G.contactLogs) G.contactLogs = {};
  if (!G.contactLogs[clientId]) G.contactLogs[clientId] = [];
  G.contactLogs[clientId].push({id:Date.now()+'', date:new Date().toLocaleString('ko-KR'), method, text});
  saveToLS();
  openContactLog(clientId);
  if (G.currentTab==='fees') renderFees();
}
function deleteContactLog(clientId, logId) {
  if (!G.contactLogs?.[clientId]) return;
  G.contactLogs[clientId] = G.contactLogs[clientId].filter(l=>l.id!==logId);
  saveToLS();
  openContactLog(clientId);
  if (G.currentTab==='fees') renderFees();
}

// Feature F: 거래처 메모 전체 검색

function openNotesSearch() {
  showModal(`<div style="max-width:520px">
    <div class="modal-header"><h3>🔍 메모 전체 검색</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input id="notes-search-input" type="text" placeholder="메모 내용 검색..." style="width:100%;padding:10px 14px;border:1.5px solid #4f8ef7;border-radius:10px;font-size:14px;font-family:inherit;box-sizing:border-box;margin-bottom:12px" oninput="renderNotesSearch(this.value)">
      <div id="notes-search-results"></div>
    </div>
  </div>`);
  setTimeout(()=>{document.getElementById('notes-search-input')?.focus(); renderNotesSearch('');},80);
}
function renderNotesSearch(q) {
  const res = document.getElementById('notes-search-results'); if(!res) return;
  const lq = q.toLowerCase();
  const matches = [];
  Object.entries(G.clientNotes||{}).forEach(([idStr, notes])=>{
    const c = G.clients.find(x=>x.id===Number(idStr)); if(!c) return;
    notes.forEach(n=>{
      if (!lq || n.text.toLowerCase().includes(lq) || c.name.toLowerCase().includes(lq))
        matches.push({c, n});
    });
  });
  matches.sort((a,b)=>b.n.date.localeCompare(a.n.date));
  if (!matches.length) { res.innerHTML='<div style="color:#aaa;text-align:center;padding:20px">검색 결과 없음</div>'; return; }
  res.innerHTML = matches.slice(0,50).map(({c,n})=>`
    <div onclick="closeModal();openClientNotes(${c.id})" style="padding:10px 12px;border-radius:10px;border:1px solid #e8eaf6;cursor:pointer;margin-bottom:6px;background:#fafbff" onmouseover="this.style.background='#e8f0fe'" onmouseout="this.style.background='#fafbff'">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-weight:700;font-size:13px">${esc(c.name)}</span>
        <span style="font-size:10px;color:#aaa">${esc(n.date)}</span>
      </div>
      <div style="font-size:12px;color:#555;line-height:1.4;white-space:pre-wrap">${esc(n.text).slice(0,120)}${n.text.length>120?'…':''}</div>
    </div>`).join('');
}

// ── 리스트 가장자리 스크롤 시 페이지 이동 버튼 ──────────────────────────
(function() {
  function getOrCreateBtn(id, side) {
    let btn = document.getElementById(id);
    if (!btn) {
      btn = document.createElement('button');
      btn.id = id;
      const r = side === 'left' ? '0 14px 14px 0' : '14px 0 0 14px';
      btn.style.cssText = `position:fixed;top:50%;${side}:0;transform:translateY(-50%);z-index:9999;background:rgba(30,30,60,.82);color:#fff;border:none;border-radius:${r};padding:22px 10px;font-size:22px;font-weight:900;cursor:pointer;display:none;box-shadow:0 2px 12px rgba(0,0,0,.4);touch-action:manipulation;-webkit-tap-highlight-color:transparent;line-height:1`;
      document.body.appendChild(btn);
    }
    return btn;
  }

  function updateNav() {
    const wrap = document.querySelector('.tbl-wrap');
    const isClients = G.currentTab === 'clients';
    const totalPages = isClients ? (Math.ceil(filteredClients().length / 50) || 1) : 1;
    const atLeft  = !wrap || wrap.scrollLeft <= 4;
    const atRight = !wrap || wrap.scrollLeft >= wrap.scrollWidth - wrap.clientWidth - 4;

    const lb = getOrCreateBtn('_prev-page-btn', 'left');
    lb.textContent = '◀';
    lb.style.display = (isClients && atLeft && G.clientPage > 0) ? '' : 'none';
    lb.onclick = () => { G.clientPage--; renderClients(); window.scrollTo({top:0,behavior:'instant'}); };

    const rb = getOrCreateBtn('_next-page-btn', 'right');
    rb.textContent = '▶';
    rb.style.display = (isClients && atRight && G.clientPage < totalPages - 1) ? '' : 'none';
    rb.onclick = () => { G.clientPage++; renderClients(); window.scrollTo({top:0,behavior:'instant'}); };
  }

  // 스크롤 이벤트는 버블되지 않으므로 capture 단계에서 감지
  document.addEventListener('scroll', e => {
    if (e.target && e.target.classList && e.target.classList.contains('tbl-wrap')) {
      updateNav();
    }
  }, true);

  // renderClients 후 DOM 재구성 시 버튼 상태 갱신
  const _rc = renderClients;
  renderClients = function() { _rc.apply(this, arguments); requestAnimationFrame(updateNav); };
})();

    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
