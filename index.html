window.saveForm = function(id) {
  const d = window._formData;
  if (!d.name?.trim()) { toast('거래처명은 필수입니다','warning'); return; }
  if (!d.rep?.trim()) { toast('대표자명은 필수입니다','warning'); return; }

  // 상호+대표자 중복 검사
  const nameDup = G.clients.find(c =>
    c.id !== id &&
    c.name.trim() === d.name.trim() &&
    c.rep.trim() === d.rep.trim()
  );
  if (nameDup) {
    if (!confirm(`동일한 상호(${d.name})와 대표자명(${d.rep})의 거래처가 이미 있습니다.\n중복 업체입니까?\n\n[확인] 계속 추가  [취소] 돌아가기`)) return;
  }

  // 사업자번호 중복 검사
  const bn = (d.bizNo||'').replace(/[-\s]/g,'');
  if (bn) {
    const bizDup = G.clients.find(c => c.id !== id && c.bizNo && c.bizNo.replace(/[-\s]/g,'') === bn);
    if (bizDup) {
      if (!confirm(`사업자번호(${d.bizNo})가 이미 등록된 거래처(${bizDup.name})와 중복됩니다.\n부가세는 사업장별로 신고하므로 결재리스트에서 중복될 수 있습니다.\n\n[확인] 계속 추가  [취소] 돌아가기`)) return;
    }
  }

  // 주민번호/법인등록번호 중복 검사
  const jn = (d.jumin||'').replace(/[-\s]/g,'');
  if (jn) {
    const juminDup = G.clients.find(c => c.id !== id && c.jumin && c.jumin.replace(/[-\s]/g,'') === jn);
    if (juminDup) {
      const lbl = d.taxType === '법인' ? '법인등록번호' : '주민번호';
      const warn = d.taxType === '법인'
        ? '법인세는 법인별로 신고하므로 중복 신고가 발생할 수 있습니다.'
        : '소득세는 개인별로 신고하므로 중복 신고가 발생할 수 있습니다.';
      if (!confirm(`${lbl}가 이미 등록된 거래처(${juminDup.name})와 중복됩니다.\n${warn}\n\n[확인] 계속 추가  [취소] 돌아가기`)) return;
    }
  }

  // Ensure arrays are set for multi-value fields
  if (!d.dealTypes || !d.dealTypes.length) d.dealTypes = [d.dealType || '기장'];
  if (!d.managers) d.managers = [];
  d.dealType = d.dealTypes[0];
  d.manager = d.managers[0] || '';
  // If user explicitly set a group, clear solo flag
  if (d.relatedGroup && d.relatedGroup.trim()) d.soloGroup = false;

  if (id === null) {
    const newId = Date.now();
    G.clients.push({...d, id: newId});
    if (window._julgaeAddToPeriod) {
      const addPeriod = G.periods.find(p => p.id === window._julgaeAddToPeriod);
      if (addPeriod && addPeriod.enrolled && addPeriod.enrolled.length > 0) {
        addPeriod.enrolled.push(newId);
      }
      window._julgaeAddToPeriod = null;
    }
  } else {
    const idx = G.clients.findIndex(c=>c.id===id);
    if (idx>=0) {
      // Detect manager change
      const oldManagers = getManagers(G.clients[idx]);
      const newManagers = d.managers || [];
      const oldStr = [...oldManagers].sort().join(',');
      const newStr = [...newManagers].sort().join(',');
      if (oldStr !== newStr && (oldStr || newStr)) {
        if (!G.managerHistory) G.managerHistory = {};
        if (!G.managerHistory[id]) G.managerHistory[id] = [];
        G.managerHistory[id].push({ date: new Date().toLocaleString('ko-KR'), from: oldStr, to: newStr });
      }
      // Detect fee change
      const oldFee = G.clients[idx].fee;
      const newFee = d.fee;
      if (oldFee !== newFee) {
        if (!G.feeChangeHistory) G.feeChangeHistory = {};
        if (!G.feeChangeHistory[id]) G.feeChangeHistory[id] = [];
        G.feeChangeHistory[id].push({ date: new Date().toLocaleString('ko-KR'), from: oldFee, to: newFee });
        // feeChanges: 월별 기장료 이력 (현재 월부터 적용)
        if (!G.clients[idx].feeChanges) G.clients[idx].feeChanges = [];
        G.clients[idx].feeChanges.push({ from: currentYM(), amount: newFee });
      }
      G.clients[idx] = {...G.clients[idx],...d};
    }
  }
  // Save client tags
  if (window._formTags) {
    if (!G.clientTags) G.clientTags = {};
    const savedId = id !== null ? id : G.clients[G.clients.length-1]?.id;
    if (savedId) G.clientTags[savedId] = window._formTags;
  }
  saveToLS();
  window._formDataSnapshot = undefined;
  closeModal();
  if (G.currentTab==='clients') renderClients();
  else if (G.currentTab==='dashboard') renderDashboard();
  else if (G.currentTab==='closure') renderClosure();
  else if (G.currentTab==='julgae') renderJulgae();
};

function renderSchedule() {
  let active = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업');
  // 검색 필터 적용
  const schSrch = (G.scheduleSearch||'').trim();
  const schMgr  = G.scheduleManagerFilter||[];
  if (schSrch) active = active.filter(c=>c.name.includes(schSrch)||(c.rep||'').includes(schSrch));
  if (schMgr.length>0) active = active.filter(c=>{const ms=getManagers(c);return schMgr.some(m=>m==='(없음)'?ms.length===0:ms.includes(m));});
  const today = new Date();
  const nowM = today.getMonth()+1;
  const nowD = today.getDate();
  const yr = today.getFullYear();

  const vatAllC  = active.filter(c=>c.vatType==='일반'||c.vatType==='간이'||c.vatType==='간세');
  const vatGC    = active.filter(c=>c.vatType==='일반');
  const vatSC    = active.filter(c=>c.vatType==='간이'||c.vatType==='간세');
  const exemptC  = active.filter(c=>c.vatType==='면세');
  const incomeC  = active.filter(c=>c.taxType==='개인');
  const seongsiC = active.filter(c=>getDealTypes(c).includes('성실'));
  const corpC    = active.filter(c=>c.taxType==='법인');
  const yearendC = active.filter(c=>(c.contracts||[]).includes('연말정산'));
  const withholdC= active.filter(c=>(c.contracts||[]).includes('원천세'));

        exempt=exemptC.length, income=incomeC.length, seongsi=seongsiC.length,
        corp=corpC.length, yearend=yearendC.length, withhold=withholdC.length;

  // deadline: [month, day]
  function dday(m, d) {

      yearend>0&&{l:'연말정산',      t:'공통',   n:yearend,ck:'yearend',c:'purple', d:'2월말',     dd:null,        hint:'근로소득'},
      withhold>0&&{l:'원천세 (12월분)',t:'공통', n:withhold,ck:'withhold',c:'gray', d:'1월 10일',  dd:dday(1,10),  hint:''},
    ],
    2:[
      exempt>0&&{l:'사업장현황 신고', t:'면세', n:exempt, ck:'exempt', c:'gray', d:'2월 10일', dd:dday(2,10), hint:'면세사업자'},
    ],
    3:[
      corp>0&&{l:'법인세 신고',        t:'법인세', n:corp,    ck:'corp',     c:'blue', d:'3월 31일', dd:dday(3,31), hint:'12월 결산법인'},
      withhold>0&&{l:'원천세 반기납부',t:'공통',   n:withhold,ck:'withhold',  c:'gray', d:'3월 10일', dd:dday(3,10), hint:'반기납부 선택'},
    ],
    4:[
      vatG>0&&{l:'부가세 예정신고 (1기)', t:'부가세', n:vatG, ck:'vatG', c:'blue', d:'4월 25일', dd:dday(4,25), hint:'1월~3월분'},

function registerToPeriod(label, type) {
  const yr = new Date().getFullYear();
  const fullLabel = String(yr).slice(2) + '년 ' + label;
  const tpl = PERIOD_TEMPLATES.find(t => t.label === label);
  const existing = G.periods.find(p => p.label === fullLabel);
  if (existing) {
    if (!confirm(`"${fullLabel}" 리스트가 이미 있습니다.\n해당 리스트로 이동할까요?\n(새로 추가하려면 취소 후 신고 및 결재에서 직접 추가하세요)`)) return;
    G.julgaePeriodIdx = G.periods.indexOf(existing);
    switchTab('julgae');
    saveToLS();
    return;
  }
  if (!confirm(`"${fullLabel}"을 신고 및 결재 리스트에 추가할까요?`)) return;
  const id = (tpl ? tpl.tpl : 'custom') + '_' + yr + '_' + Date.now();
  const reportType = tpl ? tpl.reportType : undefined;
  const targetType = tpl ? tpl.targetType : '전체';
  G.periods.push({ id, label: fullLabel, type, targetType, reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  switchTab('julgae');
}

function openScheduleClientList(ck, label) {
  const allClients = (window._schedClientMap||{})[ck]||[];
  window._sclSearch = '';
  function doRender() {
    const s = (window._sclSearch||'').trim();
    const filtered = s ? allClients.filter(c=>c.name.includes(s)||(c.rep||'').includes(s)) : allClients;
    const body = document.getElementById('scl-modal-body');
    if (!body) return;
    body.innerHTML = `
      <div style="position:relative;margin-bottom:10px">
        <input id="scl-inp" type="text" value="${esc(s)}" placeholder="거래처명 / 대표자 검색"
          oninput="window._sclSearch=this.value;window._sclRender&&window._sclRender()"
          style="width:100%;padding:8px 32px 8px 12px;border:1.5px solid ${s?'#4f8ef7':'#e0e0e0'};border-radius:9px;font-size:13px;font-family:inherit;box-sizing:border-box;outline:none">
        ${s?`<button onclick="window._sclSearch='';window._sclRender&&window._sclRender()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#bbb;cursor:pointer;line-height:1">×</button>`:''}
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:8px">총 ${filtered.length}개</div>
      <div style="max-height:52vh;overflow-y:auto">
        ${filtered.length===0?'<div style="text-align:center;color:#aaa;padding:24px;font-size:13px">검색 결과 없음</div>':
          filtered.map(c=>`<div style="padding:9px 0;border-bottom:1px solid #f5f5f5">
            <div style="font-weight:700;font-size:14px">${esc(c.name)}</div>
            <div style="font-size:12px;color:#888">${esc(c.rep||'-')} · ${esc(c.taxType||'-')} · ${esc(getManagers(c).join(', ')||'(없음)')}</div>

        }
      </div>`;
    if (s) { const inp = document.getElementById('scl-inp'); if(inp){inp.focus();inp.setSelectionRange(s.length,s.length);} }

  window._sclRender = doRender;
  showModal(`<div style="max-width:480px">

  </div>`);
  doRender();
}

function prevYearPeriods(period) {
  if (!period || !period.reportType) return [];
  const m = (period.label||'').match(/^(\d{2})년/);
  if (!m) return [];
  const yr = 2000 + Number(m[1]);
  return G.periods.filter(p => {
    if (p.reportType !== period.reportType) return false;
    const m2 = (p.label||'').match(/^(\d{2})년/);
    return m2 && (2000 + Number(m2[1])) === yr - 1;
  });
}

window._julgaeYearsOpen = window._julgaeYearsOpen || {};
function toggleJulgaeYear(yr) {
  window._julgaeYearsOpen[yr] = !window._julgaeYearsOpen[yr];
  renderJulgae();
}

function renderJulgae() {
  const periods = G.periods;
  const idx = Math.min(G.julgaePeriodIdx, Math.max(0, periods.length - 1));
  const period = periods[idx];
  const q = G.julgaeSearch.toLowerCase();
  const mf = G.julgaeManagers || [];
  const pKey = period ? period.id : null;

  let baseClients = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  const hasEnroll = period && period.enrolled && period.enrolled.length > 0;
  if (hasEnroll) {
    baseClients = baseClients.filter(c => period.enrolled.includes(c.id));
  } else {
    baseClients = applyReportFilter(baseClients, period);
  }

  let clients = baseClients;
  if (mf.length > 0) {
    const hasNone = mf.includes('(없음)');
    clients = clients.filter(c => (hasNone && getManagers(c).length===0) || getManagers(c).some(m=>mf.includes(m)));
  }
  if (q) clients = clients.filter(c => c.name.toLowerCase().includes(q));
  const rq = G.julgaeRepSearch.toLowerCase();
  if (rq) clients = clients.filter(c => (c.rep||'').toLowerCase().includes(rq));

  const pKey2 = pKey || '';
  const ff = G.julgaeFeeFilter;
  if (ff === '수금') clients = clients.filter(c => julgaeVal(pKey2, c.id).s);
  else if (ff === '미수금') clients = clients.filter(c => { const v=julgaeVal(pKey2,c.id); return v.fee>0 && !v.s; });
  if (G.julgaeDataFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).d);
  else if (G.julgaeDataFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).d);
  if (G.julgaeBookFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).b);
  else if (G.julgaeBookFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).b);
  if (G.julgaeDoneFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).a);
  else if (G.julgaeDoneFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).a);
  if (G.julgaeConsulFilter==='완료') clients = clients.filter(c=>julgaeVal(pKey2,c.id).c);
  else if (G.julgaeConsulFilter==='미완료') clients = clients.filter(c=>!julgaeVal(pKey2,c.id).c);

  const dataCount     = clients.filter(c => julgaeVal(pKey2, c.id).d).length;
  const bookCount     = clients.filter(c => julgaeVal(pKey2, c.id).b).length;
  const doneCount     = clients.filter(c => julgaeVal(pKey2, c.id).a).length;
  const collectCount  = clients.filter(c => julgaeVal(pKey2, c.id).s).length;
  const total = clients.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;

  const managerSet = ['전체', ...new Set(baseClients.flatMap(c=>getManagers(c)))];
  if (baseClients.some(c=>getManagers(c).length===0)) managerSet.push('(없음)');

  const reportLabel = {vat:'부가세(일반·간이)',vat_hak_1:'부가세 확정1기(일반)',vat_hak_2:'부가세 확정2기(일반+간이)',vat_yej:'부가세 예정(법인 일반)',corp:'법인세(법인)',income:'종소세(개인,성실제외)',seongsi:'성실신고(성실)',sajup:'사업장현황(면세)',undefined:'전체'};

  // 전년도 동일 신고 데이터 (3개년: 전년·전전년)
  const _yrMatch = (period?.label||'').match(/^(\d{2})년/);
  const _baseYr = _yrMatch ? 2000 + Number(_yrMatch[1]) : 0;
  const prevPeriods1 = period ? prevYearPeriods(period) : [];
  const prevPeriods2 = (_baseYr > 0 && period) ? G.periods.filter(p => {
    if (p.reportType !== period.reportType) return false;
    const m2 = (p.label||'').match(/^(\d{2})년/);
    return m2 && (2000 + Number(m2[1])) === _baseYr - 2;
  }) : [];
  const prevPeriods = [...prevPeriods1, ...prevPeriods2];
  const prevMap1 = {}, prevMap2 = {};
  prevPeriods1.forEach(pp => {
    const ppData = G.julgae[pp.id] || {};
    Object.entries(ppData).forEach(([cidStr, v]) => {
      const cid = Number(cidStr);
      if (!prevMap1[cid]) prevMap1[cid] = {revenue:0, salesAmount:0, fee:0};
      prevMap1[cid].revenue     += (v&&v.revenue)||0;
      prevMap1[cid].salesAmount += (v&&v.salesAmount)||0;
      prevMap1[cid].fee         += (v&&v.fee)||0;
    });
  });
  prevPeriods2.forEach(pp => {
    const ppData = G.julgae[pp.id] || {};
    Object.entries(ppData).forEach(([cidStr, v]) => {
      const cid = Number(cidStr);
      if (!prevMap2[cid]) prevMap2[cid] = {revenue:0, salesAmount:0, fee:0};
      prevMap2[cid].revenue     += (v&&v.revenue)||0;
      prevMap2[cid].salesAmount += (v&&v.salesAmount)||0;
      prevMap2[cid].fee         += (v&&v.fee)||0;
    });
  });

  const rt = period ? (period.reportType||'') : '';
  const isIncomeType = ['corp','income','seongsi'].includes(rt);
  const isVatType = ['vat','vat_hak_1','vat_hak_2','vat_yej'].includes(rt);
  const isSajupType = rt === 'sajup';
  const isSeongsiType = rt === 'seongsi';
  const hc = G.hiddenCols || {};
  const jHideable = ['j_rep','j_manager','j_data','j_book','j_done','j_consul','j_fee','j_collect','j_link'];
  const jTypeHideable = isIncomeType ? ['j_col_revenue','j_col_income','j_col_margin','j_col_taxbase','j_col_taxamt','j_col_paytax','j_col_resident','j_col_totalsum','j_col_prevrevenue','j_col_paid','j_col_unpaid','j_col_fee25','j_col_fee24','j_col_fee23']
                      : isVatType    ? ['j_col_revenue','j_col_purchase','j_col_vat']
                      : isSajupType  ? ['j_col_revenue','j_col_purchase']
                      :                ['j_col_revenue','j_col_income','j_col_taxbase'];
  const jSeongsiExtra = isSeongsiType ? ['j_feess'] : [];
  const totalCols = (isSeongsiType ? 23 : isIncomeType ? 22 : isVatType ? 11 : isSajupType ? 10 : 11)
    - jHideable.filter(k=>hc[k]).length
    - jTypeHideable.filter(k=>hc[k]).length
    - jSeongsiExtra.filter(k=>hc[k]).length;
  const feeFieldKey = REPORT_FEE_FIELD[rt] || 'fee';
  const _jFeeSum    = c => { const v=julgaeVal(pKey2,c.id); return (v.fee||0)+(isSeongsiType?(v.feeSeongsi||0):0); };
  const feeTotal    = clients.reduce((a,c) => a + _jFeeSum(c), 0);
  const feeCollected= clients.filter(c => julgaeVal(pKey2,c.id).s).reduce((a,c) => a + _jFeeSum(c), 0);
  // 정렬
  const _jSort = G.julgaeSort || 'name';
  const _jDir  = G.julgaeSortDir === 'desc' ? -1 : 1;
  const _taxOrder = {'법인':0, '개인':1};
  const _statusScore = c => { const v=julgaeVal(pKey2,c.id); return (v.s?8:0)+(v.a?4:0)+(v.b?2:0)+(v.d?1:0); };
  const _contractPrio = {'기장_일반':0,'기장_간이':1,'기장_면세':2,'신고대리_부가세':10,'신고대리_면세':11,'종소세신고대리':12,'법인세':20,'세무조정':21,'연말정산':30,'원천세':31};
  const _contractScore = c => { const cs=c.contracts||[]; return cs.length?Math.min(...cs.map(k=>_contractPrio[k]??50)):999; };
  clients = [...clients].sort((a, b) => {
    let d = 0;
    if (_jSort === 'taxType')       d = ((_taxOrder[a.taxType]??2) - (_taxOrder[b.taxType]??2));
    else if (_jSort === 'manager')  d = (getManagers(a)[0]||'힙').localeCompare(getManagers(b)[0]||'힙','ko');
    else if (_jSort === 'contract') d = _contractScore(a) - _contractScore(b);
    else if (_jSort === 'status')   d = _statusScore(a) - _statusScore(b);
    else if (_jSort === 'fee')      d = _jFeeSum(b) - _jFeeSum(a);
    else if (_jSort === 'contractDate') d = (a.contractDate||'').localeCompare(b.contractDate||'');
    else d = a.name.localeCompare(b.name, 'ko');
    return d !== 0 ? _jDir * d : a.name.localeCompare(b.name, 'ko');
  });

  // 구분선 삽입 헬퍼 (taxType·manager 정렬 시)
  const _needsSep = _jSort === 'taxType' || _jSort === 'manager';
  const _getSepLabel = c => _jSort === 'taxType'
    ? (c.taxType === '법인' ? '법인' : '개인')
    : (getManagers(c)[0] || '담당자 미지정');
  let _sepPrev = null;

  const niInput = (cid, field, val, extraStyle='') => {
    const disp = (val||val===0) && val!=='' ? Number(val).toLocaleString() : '';
    return `<input type="text" inputmode="numeric" class="julgae-num-input" value="${disp}" placeholder="0"
      onfocus="this.value=this.value.replace(/,/g,'')"
      onblur="const n=Number(this.value.replace(/,/g,''));if(!isNaN(n)&&this.value!=='')this.value=n.toLocaleString();"
      onchange="updateJulgaeNum('${pKey2}',${cid},'${field}',this.value.replace(/,/g,''))"
      style="width:100%;text-align:right;border:1px solid #e0e0e0;border-radius:5px;padding:2px 3px;font-size:10px;font-family:inherit;${extraStyle}">`;
  };

  const jChips = _hcChips([
    ['j_rep','대표자'],['j_manager','담당자'],['j_data','자료'],['j_book','기장'],['j_done','결재'],
    ['j_col_revenue', isVatType?'매출액':'매출액'],
    ['j_col_income','소득금액'],['j_col_margin','소득율'],['j_col_taxbase','과세표준'],
    ['j_col_taxamt','총부담세액'],['j_col_paytax','납부세액'],['j_col_resident','주민세'],
    ['j_col_totalsum','합계'],['j_col_prevrevenue','직전매출'],
    ['j_col_purchase', isVatType?'매입액':'필요경비'],['j_col_vat','부가세'],
    ['j_feess','성실신고료'],
    ['j_fee', isIncomeType?'조정료':'수수료청구'],['j_col_paid','입금'],['j_col_unpaid','미수'],
    ['j_col_fee25','25년'],['j_col_fee24','24년'],['j_col_fee23','23년'],
    ['j_collect','수금'],['j_link','자료링크'],
  ]);

  // 주민번호/법인등록번호 기준 그룹화 (소득세·법인세·성실·사업장 유형)
  const _jGrpNorm = c => (c.jumin||'').replace(/[-\s]/g,'');
  const renderItems = [];
  const _pushClient = (c, opts={}) => {
    if (_needsSep) {
      const sk = _getSepLabel(c);
      if (sk !== _sepPrev) { renderItems.push({isSeparator:true, label:sk}); _sepPrev = sk; }
    }
    renderItems.push({c, isGroupHeader:false, isGroupChild:false, ...opts});
  };
  if (isIncomeType || isSajupType) {
    const jMap = {};
    clients.forEach(c => { const k=_jGrpNorm(c); if(k)(jMap[k]=jMap[k]||[]).push(c); });
    const seenGrp = new Set();
    clients.forEach(c => {
      const k = _jGrpNorm(c);
      if (!k || !jMap[k] || jMap[k].length <= 1) {
        _pushClient(c);
      } else if (!seenGrp.has(k)) {
        seenGrp.add(k);
        const gc = [...jMap[k]].sort((a,b) => {
          if (a.groupMain && !b.groupMain) return -1;
          if (!a.groupMain && b.groupMain) return 1;
          const ar = dealSortRankForClient(a), br = dealSortRankForClient(b);
          if (ar !== br) return ar - br;
          const csk2 = x => x.contractDate || 'ZZZZ-ZZ-ZZ';
          return csk2(a).localeCompare(csk2(b)) || a.name.localeCompare(b.name, 'ko');
        });
        const expanded = !!(G.julgaeExpandedGroups||{})[k];
        if (_needsSep) { const sk=_getSepLabel(gc[0]); if(sk!==_sepPrev){renderItems.push({isSeparator:true,label:sk});_sepPrev=sk;} }
        renderItems.push({c:gc[0], isGroupHeader:true, groupKey:k, groupClients:gc, expanded});
        if (expanded) gc.slice(1).forEach(m => renderItems.push({c:m, isGroupHeader:false, isGroupChild:true, groupKey:k}));
      }
    });
  } else {
    clients.forEach(c => _pushClient(c));
  }

  let _rowN = 0;
  document.getElementById('page-julgae').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:20px;font-weight:800">신고 및 결재</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-sm" style="background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80" onclick="openDataRequestSMS()">📱 자료요청 SMS</button>
      <button class="btn-sm" style="background:#e8f5e9;color:#1b5e20;border:1.5px solid #81c784" onclick="exportJulgaeToExcel()">📊 Excel 내보내기</button>
      <button class="btn-primary btn-sm" onclick="openAddPeriod()" style="padding:8px 14px">+ 신고리스트 추가</button>
    </div>
  </div>

  ${periods.length === 0 ? `<div class="card" style="text-align:center;padding:40px;color:#aaa">
    신고리스트가 없습니다. <b>+ 신고리스트 추가</b> 버튼을 눌러 시작하세요.</div>` : `

  ${(()=>{
    // Build year map
    const byYear = {}; const yearOrder = [];
    periods.forEach(p => {
      const m = p.label.match(/^(\d{2})년/);
      const yr = m ? (2000+Number(m[1])) : 'other';
      if (!byYear[yr]) { byYear[yr]=[]; yearOrder.push(yr); }
      byYear[yr].push(p);
    });

    // Init selected years: default to current year
    if (!G.julgaeSelectedYears) {
      const curYr = new Date().getFullYear();
      G.julgaeSelectedYears = yearOrder.includes(curYr) ? [curYr] : yearOrder.slice(-1);
    }

    // Init selected periods on first load
    if (!G.julgaeSelectedPeriods) {
      const curYr = new Date().getFullYear();
      const byDday = periods.filter(p=>{ const d=julgaeDDay(p); return d&&d.label.startsWith('D-')&&parseInt(d.label.slice(2))<=30; });
      G.julgaeSelectedPeriods = byDday.length
        ? byDday.map(p=>p.id)
        : (byYear[curYr]||[]).map(p=>p.id);

          }

function julgaeDDay(p) {
  const tpl = PERIOD_TEMPLATES.find(t => t.tpl === p.reportType || t.reportType === p.reportType);
  if (!tpl || !tpl.deadline) return null;
  const m = tpl.deadline.match(/(\d+)월\s*(\d+)일/);
  if (!m) return null;
  const today5 = new Date(); today5.setHours(0,0,0,0);
  const yr = today5.getFullYear();
  let dl = new Date(yr, Number(m[1])-1, Number(m[2]));
  if (dl < today5) dl = new Date(yr+1, Number(m[1])-1, Number(m[2]));
  const diff = Math.ceil((dl - today5) / 86400000);
  if (diff <= 0) return {label:'오늘 마감', color:'#c62828'};
  if (diff <= 7)  return {label:`D-${diff}`, color:'#e53935'};
  if (diff <= 14) return {label:`D-${diff}`, color:'#e65100'};
  return {label:`D-${diff}`, color:'#aaa'};
}
function _jDdHtml(p) {
  const d = julgaeDDay(p); if(!d) return '';
  return `<span style="font-size:10px;background:${d.color};color:#fff;border-radius:6px;padding:1px 6px;margin-left:4px">${d.label}</span>`;
}

function bulkJulgae(pKey, val) {
  if (!G.julgae[pKey]) G.julgae[pKey] = {};
  const mf = G.julgaeManagers || [];
  let clients = G.clients.filter(c => c.status !== '해지' && c.status !== '폐업');
  if (mf.length > 0) {
    const hasNone = mf.includes('(없음)');
    clients = clients.filter(c => (hasNone && getManagers(c).length===0) || getManagers(c).some(m=>mf.includes(m)));
  }
  clients.forEach(c => {
    const cur = julgaeVal(pKey, c.id);
    G.julgae[pKey][c.id] = {...cur, d:val, b:val, a:val};
  });
  saveToLS();
  renderJulgae();
}

function applyEnrollFilters() {
  const q = (document.getElementById('enroll_search')?.value||'').toLowerCase();
  const {dealTypes,taxTypes,vatTypes} = window._enrollFilters||{dealTypes:[],taxTypes:[],vatTypes:[]};
  document.querySelectorAll('#enroll_list label[data-cid]').forEach(el => {
    const elDeals = (el.dataset.deal||'').split(',').filter(Boolean);
    const matchQ = !q || el.textContent.toLowerCase().includes(q);
    const matchDeal = dealTypes.length===0 || elDeals.some(d=>dealTypes.includes(d));
    const matchTax  = taxTypes.length===0  || taxTypes.includes(el.dataset.tax||'');
    const matchVat  = vatTypes.length===0  || vatTypes.includes(el.dataset.vat||'');
    el.style.display = (matchQ&&matchDeal&&matchTax&&matchVat)?'':'none';
  });
  document.querySelectorAll('#enroll_list [data-group]').forEach(grp => {
    const hasVisible = [...grp.querySelectorAll('label[data-cid]')].some(el=>el.style.display!=='none');
    grp.style.display = hasVisible?'':'none';
  });
}


function enrollAll(val) {
  document.querySelectorAll('#enroll_list .enroll-chk').forEach(chk => {
    const label = chk.closest('label');
    if (!label || label.style.display === 'none') return;
    chk.checked = val;
  });
  updateEnrollCount();
}

function enrollGroup(btn, manager, val) {
  const group = btn.closest('div[style*="margin-bottom:12px"]');
  if (!group) return;
  group.querySelectorAll('.enroll-chk').forEach(chk => chk.checked = val);
  updateEnrollCount();
}

function updateEnrollCount() {
  const checked = document.querySelectorAll('#enroll_list .enroll-chk:checked').length;
  const total = document.querySelectorAll('#enroll_list .enroll-chk').length;
  const el = document.getElementById('enroll_count');
  if (el) el.textContent = checked === total ? '(전체 포함)' : checked + '개 선택됨';
}

function saveEnrollment(pKey) {
  const idx = G.periods.findIndex(p => p.id === pKey);
  if (idx < 0) return;
  const period = G.periods[idx];
  const all = document.querySelectorAll('#enroll_list .enroll-chk');
  const total = all.length;
  let checked = [...all].filter(c => c.checked).map(c => Number(c.dataset.id));

  const enrolledClients = checked.map(cid => G.clients.find(c => c.id === cid)).filter(Boolean);

  // 부가세 신고: 사업자번호 중복 감지
  const isVat = period.reportType === 'vat' || period.type === '부가세';
  const isIncome = ['income','seongsi','sajup'].includes(period.reportType) || period.type === '소득세';

  if (isVat) {
    const bizGroups = {};
    enrolledClients.forEach(c => {
      const key = (c.bizNo||'').replace(/[-\s]/g,'');
      if (!key) return;
      if (!bizGroups[key]) bizGroups[key] = [];
      bizGroups[key].push(c);
    });
    const dups = Object.values(bizGroups).filter(g => g.length > 1);
    if (dups.length > 0) {
      const dupMsg = dups.map(g => `  · ${g.map(c=>c.name).join(', ')} (사업자번호: ${g[0].bizNo})`).join('\n');
      if (confirm(`부가세는 사업장별로 신고합니다. 동일 사업자번호 중복이 있습니다:\n${dupMsg}\n\n[확인] 각 사업자번호 중 첫 번째만 남기고 제거  [취소] 그대로 유지`)) {
        const seen = new Set();
        const toKeep = new Set();
        enrolledClients.forEach(c => {
          const key = (c.bizNo||'').replace(/[-\s]/g,'');
          if (!key || !seen.has(key)) { toKeep.add(c.id); if (key) seen.add(key); }
        });
        checked = checked.filter(id => toKeep.has(id));
      }
    }
  }

  // 주민번호/법인등록번호 중복은 renderJulgae에서 자동 그룹화로 처리됨

  // 전체 선택 시 enrolled를 비워서 "자동 분류" 상태로 복귀
  G.periods[idx].enrolled = checked.length === total ? [] : checked;
  saveToLS();
  closeModal();
  renderJulgae();
}

function currentYM() {
  const n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0');
}

// 특정 월에 적용되는 기장료 반환 (feeChanges 이력 참조)
function getFeeForYM(c, ym) {
  if (!c.feeChanges || !c.feeChanges.length) return c.fee || 0;
  const sorted = [...c.feeChanges].sort((a,b)=>b.from.localeCompare(a.from));
  const applicable = sorted.find(ch => ch.from <= ym);
  return applicable ? applicable.amount : (c.feeChanges[0]?.amount || c.fee || 0);
}

function ymLabel(ym) {
  const [y, m] = ym.split('-');
  return y + '년 ' + Number(m) + '월';
}

function clientMonths(c) {
  if (!c.contractDate) return [];
  const start = new Date(c.contractDate);
  if (isNaN(start)) return [];
  const now = new Date();
  const months = [];
  let d = new Date(start.getFullYear(), start.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth(), 1);
  while (d <= end) {
    months.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
    d.setMonth(d.getMonth()+1);
  }
  return months;
}

function toggleMonthlyFee(clientId, ym) {
  if (!G.monthlyFees[clientId]) G.monthlyFees[clientId] = {};
  const current = G.monthlyFees[clientId][ym];
  if (current) {
    G.monthlyFees[clientId][ym] = false;
    if (G.feePayments?.[clientId]) delete G.feePayments[clientId][ym];
    if (G.feeHistory?.[clientId]) delete G.feeHistory[clientId][ym];
  } else {
    const c = G.clients.find(x => x.id === clientId);
    const feeAmt = getFeeForYM(c, ym);
    G.monthlyFees[clientId][ym] = true;
    if (!G.feeHistory) G.feeHistory = {};
    if (!G.feeHistory[clientId]) G.feeHistory[clientId] = {};
    G.feeHistory[clientId][ym] = { date: new Date().toLocaleString('ko-KR') };
    if (!G.feePayments) G.feePayments = {};
    if (!G.feePayments[clientId]) G.feePayments[clientId] = {};
    G.feePayments[clientId][ym] = { method: 'CMS', amount: feeAmt, note: '', date: new Date().toISOString().slice(0,10) };
  }
  saveToLS();
  renderFees();
}

function saveAdHocFee() {
  const clientId = Number(document.getElementById('adhoc-client')?.value);
  const type = document.querySelector('input[name="adhoc-type"]:checked')?.value;
  const ym = document.getElementById('adhoc-ym')?.value;
  const amount = parseInt(document.getElementById('adhoc-amount')?.value||0);
  const desc = document.getElementById('adhoc-desc')?.value?.trim()||'';
  if (!clientId || !type || !ym || !amount) { alert('거래처, 유형, 월, 청구액을 입력해주세요.'); return; }
  if (!G.adHocFees) G.adHocFees = {};
  if (!G.adHocFees[clientId]) G.adHocFees[clientId] = [];
  G.adHocFees[clientId].push({ id: Date.now(), type, ym, amount, desc, date: new Date().toLocaleString('ko-KR'), collected: false, collectedDate: null });
  saveToLS();
  closeModal();
  if (G.currentTab==='fees') renderFees();
  else if (G.currentTab==='clients') renderClients();
}

function toggleAdHocFeeCollected(clientId, feeId) {
  const fees = (G.adHocFees||{})[clientId];
  if (!fees) return;
  const f = fees.find(x=>x.id===feeId);
  if (!f) return;
  f.collected = !f.collected;
  f.collectedDate = f.collected ? new Date().toLocaleString('ko-KR') : null;

  renderFees();
}

function deleteAdHocFee(clientId, feeId) {
  if (!confirm('이 청구 항목을 삭제하시겠습니까?')) return;
  if (!G.adHocFees?.[clientId]) return;
  G.adHocFees[clientId] = G.adHocFees[clientId].filter(f=>f.id!==feeId);
  saveToLS();
  renderFees();
}

function renderFees() {
  if (!G.feesYM) G.feesYM = currentYM();
  const ym = G.feesYM;

  // 월정 수수료 대상: 기장/고문/성실 활성 거래처
  const monthlyClients = G.clients.filter(c =>
    c.status !== '해지' && c.status !== '폐업' &&
    getDealTypes(c).some(d => ['기장','고문','성실'].includes(d))
  );

  // 이 달 수임 이후인 거래처만 + 수수료 0원 제외 (해당 월 기준 기장료 사용)
  const feeClients = monthlyClients.filter(c => {
    if (!getFeeForYM(c, ym)) return false; // 수수료 0원 제외
    if (!c.contractDate) return true;
    const s = c.contractDate.slice(0,7);
    return s <= ym;
  });

  const mFeeTotal     = feeClients.reduce((a,c)=>a+getFeeForYM(c,ym),0);
  const mFeeCollected = feeClients.filter(c=>isMonthCollected(c.id,ym)).reduce((a,c)=>a+getFeeForYM(c,ym),0);
  const mFeeUnpaid    = mFeeTotal - mFeeCollected;
  const mFeePct       = mFeeTotal ? Math.round(mFeeCollected/mFeeTotal*100) : 0;

  // 신고 수수료: julgae 전체에서 fee > 0인 항목
  const filingFees = [];
  for (const pKey of Object.keys(G.julgae)) {
    const period = G.periods.find(p=>p.id===pKey);
    if (!period) continue;
    const pData = G.julgae[pKey];
    for (const [cidStr, v] of Object.entries(pData)) {
      if (!v || !v.fee) continue;
      const cid = Number(cidStr);
      const client = G.clients.find(c=>c.id===cid);
      if (!client) continue;
      filingFees.push({period, client, fee:v.fee, collected:!!v.s, pKey, cid});
    }
  }
  filingFees.sort((a,b)=>a.period.label.localeCompare(b.period.label));

  const fTotal     = filingFees.reduce((a,x)=>a+x.fee,0);
  const fCollected = filingFees.filter(x=>x.collected).reduce((a,x)=>a+x.fee,0);
  const fUnpaid    = fTotal - fCollected;

  // 추가 청구 (신고대리/조정료/성실신고) — G.adHocFees
  const allAdHocFees = Object.entries(G.adHocFees||{}).flatMap(([cidStr, fees]) => {
    const cid = Number(cidStr);
    const client = G.clients.find(c=>c.id===cid);
    if (!client) return [];
    return (fees||[]).map(f=>({...f, client, clientId: cid}));
  });
  allAdHocFees.sort((a,b)=>b.ym.localeCompare(a.ym)||a.client.name.localeCompare(b.client.name,'ko'));
  const adhocTotal     = allAdHocFees.reduce((s,f)=>s+f.amount,0);
  const adhocCollected = allAdHocFees.filter(f=>f.collected).reduce((s,f)=>s+f.amount,0);
  const adhocUnpaid    = adhocTotal - adhocCollected;

  const grandTotal     = mFeeTotal + fTotal + adhocTotal;
  const grandCollected = mFeeCollected + fCollected + adhocCollected;
  const grandUnpaid    = grandTotal - grandCollected;

  // 월 네비게이션
  function adjYM(ym, delta) {
    const [y,m] = ym.split('-').map(Number);
    const d = new Date(y, m-1+delta, 1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }
  const prevYM = adjYM(ym,-1);
  const nextYM = adjYM(ym,1);
  const isCurrentMonth = ym === currentYM();

  // 필터 적용 (월정)
  let filteredFeeClients = feeClients;
  if (G.feesSearch) filteredFeeClients = filteredFeeClients.filter(c=>c.name.includes(G.feesSearch));
  if (G.feesRepSearch) filteredFeeClients = filteredFeeClients.filter(c=>(c.rep||'').includes(G.feesRepSearch));
  if ((G.feesDealFilter||[]).length>0) filteredFeeClients = filteredFeeClients.filter(c=>getDealTypes(c).some(d=>G.feesDealFilter.includes(d)));
  if ((G.feesManagerFilter||[]).length>0) filteredFeeClients = filteredFeeClients.filter(c=>{const ms=getManagers(c);return G.feesManagerFilter.some(m=>m==='(없음)'?ms.length===0:ms.includes(m));});
  if (G.feesCollectFilter==='수금') filteredFeeClients = filteredFeeClients.filter(c=>G.monthlyFees[c.id]?.[ym]);
  else if (G.feesCollectFilter==='미수금') filteredFeeClients = filteredFeeClients.filter(c=>!(G.monthlyFees[c.id]?.[ym]));

  // 필터 적용 (신고)
  let filteredFilingFees = filingFees;
  if (G.filingSearch) filteredFilingFees = filteredFilingFees.filter(x=>x.client.name.includes(G.filingSearch));
  if (G.filingRepSearch) filteredFilingFees = filteredFilingFees.filter(x=>(x.client.rep||'').includes(G.filingRepSearch));
  if ((G.filingManagerFilter||[]).length>0) filteredFilingFees = filteredFilingFees.filter(x=>{const ms=getManagers(x.client);return G.filingManagerFilter.some(m=>m==='(없음)'?ms.length===0:ms.includes(m));});
  if (G.filingCollectFilter==='수금') filteredFilingFees = filteredFilingFees.filter(x=>x.collected);
  else if (G.filingCollectFilter==='미수금') filteredFilingFees = filteredFilingFees.filter(x=>!x.collected&&x.fee>0);

  const feesSearchActive = !!G.feesSearch;
  const feesRepSearchActive = !!G.feesRepSearch;
  const filingSearchActive = !!G.filingSearch;
  const filingRepSearchActive = !!G.filingRepSearch;

  const hc = G.hiddenCols || {};
  const fmChips = _hcChips([['fm_rep','대표자(월정)'],['fm_dealType','수임내용'],['fm_manager','담당자(월정)'],['fm_contractDate','수임일'],['fm_fee','월수수료']]);
  const ffChips = _hcChips([['ff_period','신고기간'],['ff_rep','대표자(신고)'],['ff_manager','담당자(신고)'],['ff_fee','청구액']]);

  // Group by manager for subtotals (Feature 3)
  const _fmByMgr = {};
  filteredFeeClients.forEach(c => {
    const key = getManagers(c).join(', ') || '(담당자 미지정)';
    if (!_fmByMgr[key]) _fmByMgr[key] = [];
    _fmByMgr[key].push(c);
  });
  const _fmMgrKeys = Object.keys(_fmByMgr).sort((a,b)=>a.localeCompare(b,'ko'));
  const _genFeeRow = c => {
    const collected = isMonthCollected(c.id, ym);
    const oldMonth = ym < '2026-06';
    const feeHist = ((G.feeHistory||{})[c.id]||{})[ym];
    const streak = !collected ? getUnpaidStreak(c, ym) : 0;
    const streakBadge = streak >= 2
      ? `<span style="font-size:10px;font-weight:700;color:#fff;background:${streak>=6?'#b71c1c':streak>=3?'#e53935':'#ff7043'};border-radius:10px;padding:1px 6px;margin-left:5px;white-space:nowrap">${streak}개월 미납</span>`
      : '';
    const contactCount = (G.contactLogs||{})[c.id]?.length||0;
    const contactBtn = !collected
      ? `<button onclick="event.stopPropagation();openContactLog(${c.id})" style="margin-left:4px;padding:1px 6px;border-radius:5px;border:1px solid ${contactCount?'#81c784':'#e0e0e0'};background:${contactCount?'#e8f5e9':'#f9f9f9'};font-size:10px;color:${contactCount?'#2e7d32':'#aaa'};cursor:pointer;font-family:inherit" title="연락 이력">📞${contactCount?` ${contactCount}`:''}</button>`
      : '';
    return `<tr style="background:${collected?'#e8f5e9':'#fff'}">
      <td><div style="font-weight:600;font-size:13px;display:flex;align-items:center;flex-wrap:wrap;gap:2px">${esc(c.name)}${streakBadge}<button onclick="event.stopPropagation();printFeeInvoice(${c.id})" style="margin-left:6px;padding:1px 7px;border-radius:5px;border:1px solid #c5cae9;background:#f0f4ff;font-size:10px;color:#4f8ef7;cursor:pointer;font-family:inherit" title="청구서 인쇄">🖨 청구서</button>${contactBtn}</div></td>
      <td style="font-size:12px;color:#444;${hc['fm_rep']?'display:none':''}">${esc(c.rep)||'-'}</td>
      <td style="${hc['fm_dealType']?'display:none':''}">${getDealTypes(c).map(d=>dealBadge(d)).join('')}</td>
      <td style="color:#555;font-size:12px;${hc['fm_manager']?'display:none':''}">${getManagers(c).join(', ')||'-'}</td>
      <td style="font-size:11px;color:#888;${hc['fm_contractDate']?'display:none':''}">${c.contractDate?c.contractDate.slice(0,7):'-'}</td>
      <td style="text-align:right;font-weight:700;color:#7b1fa2;${hc['fm_fee']?'display:none':''}">
        <div>${getFeeForYM(c,ym).toLocaleString()}원${getFeeForYM(c,ym)!==c.fee?`<span style="font-size:9px;color:#f57c00;margin-left:3px">변경됨</span>`:''}</div>
        ${!oldMonth&&!collected?`<input type="number" placeholder="${getFeeForYM(c,ym)}" style="width:80px;margin-top:3px;padding:2px 5px;border:1px solid #ddd;border-radius:5px;font-size:11px;text-align:right;font-family:inherit" title="실수금액 입력 후 Enter" onblur="if(this.value)handleActualAmount(${c.id},'${ym}',this)" onkeydown="if(event.key==='Enter')this.blur()">`:``}
      </td>

function applyPeriodTemplate(tplKey) {
  const t = PERIOD_TEMPLATES.find(x=>x.tpl===tplKey);
  if (!t) return;
  const yr = new Date().getFullYear();
  const label = String(yr).slice(2) + '년 ' + t.label;
  if (G.periods.some(p=>p.label===label)) {
    if (!confirm(`"${label}" 리스트가 이미 있습니다.\n그래도 새로 추가하시겠습니까?`)) return;
  }
  const id = tplKey + '_' + yr + '_' + Date.now();
  G.periods.push({ id, label, type: t.type, targetType: t.targetType, reportType: t.reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  closeModal();
  renderJulgae();
}

function savePeriod() {
  const label = document.getElementById('p-label').value.trim();
  if (!label) { toast('리스트 이름을 입력해주세요','warning'); return; }
  if (G.periods.some(p=>p.label===label)) {
    if (!confirm(`"${label}" 리스트가 이미 있습니다.\n그래도 새로 추가하시겠습니까?`)) return;
  }
  const type = document.getElementById('p-type').value;
  const reportType = document.getElementById('p-reporttype').value || undefined;
  const targetMap = {vat:'전체',vat_hak_1:'전체',vat_hak_2:'전체',vat_yej:'법인',corp:'법인',income:'개인',seongsi:'개인',sajup:'개인'};
  const targetType = reportType ? (targetMap[reportType]||'전체') : '전체';
  const id = 'p_' + Date.now();
  G.periods.push({ id, label, type, targetType, reportType });
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  closeModal();
  renderJulgae();
}

function _pDelDown(el, id) {
  window._pDelFired = false;
  window._pDelTimer = setTimeout(() => {
    window._pDelFired = true;
    el.style.transform = 'scale(1.3)';
    el.style.boxShadow = '0 0 0 3px rgba(229,57,53,.35)';
    el.style.transition = 'all 0.1s';
  }, 850);
}
function _pDelUp(el, id) {
  clearTimeout(window._pDelTimer);
  el.style.transform = '';
  el.style.boxShadow = '';
  if (window._pDelFired) {
    window._pDelFired = false;
    deletePeriod(id);
  } else {
    toast('꾹 누르면 삭제됩니다', 'info', 1500);
  }
}
function _pDelCancel(el) {
  clearTimeout(window._pDelTimer);
  window._pDelFired = false;
  el.style.transform = '';
  el.style.boxShadow = '';
}
function deletePeriod(id) {
  const p = G.periods.find(x => x.id === id);
  if (!p) return;
  if (p.locked) { toast('마감된 리스트는 삭제할 수 없습니다', 'warning'); return; }
  if (!confirm(`"${p.label}" 리스트와 결재 데이터를 삭제하시겠습니까?`)) return;
  G.periods = G.periods.filter(x => x.id !== id);
  delete G.julgae[id];
  if (G.julgaeSelectedPeriods) G.julgaeSelectedPeriods = G.julgaeSelectedPeriods.filter(x => x !== id);
  G.julgaePeriodIdx = Math.max(0, Math.min(G.julgaePeriodIdx, G.periods.length - 1));
  saveToLS();
  renderJulgae();
}

function copyPeriod(pKey) {
  const period = G.periods.find(p=>p.id===pKey);
  if (!period) return;
  const newLabel = period.label + ' (복사)';
  const newId = 'p_' + Date.now();
  const newPeriod = { ...period, id: newId, label: newLabel };
  if (period.enrolled) newPeriod.enrolled = [...period.enrolled];
  G.periods.push(newPeriod);
  // Copy julgae data but reset completion status
  const pk = pKey+'|'+(period.reportType||period.type);
  const newPk = newId+'|'+(period.reportType||period.type);
  if (G.julgae[pk]) {
    G.julgae[newPk] = JSON.parse(JSON.stringify(G.julgae[pk]));
    Object.keys(G.julgae[newPk]).forEach(cid=>{
      const v = G.julgae[newPk][cid];
      if (v && typeof v === 'object') { v.d=false; v.b=false; v.a=false; v.s=false; }
    });
  }
  G.julgaePeriodIdx = G.periods.length - 1;
  saveToLS();
  renderJulgae();
  toast(`"${newLabel}" 신고기간이 생성됐습니다.`,'success');
}

function syncFromRawData() {
  const normNo = s => String(s||'').replace(/[^0-9]/g,'');
  const byBizNo = new Map(), byName = new Map();
  (G.clients||[]).forEach(c => {
    const nb = _normBizNo(c.bizNo);
    if (nb && nb !== '0000000000') byBizNo.set(nb, c);
    byName.set(_normName(c.name), c);
  });

  const updates = [], unmatched = [], matched = [];
  for (const raw of EXCEL_RAW_DATA) {
    const nb = _normBizNo(raw.b);
    let client = (nb && nb !== '0000000000') ? byBizNo.get(nb) : null;
    if (!client) client = byName.get(_normName(raw.n));
    if (!client) {
      const hasBizNo = nb && nb !== '0000000000';
      unmatched.push({...raw, reason: hasBizNo ? '사업자번호·업체명 모두 불일치' : '사업자번호 없음·업체명 불일치'});
      continue;
    }

    const chg = [];
    const curMgr = (client.managers||[client.manager]||[]).filter(Boolean);
    if (raw.n && _normName(raw.n) !== _normName(client.name)) chg.push({f:'name',l:'업체명',o:client.name,nv:raw.n});
    if (raw.r && raw.r !== client.rep) chg.push({f:'rep',l:'대표자',o:client.rep,nv:raw.r});
    if (raw.b && raw.b !== '000-00-00000' && normNo(raw.b) !== normNo(client.bizNo||'')) chg.push({f:'bizNo',l:'사업자번호',o:client.bizNo||'',nv:raw.b});
    if (raw.j && normNo(raw.j) !== normNo(client.jumin||'')) chg.push({f:'jumin',l:client.taxType==='법인'?'법인등록번호':'주민번호',o:client.jumin||'',nv:raw.j});
    if (raw.v && raw.v !== client.vatType) chg.push({f:'vatType',l:'과세유형',o:client.vatType,nv:raw.v});
    if (raw.t && raw.t !== client.taxType) chg.push({f:'taxType',l:'인격',o:client.taxType,nv:raw.t});
    if (raw.f > 0 && raw.f !== (client.fee||0)) chg.push({f:'fee',l:'기장료',o:(client.fee||0),nv:raw.f});
    if (raw.p && raw.p !== (client.phone||'')) chg.push({f:'phone',l:'전화번호',o:client.phone||'',nv:raw.p});
    if (raw.m && !curMgr.includes(raw.m)) chg.push({f:'manager',l:'담당자',o:curMgr.join(','),nv:raw.m});
    if (raw.d && raw.d !== (client.terminationDate||'')) chg.push({f:'terminationDate',l:'폐업일',o:client.terminationDate||'',nv:raw.d});
    if (raw.s==='폐업' && client.status!=='폐업' && client.status!=='해지') chg.push({f:'status',l:'상태',o:client.status,nv:'폐업'});
    if (chg.length) updates.push({id:client.id, cName:client.name, exName:raw.n, chg});
    else matched.push({name:client.name, bizNo:client.bizNo||raw.b, manager:raw.m, fee:raw.f, vatType:raw.v});
  }
  _showSyncModal(updates, unmatched, matched);
}

  const lines = [headers.join(',')];
  rows.forEach(r => {
    const vals = [r.name||r.n, r.bizNo||r.b, r.rep||r.r||'', r.manager||r.m, r.fee||r.f||0, r.vatType||r.v||''];
    if (hasReason) vals.push(r.reason||'');
    lines.push(vals.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  });
  const blob = new Blob([BOM+lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function _syncTab(t) {
  ['upd','ok','um'].forEach(id => {
    const pane = document.getElementById('sync-pane-'+id);
    const btn  = document.getElementById('stab-'+id);
    if (!pane||!btn) return;
    const active = id===t;
    pane.style.display = active?'block':'none';
    btn.style.color = active?'#1565c0':'#888';
    btn.style.fontWeight = active?'700':'600';
    btn.style.background = active?'#fff':'#f7f7f7';
    btn.style.borderBottom = active?'2px solid #1565c0':'2px solid transparent';
  });
}
function _applySyncChanges() {
  const updates = window._syncUpdates || [];
  let cnt = 0;
  updates.forEach(u => {
    const c = (G.clients||[]).find(x=>x.id===u.id);
    if (!c) return;
    u.chg.forEach(ch => {
      if (ch.f === 'manager') {
        if (!c.managers) c.managers = [c.manager||''];
        if (!c.managers.includes(ch.nv)) c.managers = [ch.nv];
        c.manager = ch.nv;
      } else {
        c[ch.f] = ch.nv;
      }
    });
    cnt++;
  });
  saveToLS();
  closeModal();
  renderClients();
  setTimeout(()=>alert(`✅ ${cnt}개 거래처 정보가 업데이트됐습니다.`), 100);
}

const _IMPORT_COL_RULES = {
  bizNo:         ['사업자번호','사업자등록번호','사업자 번호','등록번호'],
  name:          ['상호','거래처명','업체명','상호명'],
  rep:           ['대표자','대표자명','대표','성명'],
  taxType:       ['인격','법인구분','개인법인'],
  vatType:       ['과세유형','부가세유형','과세구분','과세형태'],
  phone:         ['전화번호','전화','연락처','휴대폰'],
  bizType:       ['업태','업종'],
  taxOffice:     ['관할세무서','세무서'],
  period:        ['과세기간','기간','신고기간'],
  salesCount:    ['매출건수','매출 건수','(매출)건수'],
  salesAmount:   ['매출금액','매출 금액','공급가액(매출)','매출공급가액'],
  purchaseCount: ['매입건수','매입 건수','(매입)건수'],
  purchaseAmount:['매입금액','매입 금액','공급가액(매입)','매입공급가액'],
};

function autoDetectColumns(headers) {
  const map = {};
  headers.forEach((h, i) => {
    const hc = String(h).replace(/\s+/g,'').toLowerCase();
    for (const [field, candidates] of Object.entries(_IMPORT_COL_RULES)) {
      if (map[field] !== undefined) continue;
      if (candidates.some(c => hc.includes(c.replace(/\s+/g,'').toLowerCase()))) map[field] = i;
    }
  });
  return map;
}

function parseImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (data.length < 2) {
        document.getElementById('import-preview').innerHTML = '<div style="color:#e53935;margin-top:12px;font-size:13px">데이터가 없습니다.</div>';
        return;
      }
      window._importHeaders = data[0].map(String);
      window._importRows = data.slice(1).filter(r => r.some(v => String(v).trim()));
      showImportPreview();
    } catch(err) {
      document.getElementById('import-preview').innerHTML = `<div style="color:#e53935;margin-top:12px;font-size:13px">파일 오류: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

}

function doImport() {
  const rows = window._importRows;
  const headers = window._importHeaders;
  if (!rows || !headers) return;
  const colMap = autoDetectColumns(headers);
  const type = window._importType;
  const getVal = (row, field) => colMap[field]!==undefined ? String(row[colMap[field]]||'').trim() : '';

  if (type === 'clients') {
    let added=0, updated=0, skipped=0;
    rows.forEach(row => {
      const bizNo = getVal(row,'bizNo').replace(/[^0-9]/g,'');
      const name = getVal(row,'name');
      if (!name) { skipped++; return; }
      let existing = (bizNo.length>=10) ? G.clients.find(c=>(c.bizNo||'').replace(/[^0-9]/g,'')===bizNo) : null;
      if (!existing) existing = G.clients.find(c=>c.name===name);
      const rawVat = getVal(row,'vatType');
      const vatType = rawVat.includes('일반')?'일반':rawVat.includes('간이')?'간이':rawVat.includes('면세')?'면세':null;
      const rawTax = getVal(row,'taxType');
      const taxType = rawTax.includes('법인')?'법인':rawTax.includes('개인')?'개인':null;
      if (existing) {
        if (bizNo.length>=10 && !existing.bizNo) existing.bizNo = bizNo;
        if (vatType) existing.vatType = vatType;
        if (taxType) existing.taxType = taxType;
        if (getVal(row,'rep') && !existing.rep) existing.rep = getVal(row,'rep');
        if (getVal(row,'phone') && !existing.phone) existing.phone = getVal(row,'phone');
        if (getVal(row,'bizType') && !existing.bizType) existing.bizType = getVal(row,'bizType');
        if (getVal(row,'taxOffice') && !existing.taxOffice) existing.taxOffice = getVal(row,'taxOffice');
        updated++;
      } else {
        const maxId = G.clients.reduce((a,c)=>Math.max(a,c.id||0),0);
        G.clients.push({
          id:maxId+1+added, name, rep:getVal(row,'rep'),
          bizNo:bizNo||'', jumin:'', relatedGroup:'',
          phone:getVal(row,'phone'), email:'',
          taxType:taxType||'개인', vatType:vatType||'일반',
          bizType:getVal(row,'bizType'), taxOffice:getVal(row,'taxOffice'),
          manager:'', managers:[], dealType:'기장', dealTypes:['기장'],
          fee:0, feeStatus:'청구완료', status:'정상',
          dataReceived:false, bookkeeping:false, approved:false,
          memo:'', contractDate:'', contracts:[],
          terminationDate:'', terminationReason:'', closureYear:'',
          closureTaxFiled:false, closureTaxApproved:false
        });
        added++;
      }
    });
    saveToLS(); closeModal(); renderClients();
    toast(`거래처 가져오기 완료!\n• 신규 추가: ${added}개\n• 업데이트: ${updated}개\n• 건너뜀: ${skipped}개`,'success',5000);
  } else {
    if (!G.invoiceData) G.invoiceData = {};
    let matched=0, unmatched=0;
    rows.forEach(row => {
      const bizNo = getVal(row,'bizNo').replace(/[^0-9]/g,'');
      const name = getVal(row,'name');
      if (!bizNo && !name) return;
      let client = (bizNo.length>=10) ? G.clients.find(c=>(c.bizNo||'').replace(/[^0-9]/g,'')===bizNo) : null;
      if (!client && name) client = G.clients.find(c=>c.name===name);
      if (!client) { unmatched++; return; }
      const period = getVal(row,'period') || new Date().toLocaleDateString('ko-KR');
      if (!G.invoiceData[client.id]) G.invoiceData[client.id] = {periods:{}, lastImported:''};
      G.invoiceData[client.id].periods[period] = {
        salesCount:   Number(getVal(row,'salesCount').replace(/[^0-9]/g,'')||0),
        salesAmount:  Number(getVal(row,'salesAmount').replace(/[^0-9]/g,'')||0),
        purchaseCount:Number(getVal(row,'purchaseCount').replace(/[^0-9]/g,'')||0),
        purchaseAmount:Number(getVal(row,'purchaseAmount').replace(/[^0-9]/g,'')||0),
      };
      G.invoiceData[client.id].lastImported = new Date().toLocaleDateString('ko-KR');
      matched++;
    });
    saveToLS(); closeModal();
    toast(`세금계산서 현황 가져오기 완료!\n• 매칭 성공: ${matched}개\n• 미매칭: ${unmatched}개${unmatched>0?'\n  (사업자번호/상호명으로 거래처를 찾을 수 없는 행)':''}`,'success',5000);
  }
}

// ══════════════════════════════════════════════════════
function openAINotice() {
  const active = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업');
  let selected = [];
  const reportTypes = ['부가가치세','종합소득세','법인세','원천세','연말정산'];

  showModal(`<div style="max-width:560px">
  <div class="modal-header"><h3>✉ 신고 안내문 생성</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div><label class="flabel">신고 유형</label><select class="fsel" id="notice-type">${reportTypes.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div><label class="flabel">문체</label><select class="fsel" id="notice-tone"><option>정중</option><option>친근</option><option>간결</option></select></div>
      <div class="form-grid full"><label class="flabel">마감일 (선택)</label><input type="date" class="finput" id="notice-deadline"></div>
    </div>
    <div><label class="flabel">거래처 선택</label>
      <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
        <button class="btn-sm" style="background:#e3f2fd;color:#1565c0" onclick="document.querySelectorAll('.nc-chip').forEach(el=>el.classList.add('on'))">전체 선택</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:150px;overflow-y:auto;padding:2px">
        ${active.slice(0,80).map(c=>`<button class="contract-chip nc-chip" data-id="${c.id}" onclick="this.classList.toggle('on')">${esc(c.name)}</button>`).join('')}
      </div>
    </div>
    <button class="btn-primary" style="width:100%" onclick="runAINotice()">✦ AI 안내문 생성</button>
    <div id="notice-results"></div>
  </div></div>`);
}

async function runAINotice() {
  const chips = document.querySelectorAll('.nc-chip.on');
  if (!chips.length) { toast('거래처를 선택해 주세요','warning'); return; }
  const type = document.getElementById('notice-type').value;
  const tone = document.getElementById('notice-tone').value;
  const deadline = document.getElementById('notice-deadline').value;
  const results = document.getElementById('notice-results');
  results.innerHTML = `<div style="text-align:center;padding:20px;color:#888">${spinnerHTML}AI 생성 중...</div>`;

  for (const chip of chips) {
    const c = G.clients.find(x=>x.id===Number(chip.dataset.id));
    if (!c) continue;
    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 ${type} 신고 안내문을 작성해주세요.
거래처명: ${c.name}, 대표자: ${c.rep}님, 과세유형: ${c.taxType}/${c.vatType}, 수임항목: ${(c.contracts||[]).map(contractLabel).join(', ')}${deadline?', 마감일: '+deadline:''}
조건: ${tone}한 어투, 4~6문장, 자료 제출 요청 포함, 사무소 서명 없이 본문만, 마크다운 없이`;
    try {
      const text = await aiCall(null, prompt, 600);
      if (!text) return;
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700">${esc(c.name)} <span style="font-weight:400;color:#888;font-size:13px">(${esc(c.rep)}님)</span></div>
          <button class="btn-sm" style="background:#f5f5f5" onclick="navigator.clipboard.writeText(this.previousSibling.nextSibling?.textContent||'');this.textContent='✓ 복사됨'">복사</button>
        </div>
        <div class="ai-result" id="r-${c.id}">${esc(text)}</div>
      </div>`;
    } catch(e) {
      results.innerHTML += `<div style="color:red;margin-top:8px">${esc(c.name)}: 생성 실패 — ${esc(String(e.message||e))}</div>`;
    }
  }
}

function openAIInvoice() {
  const active = G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&c.fee>0);

  // Save the number back (peek without incrementing) - we increment in nextInvoiceNo
  // We'll use this number if user prints
  window._currentInvoiceNo = invNo;
  const histRows = (G.invoiceHistory||[]).slice(-5).reverse().map(h=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #f5f5f5"><span><b>${esc(h.no)}</b> · ${esc(h.clientName)}</span><span style="color:#888">${esc(h.date)} · ${(h.amount||0).toLocaleString()}원</span></div>`).join('');
  showModal(`<div style="max-width:520px">
  <div class="modal-header"><h3>🖨 청구서 PDF 생성</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div style="background:#e8f0fe;border-radius:8px;padding:8px 14px;font-size:13px;color:#1565c0;font-weight:700;margin-bottom:4px">청구서 번호: ${esc(invNo)}</div>
    <div><label class="flabel">청구 거래처</label>
      <select class="fsel" id="inv-client" onchange="updateInvoicePreview()">
        ${active.map(c=>`<option value="${c.id}">${esc(c.name)} (${esc(c.rep)}) — ${c.fee.toLocaleString()}원</option>`).join('')}
      </select>
    </div>
    <div class="form-grid">
      <div><label class="flabel">발행일</label><input type="date" class="finput" id="inv-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label class="flabel">납부기한 (선택)</label><input type="date" class="finput" id="inv-due"></div>
      <div><label class="flabel">사무소명</label><input class="finput" id="inv-office" value="${esc(G.settings.name)}"></div>
      <div><label class="flabel">비고 (선택)</label><input class="finput" id="inv-note" placeholder="예: VAT 별도"></div>
    </div>
    <div id="inv-preview" style="background:#f8f9ff;border:2px dashed #b0bec5;border-radius:12px;padding:18px;font-size:13px"></div>
    <button class="btn-green" style="width:100%" onclick="printInvoice()">🖨 인쇄 / PDF 저장</button>
    <div style="font-size:12px;color:#aaa;text-align:center">인쇄 팝업에서 "PDF로 저장"을 선택하면 파일로 저장됩니다</div>
    ${histRows?`<div style="margin-top:12px"><div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px">최근 발행 이력</div>${histRows}</div>`:''}
  </div></div>`);
  setTimeout(updateInvoicePreview, 50);
}

function updateInvoicePreview() {
  const sel = document.getElementById('inv-client');
  if (!sel) return;
  const c = G.clients.find(x=>x.id===Number(sel.value));
  if (!c) return;
  const date = document.getElementById('inv-date')?.value||'';
  document.getElementById('inv-preview').innerHTML = `
    <div style="text-align:center;margin-bottom:12px"><div style="font-size:20px;font-weight:800;letter-spacing:6px">청 구 서</div>
    <div style="font-size:12px;color:#888">${esc(G.settings.name)}</div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px">
      <div><b>수신:</b> ${esc(c.name)} (${esc(c.rep)})</div><div><b>발행일:</b> ${date}</div>
    </div>
    <div style="background:#fff;border-radius:6px;padding:10px">
      ${(c.contracts||[]).map(k=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #eee"><span>${contractLabel(k)} 수수료</span><span>—</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:6px 0 0;font-weight:800;border-top:2px solid #1a1a2e;margin-top:4px"><span>합계</span><span>${c.fee.toLocaleString()}원</span></div>
    </div>`;
}

function printInvoice() {
  const sel = document.getElementById('inv-client');
  if (!sel) return;
  const c = G.clients.find(x=>x.id===Number(sel.value));
  if (!c) return;
  const date = document.getElementById('inv-date')?.value||'';
  const due = document.getElementById('inv-due')?.value||'';
  const note = document.getElementById('inv-note')?.value||'';
  const officeName = document.getElementById('inv-office')?.value||G.settings.name;
  const s = G.settings;

  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>청구서_${c.name}</title>
  <style>@page{size:A4;margin:20mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Malgun Gothic',sans-serif;color:#111;font-size:13px}
  .h1{text-align:center;font-size:26px;letter-spacing:10px;color:#1a1a2e;margin-bottom:6px}.sub{text-align:center;font-size:13px;color:#555;margin-bottom:20px}
  .meta{display:flex;justify-content:space-between;margin-bottom:20px}.mb{border:1px solid #ddd;border-radius:6px;padding:12px;width:48%}
  .ml{font-size:11px;color:#888;margin-bottom:2px}.mv{font-size:14px;font-weight:700}
  table{width:100%;border-collapse:collapse;margin-bottom:14px}th{background:#1a1a2e;color:#fff;padding:10px 12px;font-size:12px;text-align:left}
  td{padding:10px 12px;border-bottom:1px solid #eee}.tr{font-weight:700;font-size:15px;background:#f8f9ff;border-top:2px solid #1a1a2e}
  .amt{font-size:20px;font-weight:800;text-align:right;border:2px solid #1a1a2e;border-radius:8px;padding:12px 16px;margin-bottom:20px}
  .bank{border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:20px;font-size:13px}
  .ft{text-align:center;font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:10px}
  </style></head><body>
  <div class="h1">청 구 서</div><div class="sub">${esc(officeName)}</div>
  <div style="text-align:right;font-size:11px;color:#888;margin-bottom:10px">청구서 번호: ${window._currentInvoiceNo||''}</div>
  <div class="meta">
    <div class="mb"><div class="ml">수신</div><div class="mv">${esc(c.name)} 귀중</div><div style="font-size:12px;color:#666">대표: ${esc(c.rep)}</div></div>
    <div class="mb"><div class="ml">발행일</div><div class="mv">${date}</div>${due?`<div class="ml" style="margin-top:8px">납부기한</div><div class="mv">${due}</div>`:''}</div>
  </div>
  <table><thead><tr><th>항목</th><th>내용</th><th style="text-align:right">금액</th></tr></thead>
  <tbody>
  ${(c.contracts||[]).map(k=>`<tr><td>${contractLabel(k)} 수수료</td><td>${new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long'})} 기준</td><td style="text-align:right">—</td></tr>`).join('')}
  <tr class="tr"><td colspan="2">합 계</td><td style="text-align:right">${c.fee.toLocaleString()} 원</td></tr>
  </tbody></table>
  <div class="amt">청구금액: ￦ ${c.fee.toLocaleString()}</div>
  ${note?`<div style="background:#f9f9f9;border-radius:6px;padding:10px;margin-bottom:14px;font-size:12px;color:#666">※ ${esc(note)}</div>`:''}
  <div class="bank"><div style="font-weight:700;font-size:11px;margin-bottom:6px;color:#555">입금 계좌 안내</div>
  ${esc(s.bank)} ${esc(s.account)} (예금주: ${esc(s.accountHolder)})</div>
  <div class="ft">${esc(officeName)} · Tel: ${esc(s.phone)} · ${esc(s.email)}</div>
  </body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
  // Record invoice history
  if (!G.invoiceHistory) G.invoiceHistory = [];
  G.invoiceHistory.push({no: window._currentInvoiceNo||'', date: date, clientName: c.name, amount: c.fee||0});
  if (G.invoiceHistory.length > 100) G.invoiceHistory = G.invoiceHistory.slice(-100);
  saveToLS();
}

function openAIReminder() {
  const noData = G.clients.filter(c=>!c.dataReceived&&c.status!=='해지'&&c.status!=='폐업');
  showModal(`<div style="max-width:540px">
  <div class="modal-header"><h3>📱 자료 미제출 알림 문자</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    ${noData.length===0?`<div style="background:#e8f5e9;border-radius:10px;padding:20px;text-align:center;color:#2e7d32;font-weight:600">✓ 자료 미제출 거래처가 없습니다</div>`:`
    <div style="background:#fff3e0;border-radius:10px;padding:10px 14px;font-size:13px;color:#e65100;font-weight:600;margin-bottom:4px">⚠ 자료 미제출 ${noData.length}개</div>
    <div class="form-grid">
      <div><label class="flabel">신고 유형</label><select class="fsel" id="sms-type"><option>부가가치세</option><option>종합소득세</option><option>법인세</option><option>원천세</option></select></div>
      <div><label class="flabel">문체</label><select class="fsel" id="sms-tone"><option>정중</option><option>친근</option><option>간결</option></select></div>
      <div class="form-grid full"><label class="flabel">마감일 (선택)</label><input type="date" class="finput" id="sms-deadline"></div>
    </div>
    <div><label class="flabel">대상 거래처</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:120px;overflow-y:auto;margin-top:6px">
        ${noData.map(c=>`<button class="contract-chip sc-chip on" data-id="${c.id}" onclick="this.classList.toggle('on')">${esc(c.name)}</button>`).join('')}
      </div>
    </div>
    <button class="btn-primary" style="width:100%;background:linear-gradient(135deg,#e65100,#f57c00)" onclick="runAIReminder()">✦ 알림 문자 생성</button>
    <div id="sms-results"></div>`}
  </div></div>`);
}

async function runAIReminder() {
  const chips = document.querySelectorAll('.sc-chip.on');
  if (!chips.length) { toast('거래처를 선택해 주세요','warning'); return; }
  const type = document.getElementById('sms-type').value;
  const tone = document.getElementById('sms-tone').value;
  const deadline = document.getElementById('sms-deadline').value;
  const results = document.getElementById('sms-results');
  results.innerHTML = `<div style="text-align:center;padding:20px;color:#888">${spinnerHTML}AI 생성 중...</div>`;

  for (const chip of chips) {
    const c = G.clients.find(x=>x.id===Number(chip.dataset.id));
    if (!c) continue;
    const prompt = `세무사 사무소 직원으로서 아래 거래처에 보낼 자료 제출 요청 문자를 작성해주세요.
거래처: ${c.name} (${c.rep}님), 신고 유형: ${type}${deadline?', 마감일: '+deadline:''}
조건: ${tone}한 어투, SMS 80자 이내, 마감일 강조, 연락처 자리는 [연락처]로, 본문만, 마크다운 없이`;
    try {
      const rawText = await aiCall(null, prompt, 200);
      if (!rawText) return;
      const text = rawText.trim();
      const len = text.length;
      results.innerHTML += `<div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700">${esc(c.name)} <span style="font-size:12px;color:#888">${esc(c.phone)}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;font-weight:700;color:${len>80?'#e53935':'#43a047'}">${len}자</span>
            <button class="btn-sm" style="background:#f5f5f5" onclick="navigator.clipboard.writeText(document.getElementById('sms-${c.id}').textContent);this.textContent='✓ 복사됨'">복사</button>
          </div>
        </div>
        <div class="sms-bubble" id="sms-${c.id}">${esc(text)}</div>
      </div>`;
    } catch(e) {
      results.innerHTML += `<div style="color:red;margin-top:8px">${esc(c.name)}: 생성 실패</div>`;
    }
  }
}

function switchTaxTab(tab) {

  document.getElementById('tc-tab-prec').style.background = isChat ? '#f5f5f5' : '#1565c0';

function tcQuickAsk(q) {
  document.getElementById('tc-input').value = q;
  tcSendChat();
}

function tcAddMsg(role, html) {
  const box = document.getElementById('tc-chat-box');
  const div = document.createElement('div');
  const isUser = role === 'user';
  div.style.cssText = `align-self:${isUser?'flex-end':'flex-start'};background:${isUser?'#f5f5f5':'#fff'};border:1px solid #e0e0e0;border-radius:${isUser?'16px 16px 4px 16px':'16px 16px 16px 4px'};padding:10px 13px;max-width:88%;font-size:14px;line-height:1.65`;
  div.innerHTML = html;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function tcSendChat() {
  const inp = document.getElementById('tc-input');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  window._tcMsgs.push({role:'user', content:q});
  tcAddMsg('user', esc(q));
  const loadDiv = tcAddMsg('ai', `${spinnerHTML} 답변 생성 중...`);
  try {
    const [aiRes, precRes] = await Promise.all([
      tcFetchAI(window._tcMsgs),
      tcFetchPrec(q, 'prec', 4)
    ]);
    window._tcMsgs.push({role:'assistant', content:aiRes.replace(/<br>/g,'\n').replace(/<[^>]+>/g,'')});
    let html = aiRes;
    if (precRes && precRes.length > 0) {
      html += '<div style="margin-top:10px;border-top:1px solid #e0e0e0;padding-top:8px;font-size:12px;color:#888">📋 관련 판례</div>';
      precRes.forEach(p => {
        const name = esc(p.사건명||p.제목||'판례');
        const year = (p.선고일자||p.생산일자||'').substring(0,4);
        html += `<span onclick="tcGoPrec('${esc(p.사건명||'')}')" style="display:inline-block;margin:3px 3px 0 0;font-size:11px;padding:3px 9px;border-radius:20px;background:#e8f0fe;color:#1565c0;cursor:pointer">${name}${year?' ('+year+')':''}</span>`;
      });
    }
    loadDiv.innerHTML = html;
  } catch(e) {
    loadDiv.innerHTML = '오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
  }
}

async function tcFetchAI(msgs) {
  const key = getAIKey();
  if (!key) { toast('⚙ 설정에서 Claude AI API 키를 먼저 입력해주세요','warning'); return ''; }
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:aiHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      system:`당신은 한국 세무 전문 AI 상담사입니다. 세무사 사무소 업무용으로 사용됩니다.
- 개인소득세·종합소득세·법인세·부가가치세·양도소득세·상속증여세·원천징수 등 전 세목 상담
- 법령 근거(소득세법 제○조 등)와 실무 처리 방법을 함께 안내
- 답변은 핵심 위주로 간결하게 (3~5문장 또는 번호 목록)
- 계산이 필요한 경우 수식과 함께 설명
- 마지막에 주의사항·면책 한 줄 추가`,
      messages: msgs
    })
  });
  if (!resp.ok) { const e=await resp.json().catch(()=>({error:{message:resp.statusText}})); return '오류: '+(e?.error?.message||resp.statusText); }
  const data = await resp.json();
  const text = data.content?.[0]?.text || '답변을 가져올 수 없습니다.';
  return text.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

async function tcFetchPrec(keyword, type, display) {
  try {
    const url = `https://www.law.go.kr/DRF/lawSearch.do?OC=shinetax&target=${type}&type=JSON&query=${encodeURIComponent(keyword)}&display=${display}&search=2`;
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const data = await resp.json();
    const key = type==='prec'?'PrecSearch':'ExpcSearch';
    const subKey = type==='prec'?'prec':'expc';
    const items = data[key]?.[subKey] || [];
    return Array.isArray(items) ? items : [items];
  } catch(e) { return null; }
}

function tcGoPrec(name) {
  switchTaxTab('prec');
  document.getElementById('tc-prec-input').value = name;
  tcSearchPrec();
}

async function tcSearchPrec() {
  const keyword = document.getElementById('tc-prec-input').value.trim();
  const type = document.getElementById('tc-prec-type').value;
  if (!keyword) return;
  const box = document.getElementById('tc-prec-results');
  box.innerHTML = `<div style="text-align:center;padding:24px;color:#888;font-size:14px">${spinnerHTML}검색 중...</div>`;
  const results = await tcFetchPrec(keyword, type, 15);
  if (!results || results.length === 0) {
    box.innerHTML = '<div style="text-align:center;padding:32px;color:#aaa;font-size:14px">검색 결과가 없습니다</div>';
    return;
  }
  box.innerHTML = '';
  results.forEach(item => {
    const card = document.createElement('div');
    card.style.cssText = 'border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;background:#fff';
    const court = item.법원명||item.소관부처명||'';
    const badgeColor = court.includes('대법') ? '#e8f0fe;color:#1565c0' : court.includes('헌') ? '#fef2f2;color:#b91c1c' : '#fff8e6;color:#b45309';
    const date = (item.선고일자||item.생산일자||'').substring(0,10);
    const summary = item.판시사항||item.판결요지||item.내용||'카드를 클릭하면 상세 내용을 볼 수 있습니다.';
    card.innerHTML = `<span style="font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px;background:${badgeColor}">${esc(court)||'판례'}</span>
      <div style="font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.4">${esc(item.사건명||item.제목||'')}</div>
      <div style="font-size:12px;color:#888">${esc(item.사건번호||'')}${date?' · '+date:''}</div>
      <div class="tc-summary" style="display:none;font-size:13px;color:#666;margin-top:8px;line-height:1.55;border-top:1px solid #e0e0e0;padding-top:8px">${esc(summary)}</div>`;
    card.onclick = () => {
      const s = card.querySelector('.tc-summary');
      s.style.display = s.style.display==='none' ? 'block' : 'none';
    };
    box.appendChild(card);
  });
}

function addClientNote(id) {
  const txt = (document.getElementById('note-input')||{}).value?.trim();
  if (!txt) return;
  if (!G.clientNotes) G.clientNotes = {};
  if (!G.clientNotes[id]) G.clientNotes[id] = [];
  const reminder = document.getElementById('note-reminder')?.value || '';
  G.clientNotes[id].push({id:Date.now()+'', date:new Date().toLocaleString('ko-KR'), text:txt, reminder});
  saveToLS();
  openClientNotes(id);
}
function deleteClientNote(clientId, noteId) {
  if (!G.clientNotes?.[clientId]) return;
  G.clientNotes[clientId] = G.clientNotes[clientId].filter(n=>n.id!==noteId);
  saveToLS();
  openClientNotes(clientId);
}

function openManagerAnalysis() {
  const managers = (G.settings?.managers||[]);
  const thisYM = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  const rows = managers.map(m=>{
    const allC=G.clients.filter(c=>c.status!=='해지'&&c.status!=='폐업'&&getManagers(c).includes(m));
    const monthlyC=allC.filter(c=>getDealTypes(c).some(d=>['기장','고문','성실'].includes(d)));
    const monthlyFee=monthlyC.reduce((a,c)=>a+(c.fee||0),0);
    const collected=monthlyC.filter(c=>(G.monthlyFees[c.id]||{})[thisYM]).reduce((a,c)=>a+(c.fee||0),0);
    const collPct=monthlyFee>0?Math.round(collected/monthlyFee*100):0;
    let jDone=0,jTotal=0;
    (G.periods||[]).forEach(p=>{
      allC.forEach(c=>{
        const v=julgaeVal(p.id+'|'+(p.reportType||p.type),c.id);
        if(v&&(v.a!==undefined||v.d!==undefined)){jTotal++;if(v.a)jDone++;}
      });
    });
    const jPct=jTotal>0?Math.round(jDone/jTotal*100):0;
    return `<tr style="border-bottom:1px solid #f0f0f0">
      <td style="padding:10px 12px;font-weight:700">${esc(m)}</td>
      <td style="text-align:center;padding:10px 12px">${allC.length}</td>
      <td style="text-align:center;padding:10px 12px">${monthlyC.length}</td>
      <td style="text-align:right;padding:10px 12px;font-weight:600;color:#4f8ef7">${monthlyFee.toLocaleString()}원</td>
      <td style="text-align:center;padding:10px 12px"><span style="background:${collPct>=80?'#e8f5e9':'#fff3e0'};color:${collPct>=80?'#2e7d32':'#e65100'};padding:2px 8px;border-radius:8px;font-size:12px">${collPct}%</span></td>
      <td style="text-align:center;padding:10px 12px"><span style="font-size:12px;color:#888">${jDone}/${jTotal} (${jPct}%)</span></td>
    </tr>`;
  }).join('');
  showModal(`<div style="max-width:640px">
  <div class="modal-header"><h3>👤 담당자별 업무량 분석</h3><button class="close-btn" onclick="closeModal()">✕</button></div>

        <th style="padding:10px 12px;text-align:center">전체</th>
        <th style="padding:10px 12px;text-align:center">월정</th>
        <th style="padding:10px 12px;text-align:right">월정수수료</th>
        <th style="padding:10px 12px;text-align:center">이달수납률</th>

    </table>

  const thisYM = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  const prevYMs = [1,2,3].map(i=>{

    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  });

  const feeTargets = G.clients.filter(c=>
    c.status!=='해지'&&c.status!=='폐업'&&
    (c.fee||0)>0&&
    getDealTypes(c).some(d=>['기장','고문','성실'].includes(d))
  );

  const unpaidByClient = feeTargets.map(c=>{
    const unpaidMonths = [thisYM,...prevYMs].filter(ym=>!(G.monthlyFees[c.id]||{})[ym]);
    const total = unpaidMonths.length * (c.fee||0);
    return {...c, unpaidMonths, total};
  }).filter(c=>c.unpaidMonths.length>0);

  const s = G.settings||{};

  showModal(`<div style="max-width:620px;width:100%">

      <button onclick="brCopyAll()" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">📋 전체 복사</button>

        <option value="정중">정중</option>
        <option value="친근">친근</option>
        <option value="간결">간결</option>

    <div id="br-list" style="display:flex;flex-direction:column;gap:8px;max-height:480px;overflow-y:auto">
      ${unpaidByClient.length===0
        ? '<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">🎉 미수금 거래처가 없습니다</div>'
        : unpaidByClient.map(c=>{
            const defaultMsg = `[${esc(s.name||'세무사무소')}] ${esc(c.rep||c.name)}님, ${c.unpaidMonths.map(m=>m.slice(5)+'월').join('·')} 기장료 ${c.total.toLocaleString()}원 납부 부탁드립니다.\n계좌: ${s.bank||''} ${s.account||''} (${s.accountHolder||''})`;
            return `<div style="background:#f8f9ff;border-radius:10px;padding:12px 14px;border:1px solid #e8eaf6" data-cid="${c.id}">

            </div>`;
          }).join('')}
    </div>
  </div></div>`);

  window._brClients = unpaidByClient;

async function brGenOne(cid) {
  const c = (window._brClients||[]).find(x=>x.id===cid);
  if (!c) return;
  const s = window._brSettings||{};
  const tone = document.getElementById('br-tone')?.value||'정중';
  const ta = document.getElementById(`br-msg-${cid}`);
  if (!ta) return;
  ta.value = '생성 중...';
  try {
    const prompt = `세무사 사무소에서 기장료 미납 거래처에 보내는 수금 요청 문자를 작성해주세요.
거래처: ${c.name} (대표자: ${c.rep||''}), 미납금액: ${c.total.toLocaleString()}원 (${c.unpaidMonths.map(m=>m.slice(5)+'월').join('·')} 미납)
사무소: ${s.name||'세무사무소'}, 계좌: ${s.bank||''} ${s.account||''} (${s.accountHolder||''})
조건: ${tone}한 어투, SMS 100자 이내, 금액 강조, 본문만, 마크다운 없이`;
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':(G.settings?.aiKey||''),'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    ta.value = (data.content?.map(b=>b.text||'').join('')||'생성 실패').trim();
  } catch(e) { ta.value = '생성 실패. 다시 시도해주세요.'; }
}

async function brGenAll() {
  const clients = window._brClients||[];
  for (const c of clients) {
    await brGenOne(c.id);
  }
}

function brCopyOne(cid) {
  const ta = document.getElementById(`br-msg-${cid}`);
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(()=>{
    const card = ta.closest('[data-cid]');
    const btn = card ? card.querySelector('button:last-child') : null;
    if(btn){btn.textContent='✓';setTimeout(()=>btn.textContent='복사',1500);}
  });
}

function brCopyAll() {
  const all = (window._brClients||[]).map(c=>{
    const ta = document.getElementById(`br-msg-${c.id}`);
    return ta ? `▶ ${c.name}\n${ta.value}` : '';
  }).filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(all).then(()=>toast('전체 복사됨','success'));
}

    </div>
  </div></div>`);
  previewFeeRaise();
}
function previewFeeRaise() {
  const pct=Number(document.getElementById('raise-pct')?.value)||5;
  const roundTo=Number(document.getElementById('raise-round')?.value)||1000;
  const clients=window._feeRaiseClients||[];
  const rows=clients.map(c=>{
    const newFee=Math.round((c.fee||0)*(1+pct/100)/roundTo)*roundTo;
    const diff=newFee-(c.fee||0);
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #f5f5f5">
      <span style="flex:1;font-weight:600;font-size:13px">${esc(c.name)}</span>
      <span style="color:#888;font-size:12px">${(c.fee||0).toLocaleString()}원</span>
      <span style="color:#aaa">→</span>
      <span style="color:#1565c0;font-weight:700;font-size:13px">${newFee.toLocaleString()}원</span>
      <span style="color:#2e7d32;font-size:11px;min-width:60px;text-align:right">+${diff.toLocaleString()}</span>
    </div>`;
  }).join('');
  const preview=document.getElementById('raise-preview');
  if(preview) preview.innerHTML=rows||'<div style="padding:16px;text-align:center;color:#aaa">대상 거래처 없음</div>';
}
function applyFeeRaise() {
  if(!confirm('수수료를 인상하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  const pct=Number(document.getElementById('raise-pct')?.value)||5;
  const roundTo=Number(document.getElementById('raise-round')?.value)||1000;
  (window._feeRaiseClients||[]).forEach(c=>{
    const cl=G.clients.find(x=>x.id===c.id);
    if(cl) cl.fee=Math.round((cl.fee||0)*(1+pct/100)/roundTo)*roundTo;
  });
  saveToLS();
  closeModal();
  renderClients();
  toast('수수료 인상이 완료되었습니다.','success');
}
